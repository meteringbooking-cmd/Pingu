<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Survey | Pingu - Solar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35; --primary-dark: #E55A2B; --secondary: #FFC857;
            --accent: #00D9FF; --dark: #1A1A2E; --dark-light: #252541;
            --dark-lighter: #2F2F4A; --text: #EAEAEA; --text-dim: #9A9AB0;
            --success: #4ECCA3; --error: #FF6B6B; --kf: #B57BFF;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'JetBrains Mono',monospace; background:var(--dark); color:var(--text); line-height:1.6; overflow-x:hidden; min-height:100vh; }
        .container { max-width:1200px; margin:0 auto; padding:2rem; }
        header { margin-bottom:2rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; }
        .logo { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; background:linear-gradient(135deg,var(--primary) 0%,var(--secondary) 50%,var(--accent) 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-decoration:none; }
        h1 { font-family:'Syne',sans-serif; font-size:2rem; color:var(--text); }
        .form-input { flex:1; background:var(--dark-lighter); border:2px solid var(--dark-lighter); color:var(--text); padding:0.75rem 1rem; border-radius:10px; font-family:'JetBrains Mono',monospace; font-size:0.95rem; transition:border 0.2s; }
        .form-input:focus { outline:none; border-color:var(--accent); }
        .btn { padding:0.75rem 1.5rem; background:linear-gradient(135deg,var(--primary),var(--accent)); color:white; border:none; border-radius:10px; font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer; transition:all 0.3s ease; white-space:nowrap; }
        .btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 4px 16px rgba(255,107,53,0.4); }
        .btn:disabled { opacity:0.5; cursor:not-allowed; }
        .btn-secondary { background:var(--dark-lighter); color:var(--text); }
        .btn-scaffold  { background:linear-gradient(135deg,#FFC857,#FF6B35); color:white; }
        .btn-sm { padding:0.4rem 0.9rem; font-size:0.8rem; }
        #alert-container { width:100%; }
        .alert { padding:0.8rem 1rem; border-radius:8px; font-size:0.9rem; }
        .alert.error   { background:rgba(255,107,107,0.2); color:var(--error);   border:2px solid var(--error); }
        .alert.success { background:rgba(78,204,163,0.2);  color:var(--success); border:2px solid var(--success); }
        .dashboard { background:var(--dark-light); border-radius:16px; overflow:hidden; margin-bottom:2rem; }
        .dashboard-header { padding:1.2rem 1.5rem; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:0.75rem; border-bottom:2px solid var(--dark-lighter); }
        .dashboard-header h2 { font-family:'Syne',sans-serif; font-size:1.3rem; color:var(--text); }
        .badge-count { background:var(--dark-lighter); color:var(--accent); padding:0.2rem 0.7rem; border-radius:20px; font-size:0.78rem; font-weight:600; border:1px solid rgba(0,217,255,0.3); }
        .filter-row { padding:0.8rem 1.5rem; background:var(--dark-lighter); display:flex; gap:0.75rem; flex-wrap:wrap; align-items:center; border-bottom:1px solid rgba(255,255,255,0.05); }
        .filter-row label { font-size:0.78rem; color:var(--text-dim); white-space:nowrap; }
        .filter-select { background:var(--dark); border:1px solid rgba(255,255,255,0.1); color:var(--text); padding:0.35rem 0.7rem; border-radius:7px; font-family:'JetBrains Mono',monospace; font-size:0.82rem; cursor:pointer; }
        .search-filter { background:var(--dark); border:1px solid rgba(255,255,255,0.1); color:var(--text); padding:0.35rem 0.7rem; border-radius:7px; font-family:'JetBrains Mono',monospace; font-size:0.82rem; flex:1; min-width:160px; }
        .search-filter::placeholder { color:var(--text-dim); }
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; }
        thead th { background:var(--dark-lighter); padding:0.75rem 1rem; text-align:left; font-family:'Syne',sans-serif; font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:0.07em; color:var(--text-dim); white-space:nowrap; cursor:pointer; user-select:none; transition:color 0.2s; }
        thead th:hover { color:var(--accent); }
        tbody tr { border-bottom:1px solid rgba(255,255,255,0.04); transition:background 0.15s, transform 0.15s; cursor:pointer; }
        tbody tr:hover { background:rgba(0,217,255,0.06); transform:translateX(3px); }
        tbody tr:last-child { border-bottom:none; }
        td { padding:0.85rem 1rem; font-size:0.87rem; vertical-align:middle; }
        .td-job { font-weight:700; color:var(--accent); font-size:0.9rem; white-space:nowrap; }
        .td-surveyor { color:var(--text-dim); white-space:nowrap; }
        .td-date { color:var(--text-dim); font-size:0.82rem; white-space:nowrap; }
        .td-action { text-align:right; white-space:nowrap; }
        .type-badge { display:inline-block; padding:0.2rem 0.6rem; border-radius:6px; font-size:0.73rem; font-weight:600; white-space:nowrap; }
        .type-site-surveys   { background:rgba(255,107,53,0.2);  color:#FF9559; border:1px solid rgba(255,107,53,0.3); }
        .type-battery-surveys{ background:rgba(0,217,255,0.15);  color:#00D9FF; border:1px solid rgba(0,217,255,0.3); }
        .type-solar-surveys  { background:rgba(255,200,87,0.2);  color:#FFD96E; border:1px solid rgba(255,200,87,0.3); }
        .type-inspections    { background:rgba(78,204,163,0.2);  color:#4ECCA3; border:1px solid rgba(78,204,163,0.3); }
        .type-jobs           { background:rgba(160,100,255,0.2); color:#C090FF; border:1px solid rgba(160,100,255,0.3); }
        .type-default        { background:rgba(154,154,176,0.2); color:#9A9AB0; border:1px solid rgba(154,154,176,0.3); }
        .status-completed { display:inline-flex; align-items:center; gap:0.3rem; padding:0.2rem 0.6rem; border-radius:20px; font-size:0.72rem; font-weight:700; background:rgba(78,204,163,0.12); color:var(--success); border:1px solid rgba(78,204,163,0.35); letter-spacing:0.02em; white-space:nowrap; }
        .empty-state { padding:3rem 2rem; text-align:center; color:var(--text-dim); }
        .empty-state .icon { font-size:2.5rem; margin-bottom:0.75rem; opacity:0.4; }
        .loading-state { padding:3rem 2rem; text-align:center; color:var(--text-dim); }
        .spinner { display:inline-block; width:24px; height:24px; border:3px solid rgba(0,217,255,0.2); border-top-color:var(--accent); border-radius:50%; animation:spin 0.8s linear infinite; margin-right:0.75rem; vertical-align:middle; }
        @keyframes spin { to { transform:rotate(360deg); } }
        .pagination { padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; border-top:1px solid rgba(255,255,255,0.05); flex-wrap:wrap; gap:0.5rem; }
        .page-info { font-size:0.8rem; color:var(--text-dim); }
        .page-btns { display:flex; gap:0.4rem; }
        .page-btn { padding:0.3rem 0.7rem; background:var(--dark-lighter); border:1px solid rgba(255,255,255,0.08); color:var(--text); border-radius:6px; font-size:0.8rem; cursor:pointer; transition:all 0.2s; font-family:'JetBrains Mono',monospace; }
        .page-btn:hover:not(:disabled) { background:var(--accent); color:var(--dark); }
        .page-btn.active { background:var(--accent); color:var(--dark); font-weight:700; }
        .page-btn:disabled { opacity:0.3; cursor:not-allowed; }
        .manual-lookup { background:var(--dark-light); padding:1rem 1.5rem; border-radius:12px; margin-bottom:1.5rem; border:1px solid rgba(255,255,255,0.05); }
        .manual-lookup summary { cursor:pointer; color:var(--text-dim); font-size:0.87rem; user-select:none; list-style:none; display:flex; align-items:center; gap:0.5rem; }
        .manual-lookup summary::before { content:'▶'; font-size:0.65rem; transition:transform 0.2s; }
        .manual-lookup[open] summary::before { transform:rotate(90deg); }
        .manual-lookup .inner { padding-top:0.85rem; display:flex; gap:0.75rem; }
        .picklist-panel { background:var(--dark-lighter); border-radius:12px; border:2px solid rgba(0,217,255,0.3); padding:1.5rem; margin-bottom:2rem; }
        .picklist-panel-header { display:flex; align-items:center; gap:0.75rem; margin-bottom:1.2rem; padding-bottom:0.8rem; border-bottom:2px solid rgba(0,217,255,0.2); flex-wrap:wrap; }
        .picklist-panel-header h3 { font-family:'Syne',sans-serif; font-size:1.2rem; color:var(--accent); }
        .picklist-badge { background:var(--dark); color:var(--accent); padding:0.2rem 0.7rem; border-radius:20px; font-size:0.72rem; font-weight:600; border:1px solid rgba(0,217,255,0.3); }
        .picklist-meta-line { color:var(--text-dim); font-size:0.8rem; margin-left:auto; }
        .specs-section-title { font-family:'Syne',sans-serif; font-size:0.85rem; font-weight:700; color:var(--secondary); text-transform:uppercase; letter-spacing:0.08em; margin:1.2rem 0 0.6rem; padding-bottom:0.3rem; border-bottom:1px solid rgba(255,200,87,0.2); }
        .specs-section-title:first-child { margin-top:0; }
        .specs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:0.65rem; }
        .spec-item { background:var(--dark); border-radius:8px; padding:0.7rem 0.9rem 0.7rem 1rem; border-left:3px solid transparent; position:relative; }
        .spec-item.has-value { border-left-color:rgba(0,217,255,0.5); }
        .spec-item.no-value  { opacity:0.4; }
        .spec-item.highlight { border-left-color:var(--success) !important; }
        .spec-ref   { position:absolute; top:0.35rem; right:0.55rem; font-size:0.6rem; color:var(--text-dim); background:var(--dark-lighter); padding:0.05rem 0.3rem; border-radius:3px; }
        .spec-label { font-size:0.68rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.2rem; }
        .spec-note  { font-size:0.62rem; color:var(--text-dim); font-style:italic; }
        .spec-value { font-size:0.95rem; color:var(--text); font-weight:500; }
        .spec-value.empty-val { font-style:italic; color:var(--text-dim); font-size:0.8rem; font-weight:400; }
        .spec-unit  { font-size:0.68rem; color:var(--text-dim); margin-left:0.2rem; }
        .pl-kf-wrap { margin-top:1.2rem; padding:1.2rem; background:var(--dark); border-radius:12px; border:2px solid rgba(181,123,255,0.25); }
        .pl-kf-hdr { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.9rem; flex-wrap:wrap; gap:0.5rem; }
        .pl-kf-hdr h4 { font-family:'Syne',sans-serif; font-size:0.95rem; color:var(--kf); display:flex; align-items:center; gap:0.4rem; }
        .pl-kf-count { font-size:0.73rem; color:var(--text-dim); background:rgba(181,123,255,0.1); border:1px solid rgba(181,123,255,0.25); padding:0.15rem 0.55rem; border-radius:20px; }
        .pl-kf-table-wrap { overflow-x:auto; }
        .pl-kf-table { width:100%; border-collapse:collapse; font-size:0.82rem; }
        .pl-kf-table th { text-align:left; padding:0.4rem 0.75rem; font-size:0.68rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.06em; border-bottom:1px solid rgba(181,123,255,0.2); }
        .pl-kf-table td { padding:0.45rem 0.75rem; border-bottom:1px solid rgba(255,255,255,0.04); }
        .pl-kf-table tr:last-child td { border-bottom:none; }
        .pl-kf-table tr:hover td { background:rgba(181,123,255,0.05); }
        .pl-kf-part { font-family:'JetBrains Mono',monospace; color:var(--kf); font-size:0.8rem; }
        .pl-kf-qty { display:inline-block; background:rgba(181,123,255,0.12); color:var(--kf); border:1px solid rgba(181,123,255,0.3); padding:0.1rem 0.45rem; border-radius:4px; font-weight:700; font-size:0.8rem; }
        .pl-kf-total td { border-top:2px solid rgba(181,123,255,0.25); color:var(--text-dim); font-size:0.75rem; padding-top:0.6rem; }
        .roof-map-wrap { margin-top:1.2rem; padding:1.2rem; background:var(--dark); border-radius:12px; border:1px solid rgba(0,217,255,0.15); }
        .roof-map-hdr  { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.8rem; flex-wrap:wrap; gap:0.5rem; }
        .roof-map-hdr h4 { font-family:'Syne',sans-serif; font-size:1rem; color:var(--accent); }
        .legend      { display:flex; gap:1rem; flex-wrap:wrap; }
        .legend-item { display:flex; align-items:center; gap:0.4rem; font-size:0.75rem; color:var(--text-dim); }
        .swatch { width:24px; height:16px; border-radius:3px; }
        .swatch.p { background:linear-gradient(135deg,#FF6B35,#FF9559); border:1px solid rgba(255,107,53,0.6); }
        .swatch.l { background:linear-gradient(135deg,#00D9FF,#00A8CC); border:1px solid rgba(0,217,255,0.6); width:30px; height:14px; }
        .swatch.e { background:var(--dark-lighter); border:1px dashed rgba(255,255,255,0.1); }
        .roof-grid-wrap { overflow-x:auto; padding-bottom:0.3rem; }
        .roof-grid { display:inline-grid; gap:3px; padding:0.8rem; background:rgba(255,255,255,0.02); border-radius:10px; border:1px solid rgba(255,255,255,0.05); min-width:100%; }
        .cell { width:24px; height:24px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-size:0.55rem; font-weight:700; transition:transform 0.15s; cursor:default; }
        .cell:hover { transform:scale(1.35); z-index:10; }
        .cell.e { background:rgba(255,255,255,0.03); border:1px dashed rgba(255,255,255,0.07); }
        .cell.p { background:linear-gradient(135deg,#FF6B35,#FF9559); border:1px solid rgba(255,149,89,0.8); color:rgba(255,255,255,0.9); box-shadow:0 2px 4px rgba(255,107,53,0.4); }
        .cell.l { background:linear-gradient(135deg,#00D9FF,#00A8CC); border:1px solid rgba(0,217,255,0.8); color:rgba(0,30,50,0.9); box-shadow:0 2px 4px rgba(0,217,255,0.35); }
        .roof-stats { display:flex; gap:1.2rem; margin-top:0.8rem; flex-wrap:wrap; }
        .roof-stat  { display:flex; align-items:center; gap:0.3rem; font-size:0.8rem; color:var(--text-dim); }
        .roof-stat strong { color:var(--text); }
        .survey-viewer { background:var(--dark-light); padding:2rem; border-radius:16px; display:none; }
        .survey-viewer.active { display:block; }
        .report-header { border-bottom:3px solid var(--primary); padding-bottom:1.5rem; margin-bottom:2rem; }
        .metadata { background:var(--dark-lighter); padding:1.5rem; border-radius:12px; margin-top:1rem; display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:1rem; }
        .metadata-item { display:flex; flex-direction:column; gap:0.3rem; }
        .metadata-label { color:var(--text-dim); font-size:0.85rem; text-transform:uppercase; }
        .metadata-value { color:var(--text); font-size:1rem; font-weight:500; }
        .section { margin-bottom:2rem; }
        .section-title { font-family:'Syne',sans-serif; font-size:1.8rem; color:var(--accent); margin-bottom:1rem; padding-bottom:0.5rem; border-bottom:2px solid var(--dark-lighter); }
        .field-row { background:var(--dark-lighter); padding:1rem; border-radius:12px; margin-bottom:0.75rem; border-left:4px solid var(--primary); page-break-inside:avoid; }
        .field-question { font-weight:600; color:var(--text); margin-bottom:0.3rem; font-size:0.95rem; }
        .field-answer   { color:var(--text-dim); padding-left:1rem; font-size:0.9rem; word-wrap:break-word; overflow-wrap:break-word; }
        .field-photos   { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:0.75rem; margin-top:0.75rem; padding-top:0.75rem; border-top:1px solid var(--dark); }
        .photo-container { background:var(--dark); padding:0.5rem; border-radius:8px; border:2px solid var(--dark-lighter); display:flex; flex-direction:column; align-items:center; }
        .survey-photo { width:100%; max-width:100%; height:auto; border-radius:8px; border:2px solid var(--dark); display:block; }
        .action-buttons { display:flex; gap:1rem; margin-bottom:2rem; flex-wrap:wrap; }
        .am-section { background:rgba(181,123,255,0.08); border:1px solid rgba(181,123,255,0.3); border-radius:12px; padding:1.5rem; margin-bottom:0.75rem; }
        .am-section-title { font-family:'Syne',sans-serif; font-size:1.1rem; color:var(--kf); margin-bottom:1rem; padding-bottom:0.5rem; border-bottom:1px solid rgba(181,123,255,0.25); }
        .am-item { display:flex; align-items:baseline; gap:0.75rem; padding:0.5rem 0; border-bottom:1px solid rgba(255,255,255,0.05); font-size:0.88rem; }
        .am-item:last-child { border-bottom:none; }
        .am-bullet { color:var(--kf); font-size:0.7rem; flex-shrink:0; }
        .am-desc { flex:1; color:var(--text); }
        .am-qty { color:var(--kf); font-weight:700; background:rgba(181,123,255,0.12); border:1px solid rgba(181,123,255,0.3); padding:0.1rem 0.5rem; border-radius:4px; font-size:0.82rem; white-space:nowrap; }
        .am-empty { color:var(--text-dim); font-style:italic; font-size:0.88rem; }

        /* ══ PDF RIPPER PANEL ══ */
        .pdf-ripper-panel {
            background: var(--dark-lighter);
            border-radius: 14px;
            border: 2px solid rgba(255,200,87,0.4);
            padding: 1.5rem;
            margin-top: 2rem;
        }
        .pdf-ripper-header {
            display: flex; align-items: center; gap: 0.75rem;
            margin-bottom: 1.25rem; padding-bottom: 0.9rem;
            border-bottom: 2px solid rgba(255,200,87,0.2);
            flex-wrap: wrap;
        }
        .pdf-ripper-header h3 {
            font-family: 'Syne', sans-serif; font-size: 1.15rem; color: var(--secondary);
        }
        .pdf-ripper-badge {
            background: rgba(255,200,87,0.1); color: var(--secondary);
            padding: 0.2rem 0.7rem; border-radius: 20px; font-size: 0.72rem;
            font-weight: 600; border: 1px solid rgba(255,200,87,0.35);
        }
        .pdf-ripper-meta { margin-left: auto; color: var(--text-dim); font-size: 0.78rem; }
        .pdf-ripper-address {
            background: var(--dark); border-radius: 10px;
            padding: 0.9rem 1.1rem; margin-bottom: 1.25rem;
            border-left: 3px solid var(--secondary);
        }
        .pdf-ripper-address-label {
            font-size: 0.68rem; color: var(--text-dim); text-transform: uppercase;
            letter-spacing: 0.06em; margin-bottom: 0.35rem;
        }
        .pdf-ripper-address-value { font-size: 0.95rem; color: var(--text); font-weight: 500; }
        .pdf-ripper-images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.25rem;
        }
        .pdf-ripper-img-card {
            background: var(--dark); border-radius: 12px; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.07);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .pdf-ripper-img-card:hover {
            border-color: rgba(255,200,87,0.45);
            box-shadow: 0 4px 20px rgba(255,200,87,0.1);
        }
        .pdf-ripper-img-label {
            padding: 0.65rem 1rem; background: rgba(255,200,87,0.07);
            border-bottom: 1px solid rgba(255,200,87,0.15);
            font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700;
            color: var(--secondary); display: flex; align-items: center; gap: 0.5rem;
        }
        .pdf-ripper-img-wrap { padding: 0.75rem; }
        .pdf-ripper-img {
            width: 100%; height: auto; border-radius: 8px; display: block;
            cursor: zoom-in; transition: transform 0.2s;
        }
        .pdf-ripper-img:hover { transform: scale(1.015); }
        .pdf-ripper-img-actions {
            padding: 0.6rem 0.75rem; display: flex; gap: 0.5rem;
            border-top: 1px solid rgba(255,255,255,0.05); flex-wrap: wrap;
        }
        .pdf-ripper-action-btn {
            padding: 0.35rem 0.85rem; background: rgba(255,200,87,0.1);
            border: 1px solid rgba(255,200,87,0.3); color: var(--secondary);
            border-radius: 6px; font-size: 0.75rem; cursor: pointer;
            font-family: 'JetBrains Mono', monospace; transition: all 0.2s;
            text-decoration: none; display: inline-block;
        }
        .pdf-ripper-action-btn:hover { background: rgba(255,200,87,0.2); border-color: var(--secondary); }
        .pdf-ripper-text-card {
            background: var(--dark); border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.07); margin-top: 1.25rem;
        }
        .pdf-ripper-text-label {
            padding: 0.65rem 1rem; background: rgba(255,200,87,0.07);
            border-bottom: 1px solid rgba(255,200,87,0.15);
            font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700;
            color: var(--secondary); display: flex; align-items: center; gap: 0.5rem;
        }
        .pdf-ripper-text-body {
            padding: 1rem 1.1rem; font-size: 0.82rem; color: var(--text-dim);
            line-height: 1.7; max-height: 240px; overflow-y: auto;
            white-space: pre-wrap; word-break: break-word;
        }
        .pdf-ripper-text-body::-webkit-scrollbar { width: 5px; }
        .pdf-ripper-text-body::-webkit-scrollbar-track { background: transparent; }

function esc(t) { const d=document.createElement('div'); d.textContent=String(t||''); return d.innerHTML; }
function fmtVal(v) {

async function loadAndRenderPdfRipper(jobNumber) {
    const container = document.getElementById('pdf-ripper-display');
    container.innerHTML = '';
    if (!jobNumber || jobNumber === '—') return;

    container.innerHTML = '<div class="pdf-ripper-loading">⏳ Checking for PDF survey data…</div>';

    try {
        const { collection, getDocs, query, where } = window.firebaseModules;

        let pdfRipperData = null;

        // Primary lookup — field name is 'Job Number' (with spaces, capital letters)
        try {
            const q    = query(collection(window.db, 'jobs'), where('Job Number', '==', jobNumber));
            const snap = await getDocs(q);
            if (!snap.empty) pdfRipperData = snap.docs[0].data().pdfRipper || null;
        } catch(e) { console.warn('jobs "Job Number" query failed:', e.message); }

        // Fallback — lowercase jobNumber field
        if (!pdfRipperData) {
            try {
                const q2    = query(collection(window.db, 'jobs'), where('jobNumber', '==', jobNumber));
                const snap2 = await getDocs(q2);
                if (!snap2.empty) pdfRipperData = snap2.docs[0].data().pdfRipper || null;
            } catch(e) { console.warn('jobs "jobNumber" query failed:', e.message); }
        }

        if (!pdfRipperData) {
            container.innerHTML = '';   // nothing to show — silently hide
            return;
        }

        container.innerHTML = buildPdfRipperHTML(pdfRipperData);

    } catch(e) {
        console.warn('PDF Ripper lookup error:', e.message);
        container.innerHTML = '';
    }
}

function buildPdfRipperHTML(pr) {
    if (!pr) return '';

    const savedDate = pr.savedAt
        ? new Date(pr.savedAt).toLocaleDateString('en-GB', {day:'2-digit', month:'short', year:'numeric'})
        : '';

    // Address block
    const addressHTML = pr.address
        ? `<div class="pdf-ripper-address">
               <div class="pdf-ripper-address-label">📍 Extracted Address</div>
               <div class="pdf-ripper-address-value">${esc(pr.address)}</div>
           </div>`
        : '';

    // Image cards
    const cards = [];

    if (pr.proposedLayoutUrl) {
        const url = esc(pr.proposedLayoutUrl);
        cards.push(`
            <div class="pdf-ripper-img-card">
                <div class="pdf-ripper-img-label">🗺️ Proposed Layout <span style="font-weight:400;opacity:0.55;font-size:0.7rem;">(Page 3)</span></div>
                <div class="pdf-ripper-img-wrap">
                    <img class="pdf-ripper-img"
                         src="${url}"
                         alt="Proposed Layout"
                         onclick="openLightbox('${url}','Proposed Layout — Page 3')"
                         loading="lazy" />
                </div>
                <div class="pdf-ripper-img-actions">
                    <a class="pdf-ripper-action-btn" href="${url}" target="_blank" download>⬇️ Download</a>
                    <button class="pdf-ripper-action-btn" onclick="openLightbox('${url}','Proposed Layout — Page 3')">🔍 Full Size</button>
                </div>
            </div>`);
    }

    if (pr.siteAssessmentUrl) {
        const url = esc(pr.siteAssessmentUrl);
        cards.push(`
            <div class="pdf-ripper-img-card">
                <div class="pdf-ripper-img-label">📦 Site Assessment <span style="font-weight:400;opacity:0.55;font-size:0.7rem;">(Page 4)</span></div>
                <div class="pdf-ripper-img-wrap">
                    <img class="pdf-ripper-img"
                         src="${url}"
                         alt="Site Assessment"
                         onclick="openLightbox('${url}','Site Assessment — Page 4')"
                         loading="lazy" />
                </div>
                <div class="pdf-ripper-img-actions">
                    <a class="pdf-ripper-action-btn" href="${url}" target="_blank" download>⬇️ Download</a>
                    <button class="pdf-ripper-action-btn" onclick="openLightbox('${url}','Site Assessment — Page 4')">🔍 Full Size</button>
                </div>
            </div>`);
    }

    const imagesHTML = cards.length
        ? `<div class="pdf-ripper-images">${cards.join('')}</div>`
        : '';

    // Extracted text (scrollable)
    const textHTML = pr.siteAssessmentText
        ? `<div class="pdf-ripper-text-card">
               <div class="pdf-ripper-text-label">📄 Extracted Assessment Text</div>
               <div class="pdf-ripper-text-body">${esc(pr.siteAssessmentText)}</div>
           </div>`
        : '';

    // If there's truly nothing to show, return empty
    if (!addressHTML && !imagesHTML && !textHTML) return '';

    return `
        <div class="pdf-ripper-panel">
            <div class="pdf-ripper-header">
                <h3>📄 PDF Survey Data</h3>
                <span class="pdf-ripper-badge">PDF Ripper</span>
                ${savedDate ? `<span class="pdf-ripper-meta">Extracted ${savedDate}</span>` : ''}
            </div>
            ${addressHTML}
            ${imagesHTML}
            ${textHTML}
        </div>`;
}

// ══════════════════════════════════════════════════════

function renderAdditionalMaterials(items) {
    if (!items || (Array.isArray(items) && items.length === 0)) {
        return `<div class="section">
            <h2 class="section-title">🛠️ Additional Materials</h2>
            <div class="am-section"><p class="am-empty">No additional materials were requested for this survey.</p></div>
        </div>`;
    }
    const electrical=[], roof=[], other=[];
    items.forEach(item => {
        const str = typeof item==='string' ? item : JSON.stringify(item);
        const match = str.match(/^[•·-]?\s*(Electrical|Roof):\s*(.+?)\s*[×x]\s*(\d+)$/i);
        if(match){
            const cat=match[1].toLowerCase(), desc=match[2].trim(), qty=match[3];
            if(cat==='electrical') electrical.push({desc,qty});
            else roof.push({desc,qty});
        } else { other.push(str.replace(/^[•·-]\s*/,'').trim()); }
    });
    let html=`<div class="section"><h2 class="section-title">🛠️ Additional Materials</h2>`;
    if(electrical.length){ html+=`<div class="am-section"><div class="am-section-title">⚡ Electrical (${electrical.length} item${electrical.length!==1?'s':''})</div>`; electrical.forEach(({desc,qty})=>{ html+=`<div class="am-item"><span class="am-bullet">▸</span><span class="am-desc">${esc(desc)}</span><span class="am-qty">× ${esc(qty)}</span></div>`; }); html+=`</div>`; }
    if(roof.length){ html+=`<div class="am-section"><div class="am-section-title">🏠 Roof (${roof.length} item${roof.length!==1?'s':''})</div>`; roof.forEach(({desc,qty})=>{ html+=`<div class="am-item"><span class="am-bullet">▸</span><span class="am-desc">${esc(desc)}</span><span class="am-qty">× ${esc(qty)}</span></div>`; }); html+=`</div>`; }
    if(other.length){ html+=`<div class="am-section"><div class="am-section-title">📦 Other Items</div>`; other.forEach(line=>{ html+=`<div class="am-item"><span class="am-bullet">▸</span><span class="am-desc">${esc(line)}</span></div>`; }); html+=`</div>`; }
    if(!electrical.length&&!roof.length&&!other.length) html+=`<div class="am-section"><p class="am-empty">No additional materials were requested for this survey.</p></div>`;
    return html+`</div>`;
}

function applyFilters() {
    const search = document.getElementById('filter-search').value.toLowerCase().trim();
    const type   = document.getElementById('filter-type').value;
    const sort   = document.getElementById('filter-sort').value;
    filteredSurveys = allSurveys.filter(s => {
        const matchType   = !type   || s.source===type;
        const matchSearch = !search || s.jobNumber.toLowerCase().includes(search) || s.surveyor.toLowerCase().includes(search);
        return matchType && matchSearch;
    });
    filteredSurveys.sort((a,b) => {
        if(sort==='date-desc') return b.dateInfo.ts-a.dateInfo.ts;
        if(sort==='date-asc')  return a.dateInfo.ts-b.dateInfo.ts;
        if(sort==='job-asc')   return a.jobNumber.localeCompare(b.jobNumber);
        if(sort==='job-desc')  return b.jobNumber.localeCompare(a.jobNumber);
        return 0;
    });
    currentPage = 1;
    renderTable();
}
window.applyFilters = applyFilters;

function renderTable() {
    const tbody    = document.getElementById('surveys-tbody');
    const total    = filteredSurveys.length;
    const start    = (currentPage-1)*PAGE_SIZE;
    const end      = Math.min(start+PAGE_SIZE, total);
    const pageRows = filteredSurveys.slice(start, end);
    if (!total) {
        tbody.innerHTML = `<tr><td colspan="6" class="empty-state"><div class="icon">📋</div><div>No completed surveys found.</div></td></tr>`;
        document.getElementById('pagination-bar').style.display='none';
        return;
    }
    tbody.innerHTML = pageRows.map(s => {
        const gi = allSurveys.findIndex(a=>a.id===s.id&&a.source===s.source);
        return `<tr onclick="openSurveyFromDashboard(${gi})">
            <td class="td-job">${esc(s.jobNumber)}</td>
            <td class="td-surveyor">${esc(s.surveyor)}</td>
            <td><span class="type-badge ${typeBadgeClass(s.source)}">${esc(typeLabel(s.source))}</span></td>
            <td class="td-date">${esc(s.dateInfo.display)}</td>
            <td><span class="status-completed">✓ Completed</span></td>
            <td class="td-action"><button class="btn btn-sm" onclick="event.stopPropagation();openSurveyFromDashboard(${gi})">View →</button></td>
        </tr>`;
    }).join('');
    const totalPages = Math.ceil(total/PAGE_SIZE);
    document.getElementById('page-info').textContent = `Showing ${start+1}–${end} of ${total}`;
    const pBtns = document.getElementById('page-btns');
    let btns = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
    for(let p=1;p<=totalPages;p++){
        if(totalPages<=7||p===1||p===totalPages||Math.abs(p-currentPage)<=1)
            btns+=`<button class="page-btn ${p===currentPage?'active':''}" onclick="goPage(${p})">${p}</button>`;
        else if(Math.abs(p-currentPage)===2)
            btns+=`<span style="color:var(--text-dim);padding:0 0.3rem;">…</span>`;
    }
    btns+=`<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
    pBtns.innerHTML = btns;
    document.getElementById('pagination-bar').style.display='flex';
}
function goPage(p) {
    const total=Math.ceil(filteredSurveys.length/PAGE_SIZE);
    if(p<1||p>total) return;
    currentPage=p; renderTable();
    document.getElementById('dashboard-panel').scrollIntoView({behavior:'smooth'});
}

        });

        html+='<div class="section"><h2 class="section-title">All Fields</h2>';
        Object.keys(currentDocument.data).forEach(k=>{
            if(k==='sections') return;
            const q=QT[k]||k.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase());
            html+=`<div class="field-row"><div class="field-question">${q}</div><div class="field-answer">${smartFmt(currentDocument.data[k])}</div></div>`;
        });

    const jobNum = currentDocument.data.jobNumber || currentDocument.data['Job Number'] || '';

}

function renderSection(secKey,data){
    const title=secKey.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase()).trim();
    const order=FIELD_ORDER[secKey]||Object.keys(data).sort();
    let html=`<div class="section"><h2 class="section-title">${title}</h2>`;
    order.forEach(key=>{
        if(key.endsWith('Photos')) return;
        const val=data[key]; const photos=data[key+'Photos']||[];
        if((val==null||val==='')&&!photos.length) return;
        const q=QT[key]||key.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase()).trim();
        html+=`<div class="field-row"><div class="field-question">${q}</div><div class="field-answer">${smartFmt(val)}</div>`;
        if(photos.length){
            html+='<div class="field-photos">';
            photos.forEach((p,i)=>{ const src=typeof p==='string'?p:''; html+=`<div class="photo-container"><img src="${src}" class="survey-photo" alt="Photo ${i+1}" loading="lazy"/></div>`; });
            html+='</div>';
        }
        html+='</div>';
    });
    return html+'</div>';
}

function smartFmt(v){
    if(v==null||v==='') return 'N/A';
    if(typeof v==='boolean') return v?'Yes':'No';
    if(typeof v==='number') return v.toString();
    if(Array.isArray(v)){
        if(v.length&&typeof v[0]==='string'&&(v[0].startsWith('data:image')||v[0].startsWith('http')))
            return `<span style="color:var(--accent)">${v.length} photo(s) attached</span>`;
        return v.join(', ')||'N/A';
    }
    if(typeof v==='object'){
        const ks=Object.keys(v);
        if(ks.length>3) return `<span style="color:var(--text-dim)">Object (${ks.length} properties)</span>`;
        return `<pre style="font-size:0.8rem;padding:0.5rem;background:var(--dark);border-radius:4px;overflow-x:auto;white-space:pre-wrap">${JSON.stringify(v,null,2)}</pre>`;
    }
    if(typeof v==='string'){
        if(v.startsWith('data:image')) return `<img src="${v}" class="survey-photo" style="max-width:300px;border-radius:8px;margin-top:0.5rem" loading="lazy"/>`;
        if((v.startsWith('http://')||v.startsWith('https://'))&&(v.includes('firebasestorage')||/\.(jpg|jpeg|png|gif|webp)$/i.test(v)))
            return `<img src="${v}" class="survey-photo" style="max-width:300px;border-radius:8px;margin-top:0.5rem" loading="lazy"/>`;
    }
    return esc(v);
}

function collectScaffoldPhotos(data){
    const urls=[]; const scData=data.sections?.scaffolding||{};
    FIELD_ORDER.scaffolding.filter(k=>k.endsWith('Photos')).forEach(pk=>{ (scData[pk]||[]).forEach(url=>{ if(typeof url==='string'&&(url.startsWith('http')||url.startsWith('data:image'))) urls.push({url,key:pk}); }); });
    return urls;
}
async function downloadScaffoldPack(){
    if(!currentDocument) return showAlert('No document loaded');
    const data=currentDocument.data; const jobNumber=data.jobNumber||'unknown';
    const scData=data.sections?.scaffolding||{}; const scFields=FIELD_ORDER.scaffolding.filter(k=>!k.endsWith('Photos'));
    const hasScaffold=scFields.some(k=>scData[k]!=null&&scData[k]!==''); const photoUrls=collectScaffoldPhotos(data);
    if(!hasScaffold&&!photoUrls.length&&!currentPicklist) return showAlert('No scaffolding data found');
    showAlert('Building scaffold pack…','success');
    try{
        const{jsPDF}=window.jspdf; const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
        const PW=210,PH=297,M=14,CW=PW-M*2; let y=M;
        const ORANGE=[255,107,53],GREY=[140,140,160],BLACK=[30,30,30],CYAN=[0,180,210],DARK=[26,26,46],WHITE=[255,255,255];
        function drawTopStripe(){doc.setFillColor(...ORANGE);doc.rect(0,0,PW,7,'F');}
        function checkY(need=10){if(y+need>PH-10){doc.addPage();y=M;drawTopStripe();}}
        function sectionBar(label,colour=ORANGE){checkY(11);doc.setFillColor(...colour);doc.roundedRect(M,y,CW,8,1,1,'F');doc.setTextColor(...WHITE);doc.setFontSize(9);doc.setFont('helvetica','bold');doc.text(stripEmoji(label).toUpperCase(),M+4,y+5.5);y+=11;}
        function specRow(label,value,idx){const safeLabel=stripEmoji(label);const lines=doc.splitTextToSize(String(value||'—'),CW-76);const rowH=Math.max(10,5+lines.length*4.5);checkY(rowH+1);const bg=idx%2===0?[247,247,252]:[255,255,255];doc.setFillColor(...bg);doc.rect(M,y,CW,rowH,'F');doc.setFillColor(...CYAN);doc.rect(M,y,2,rowH,'F');doc.setTextColor(...GREY);doc.setFontSize(6.8);doc.setFont('helvetica','normal');doc.text(doc.splitTextToSize(safeLabel.toUpperCase(),68)[0],M+4,y+4);doc.setTextColor(...BLACK);doc.setFontSize(8.5);doc.setFont('helvetica','bold');lines.forEach((ln,li)=>doc.text(ln,M+4,y+8.5+li*4.5));y+=rowH+1;}
        drawTopStripe();y=15;doc.setFillColor(...DARK);doc.roundedRect(M,y,CW,26,3,3,'F');doc.setTextColor(...WHITE);doc.setFontSize(17);doc.setFont('helvetica','bold');doc.text('SCAFFOLD INFORMATION PACK',M+6,y+12);doc.setFontSize(8.5);doc.setFont('helvetica','normal');doc.setTextColor(...GREY);doc.text(`Job: ${jobNumber}   ·   Generated: ${new Date().toLocaleDateString('en-GB')} ${new Date().toLocaleTimeString('en-GB')}`,M+6,y+21);y+=32;
        if(hasScaffold){sectionBar('🏗️ Scaffolding Survey',ORANGE);scFields.forEach((key,i)=>{const val=scData[key];if(val==null||val==='')return;const q=QT[key]||key.replace(/([A-Z])/g,' $1').replace(/^./,s=>s.toUpperCase()).trim();specRow(q,fmtVal(val),i);});y+=3;}
        let scaffoldImageEntries=[];
        if(photoUrls.length>0){showAlert('Fetching photos…','success');try{const cfRes=await fetch('https://us-central1-pingu-solar.cloudfunctions.net/downloadPhotosPack',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({collection:currentDocument.source,documentId:currentDocument.id})});if(!cfRes.ok)throw new Error('Photo fetch failed');const fullZipBlob=await cfRes.blob();const fullZip=await JSZip.loadAsync(fullZipBlob);const scaffoldFilenames=new Set(photoUrls.map(item=>{try{const match=item.url.match(/\/o\/([^?]+)/);if(match)return decodeURIComponent(match[1]).split('/').pop();}catch(e){}return null;}).filter(Boolean));const filenameToCaptionKey={};photoUrls.forEach(item=>{try{const match=item.url.match(/\/o\/([^?]+)/);if(match)filenameToCaptionKey[decodeURIComponent(match[1]).split('/').pop()]=item.key;}catch(e){}});const allEntries=Object.values(fullZip.files).filter(f=>!f.dir&&/\.(jpg|jpeg|png|gif|webp)$/i.test(f.name));let filtered=allEntries.filter(f=>scaffoldFilenames.has(f.name.split('/').pop()));if(filtered.length===0&&allEntries.length>=photoUrls.length){filtered=allEntries.sort((a,b)=>a.name.localeCompare(b.name)).slice(-photoUrls.length);}for(let idx=0;idx<filtered.length;idx++){const entry=filtered[idx];const zipFilename=entry.name.split('/').pop();const blob=await entry.async('blob');const b64=await new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.readAsDataURL(blob);});const{w,h}=await new Promise(res=>{const img=new Image();img.onload=()=>res({w:img.naturalWidth||800,h:img.naturalHeight||600});img.onerror=()=>res({w:800,h:600});img.src=b64;});const captionKey=filenameToCaptionKey[zipFilename]||entry.name;const caption=captionKey.replace(/Photos$/,'').replace(/\.[^.]+$/,'').replace(/([A-Z])/g,' $1').replace(/_/g,' ').trim();scaffoldImageEntries.push({name:entry.name,blob,b64,w,h,caption});}}catch(fetchErr){showAlert('Warning: could not load photos — '+fetchErr.message);}}
        if(scaffoldImageEntries.length>0){sectionBar(`Scaffolding Photos (${scaffoldImageEntries.length})`,ORANGE);const IW=(CW-5)/2,MAX_H=74;for(let i=0;i<scaffoldImageEntries.length;i+=2){const imgL=scaffoldImageEntries[i],imgR=scaffoldImageEntries[i+1]||null;const placeImg=(entry,xOff)=>{if(!entry)return 0;const aspect=entry.w/entry.h;let iw=IW,ih=iw/aspect;if(ih>MAX_H){ih=MAX_H;iw=ih*aspect;}const xPos=M+xOff+(IW-iw)/2;doc.addImage(entry.b64,entry.b64.includes('image/png')?'PNG':'JPEG',xPos,y,iw,ih);doc.setFontSize(6.5);doc.setFont('helvetica','normal');doc.setTextColor(...GREY);doc.text(`Photo ${i+(xOff===0?1:2)}: ${stripEmoji(entry.caption)}`,M+xOff,y+ih+4);return ih+6;};checkY(MAX_H+14);const hL=placeImg(imgL,0),hR=placeImg(imgR,IW+5);if(Math.max(hL,hR)>0)y+=Math.max(hL,hR)+3;}}
        const total=doc.getNumberOfPages();for(let p=1;p<=total;p++){doc.setPage(p);doc.setFillColor(...ORANGE);doc.rect(0,PH-7,PW,7,'F');doc.setTextColor(...WHITE);doc.setFontSize(7);doc.setFont('helvetica','normal');doc.text(`Pingu Solar  ·  Job: ${jobNumber}  ·  Scaffold Pack`,M,PH-2.5);doc.text(`Page ${p} of ${total}`,PW-M,PH-2.5,{align:'right'});}
        doc.save(`${jobNumber}_scaffold_pack.pdf`);
        if(scaffoldImageEntries.length>0){showAlert('PDF saved! Zipping scaffold photos…','success');const zip=new JSZip(),folder=zip.folder('scaffold_photos');scaffoldImageEntries.forEach((entry,idx)=>{const ext=entry.blob.type.includes('png')?'png':'jpg';const cap=entry.caption.replace(/\s+/g,'_').toLowerCase().replace(/[^a-z0-9_]/g,'');folder.file(`scaffold_${String(idx+1).padStart(2,'0')}_${cap}.${ext}`,entry.blob);});const zipBlob=await zip.generateAsync({type:'blob'});const a=document.createElement('a');a.href=URL.createObjectURL(zipBlob);a.download=`${jobNumber}_scaffold_photos.zip`;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(a.href);}
        showAlert('✅ Scaffold pack complete!','success');
    }catch(err){ console.error(err); showAlert('Error generating scaffold pack: '+err.message); }
}
window.downloadScaffoldPack=downloadScaffoldPack;

function printSurvey(){ window.print(); }
window.printSurvey=printSurvey;

function backToDashboard(){
    document.getElementById('survey-viewer').classList.remove('active');
    document.getElementById('pdf-ripper-display').innerHTML='';
    document.getElementById('dashboard-panel').style.display='block';
    document.getElementById('manual-lookup').style.display='block';
    window.scrollTo(0,0);
}
window.backToDashboard=backToDashboard;

function waitForFirebase(cb,attempts=0){
    if(window.db&&window.firebaseModules){ cb(); }
    else if(attempts<40){ setTimeout(()=>waitForFirebase(cb,attempts+1),150); }
    else{ showAlert('Firebase failed to initialise.'); }
}
waitForFirebase(()=>reloadAllSurveys());
