<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Database | Pingu - Solar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --secondary: #FFC857;
            --accent: #00D9FF;
            --dark: #1A1A2E;
            --dark-light: #252541;
            --dark-lighter: #2F2F4A;
            --text: #EAEAEA;
            --text-dim: #9A9AB0;
            --success: #4ECCA3;
            --error: #FF6B6B;
            --shadow: rgba(255, 107, 53, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--dark);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(255,107,53,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0,217,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255,200,87,0.06) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes float {
            0%,100% { transform: translate(0,0) rotate(0deg); }
            33% { transform: translate(30px,-30px) rotate(120deg); }
            66% { transform: translate(-20px,20px) rotate(240deg); }
        }

        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }

        header { margin-bottom: 2.5rem; animation: slideDown 0.8s ease-out; }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header-content {
            display: flex; align-items: center;
            justify-content: space-between; flex-wrap: wrap; gap: 1rem;
            margin-bottom: 1rem;
        }

        .logo {
            font-family: 'Syne', sans-serif;
            font-size: 2rem; font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            text-decoration: none;
        }

        .back-btn {
            background: var(--dark-light); color: var(--text);
            text-decoration: none; padding: 0.7rem 1.5rem;
            border-radius: 8px; font-size: 0.9rem;
            transition: all 0.3s ease; border: 2px solid transparent;
        }
        .back-btn:hover { background: var(--dark-lighter); border-color: var(--primary); transform: translateX(-5px); }

        h1 { font-family: 'Syne', sans-serif; font-size: 2.5rem; margin-bottom: 0.3rem; }
        .subtitle { color: var(--text-dim); font-size: 0.95rem; }

        .global-stats {
            display: flex; gap: 1.5rem; flex-wrap: wrap;
            margin-bottom: 2rem;
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stat-card {
            background: var(--dark-light); border-radius: 12px;
            padding: 1.2rem 2rem; border: 2px solid var(--dark-lighter); min-width: 140px;
        }
        .stat-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .stat-value {
            font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        .main-layout {
            display: grid;
            grid-template-columns: 420px 1fr;
            gap: 2rem;
            animation: fadeInUp 0.8s ease-out 0.4s both;
        }

        .build-panel {
            background: var(--dark-light); border-radius: 16px;
            padding: 2rem; border: 2px solid transparent;
            height: fit-content; position: sticky; top: 2rem;
            transition: border-color 0.3s;
        }
        .build-panel:focus-within { border-color: var(--primary); }

        .panel-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.8rem; }
        .panel-icon { font-size: 1.8rem; }
        .panel-header h2 { font-family: 'Syne', sans-serif; font-size: 1.4rem; }

        .form-group { margin-bottom: 1.2rem; }
        .form-group label {
            display: block; color: var(--text-dim); font-size: 0.78rem;
            text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.4rem;
        }

        .form-input {
            width: 100%;
            background: var(--dark-lighter); border: 2px solid var(--dark-lighter);
            color: var(--text); padding: 0.85rem 1rem;
            border-radius: 8px; font-family: 'JetBrains Mono', monospace;
            font-size: 0.9rem; transition: all 0.3s ease;
        }
        .form-input:focus { outline: none; border-color: var(--primary); background: var(--dark); }
        .form-input::placeholder { color: var(--text-dim); opacity: 0.6; }

        .section-divider {
            display: flex; align-items: center; gap: 1rem;
            margin: 1.5rem 0 1.2rem;
        }
        .section-divider span {
            font-family: 'Syne', sans-serif; font-size: 0.9rem;
            font-weight: 700; color: var(--secondary); white-space: nowrap;
        }
        .section-divider::before, .section-divider::after {
            content: ''; flex: 1; height: 1px; background: var(--dark-lighter);
        }

        .lead-block {
            background: rgba(255,200,87,0.07);
            border: 1px solid rgba(255,200,87,0.2);
            border-radius: 12px; padding: 1.2rem; margin-bottom: 1.2rem;
        }
        .lead-block .form-group { margin-bottom: 0.8rem; }
        .lead-block .form-group:last-child { margin-bottom: 0; }

        .engineer-slots { display: flex; flex-direction: column; gap: 0.8rem; }

        .engineer-slot {
            background: var(--dark-lighter); border-radius: 10px;
            padding: 1rem 1rem 0.8rem; border: 2px solid transparent;
            position: relative; transition: border-color 0.3s;
        }
        .engineer-slot:focus-within { border-color: rgba(0,217,255,0.4); }

        .slot-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 0.7rem;
        }
        .slot-num { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--accent); }
        .slot-remove {
            background: none; border: none; color: var(--text-dim);
            cursor: pointer; font-size: 0.78rem; line-height: 1;
            padding: 3px 8px; border-radius: 4px; transition: all 0.2s;
            font-family: 'JetBrains Mono', monospace;
        }
        .slot-remove:hover { color: var(--error); background: rgba(255,107,107,0.1); }

        .add-engineer-btn {
            display: flex; align-items: center; gap: 0.7rem;
            background: transparent; border: 2px dashed var(--dark-lighter);
            color: var(--text-dim); padding: 0.8rem 1rem;
            border-radius: 8px; font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem; cursor: pointer; transition: all 0.3s ease;
            width: 100%; justify-content: center; margin-top: 0.8rem;
        }
        .add-engineer-btn:hover { border-color: var(--accent); color: var(--accent); }

        .submit-btn {
            width: 100%; padding: 1.1rem; margin-top: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white; border: none; border-radius: 12px;
            font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s ease;
        }
        .submit-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 30px var(--shadow); }
        .submit-btn:disabled { background: var(--dark-lighter); cursor: not-allowed; transform: none; box-shadow: none; }

        .teams-panel { display: flex; flex-direction: column; gap: 1.5rem; }

        .team-card {
            background: var(--dark-light); border-radius: 16px;
            border: 2px solid var(--dark-lighter); overflow: hidden;
            transition: border-color 0.3s;
        }
        .team-card:hover { border-color: rgba(255,107,53,0.35); }

        .team-card-header {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1.4rem 1.8rem;
            border-bottom: 2px solid var(--dark-lighter);
        }

        .team-card-title { display: flex; align-items: center; gap: 1rem; }
        .team-emoji { font-size: 1.8rem; }
        .team-name-display { font-family: 'Syne', sans-serif; font-size: 1.25rem; font-weight: 700; }
        .team-meta { color: var(--text-dim); font-size: 0.8rem; margin-top: 0.1rem; }
        .team-card-actions { display: flex; gap: 0.6rem; align-items: center; }

        .chip { padding: 0.3rem 0.8rem; border-radius: 20px; font-size: 0.72rem; font-weight: 600; }
        .chip.lead { background: rgba(255,200,87,0.15); color: var(--secondary); }
        .chip.members { background: rgba(0,217,255,0.1); color: var(--accent); }

        .btn-icon {
            background: var(--dark-lighter); border: none; color: var(--text-dim);
            width: 36px; height: 36px; border-radius: 8px;
            cursor: pointer; font-size: 0.95rem; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-icon:hover { background: var(--primary); color: white; }
        .btn-icon.delete:hover { background: var(--error); }

        .team-body { padding: 1.5rem 1.8rem; }

        .lead-row {
            display: flex; align-items: center; gap: 1rem;
            padding: 1rem 1.2rem;
            background: rgba(255,200,87,0.07);
            border: 1px solid rgba(255,200,87,0.2);
            border-radius: 10px; margin-bottom: 1.2rem;
        }
        .lead-avatar {
            width: 46px; height: 46px; border-radius: 50%;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1rem;
            color: var(--dark); flex-shrink: 0;
        }
        .lead-info-name {
            font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 600;
            display: flex; align-items: center; gap: 0.6rem;
        }
        .badge-lead {
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            color: var(--dark); font-size: 0.62rem; padding: 0.2rem 0.6rem;
            border-radius: 20px; font-weight: 700; text-transform: uppercase;
        }
        .engineers-label {
            color: var(--text-dim); font-size: 0.72rem; text-transform: uppercase;
            letter-spacing: 0.1em; margin-bottom: 0.8rem;
        }

        .engineers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
            gap: 0.8rem;
        }

        .engineer-card {
            background: var(--dark-lighter); border-radius: 10px;
            padding: 0.9rem 1rem; display: flex; align-items: center; gap: 0.8rem;
            border: 1px solid transparent; transition: border-color 0.2s;
        }
        .engineer-card:hover { border-color: rgba(0,217,255,0.3); }

        .eng-avatar {
            width: 38px; height: 38px; border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            display: flex; align-items: center; justify-content: center;
            font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.82rem;
            color: white; flex-shrink: 0;
        }
        .eng-name { font-size: 0.88rem; font-weight: 500; }
        .empty-state { text-align: center; padding: 4rem 2rem; color: var(--text-dim); }
        .empty-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.4; }
        .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--text); }

        .modal {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            z-index: 1000; align-items: center; justify-content: center;
        }
        .modal.show { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .modal-content {
            background: var(--dark-light); border-radius: 16px;
            padding: 2.5rem; max-width: 660px; width: 93%;
            max-height: 88vh; overflow-y: auto;
            border: 2px solid var(--primary);
            animation: slideUp 0.35s ease;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 2rem;
        }
        .modal-title { font-family: 'Syne', sans-serif; font-size: 1.6rem; }
        .close-btn {
            background: none; border: none; color: var(--text-dim);
            font-size: 2rem; cursor: pointer; line-height: 1; transition: color 0.2s;
        }
        .close-btn:hover { color: var(--error); }

        .modal-buttons { display: flex; gap: 1rem; margin-top: 2rem; }
        .btn {
            flex: 1; padding: 1rem; border: none; border-radius: 8px;
            font-family: 'Syne', sans-serif; font-size: 1rem; font-weight: 600;
            cursor: pointer; transition: all 0.3s ease;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 20px var(--shadow); }
        .btn-danger { background: var(--error); color: white; }
        .btn-danger:hover { background: #d95555; transform: translateY(-2px); }
        .btn-secondary { background: var(--dark-lighter); color: var(--text); }
        .btn-secondary:hover { background: var(--dark); }

        .toast {
            position: fixed; top: 2rem; right: 2rem;
            padding: 1rem 1.5rem; border-radius: 8px; font-size: 0.9rem;
            z-index: 1100; display: none;
        }
        .toast.show { display: block; animation: slideInRight 0.4s ease; }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(100px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .toast.success { background: var(--success); color: var(--dark); }
        .toast.error { background: var(--error); color: white; }

        @media (max-width: 1024px) {
            .main-layout { grid-template-columns: 1fr; }
            .build-panel { position: static; }
        }
        @media (max-width: 600px) {
            .modal-buttons { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="header-content">
            <a href="index.html" class="logo">Pingu - Solar</a>
            <a href="index.html" class="back-btn">← Back to Home</a>
        </div>
        <h1>Team Database</h1>
        <p class="subtitle">Create and manage installation teams with lead engineers</p>
    </header>

    <div class="global-stats">
        <div class="stat-card">
            <div class="stat-label">Total Teams</div>
            <div class="stat-value" id="stat-teams">0</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Total Engineers</div>
            <div class="stat-value" id="stat-engs">0</div>
        </div>
    </div>

    <div class="main-layout">

        <!-- Build Panel -->
        <div class="build-panel">
            <div class="panel-header">
                <span class="panel-icon">🔧</span>
                <h2>Create a Team</h2>
            </div>

            <form id="build-form" onsubmit="saveTeam(event)">
                <div class="section-divider"><span>⭐ Lead Engineer</span></div>

                <div class="lead-block">
                    <div class="form-group">
                        <label for="lead-name">Full Name *</label>
                        <input type="text" id="lead-name" class="form-input" placeholder="e.g. James Carter" required />
                    </div>
                </div>

                <div class="section-divider"><span>👷 Engineers</span></div>

                <div class="engineer-slots" id="engineer-slots"></div>

                <button type="button" class="add-engineer-btn" onclick="addSlot('engineer-slots','add')">
                    ＋ Add Engineer
                </button>

                <button type="submit" class="submit-btn" id="submit-btn">Create Team</button>
            </form>
        </div>

        <!-- Teams List -->
        <div class="teams-panel" id="teams-panel">
            <div class="empty-state">
                <div class="empty-icon">👷</div>
                <h3>No Teams Yet</h3>
                <p>Create your first team using the panel on the left</p>
            </div>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal" id="edit-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title">Edit Team</h2>
            <button class="close-btn" onclick="closeModal()">×</button>
        </div>
        <form id="edit-form" onsubmit="updateTeam(event)">
            <input type="hidden" id="edit-id" />

            <div class="section-divider"><span>⭐ Lead Engineer</span></div>
            <div class="lead-block">
                <div class="form-group">
                    <label for="edit-lead-name">Full Name *</label>
                    <input type="text" id="edit-lead-name" class="form-input" required />
                </div>
            </div>

            <div class="section-divider"><span>👷 Engineers</span></div>
            <div class="engineer-slots" id="edit-slots"></div>
            <button type="button" class="add-engineer-btn" onclick="addSlot('edit-slots','edit')">
                ＋ Add Engineer
            </button>

            <div class="modal-buttons">
                <button type="button" class="btn btn-danger" onclick="deleteTeam()">Delete Team</button>
                <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                <button type="submit" class="btn btn-primary">Save Changes</button>
            </div>
        </form>
    </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy }
        from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyAc_yJQ_rkzuOBh-Yxg0Q4eooXtB-tQjm0",
        authDomain: "pingu-solar.firebaseapp.com",
        projectId: "pingu-solar",
        storageBucket: "pingu-solar.appspot.com",
        messagingSenderId: "232764952866",
        appId: "1:232764952866:web:5923b7f419de6355d6157b",
        measurementId: "G-PFH059DZ64"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    window.db = db;
    window.FM = { collection, addDoc, getDocs, doc, updateDoc, deleteDoc, query, orderBy };
    window.addEventListener('DOMContentLoaded', () => window.initPage());
</script>

<script>
    let allTeams = [];
    let editingId = null;
    let addSlotCount = 0;
    let editSlotCount = 0;

    const EMOJIS = ['⚡','🔆','🌞','🔋','🌿','⚙️','🛠️','💡','🏗️','🔌','🚀','🔥'];

    window.initPage = async function() {
        await loadTeams();
    };

    window.addSlot = function(containerId, mode) {
        const container = document.getElementById(containerId);
        if (mode === 'add') addSlotCount++;
        else editSlotCount++;
        const num = mode === 'add' ? addSlotCount : editSlotCount;
        const slotId = `${mode}-eng-${num}`;

        const div = document.createElement('div');
        div.className = 'engineer-slot';
        div.id = slotId;
        div.innerHTML = `
            <div class="slot-header">
                <span class="slot-num">Engineer #${num}</span>
                <button type="button" class="slot-remove" onclick="removeSlot('${slotId}')">✕ Remove</button>
            </div>
            <input type="text" class="form-input eng-name" placeholder="Full Name *" />
        `;
        container.appendChild(div);
    };

    window.removeSlot = function(id) {
        const el = document.getElementById(id);
        if (el) el.remove();
    };

    function collectEngineers(containerId) {
        const slots = document.querySelectorAll('#' + containerId + ' .engineer-slot');
        const result = [];
        slots.forEach(slot => {
            const name = slot.querySelector('.eng-name')?.value.trim() || '';
            if (name) result.push({ name });
        });
        return result;
    }

    window.saveTeam = async function(e) {
        e.preventDefault();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true; btn.textContent = 'Saving...';

        const leadName  = document.getElementById('lead-name').value.trim();
        const engineers = collectEngineers('engineer-slots');

        try {
            const { collection, addDoc } = window.FM;
            await addDoc(collection(window.db, 'team-database'), {
                emoji: EMOJIS[Math.floor(Math.random() * EMOJIS.length)],
                lead: { name: leadName },
                engineers: engineers,
                createdAt: new Date().toISOString()
            });
            showToast('Team created! 🎉', 'success');
            document.getElementById('build-form').reset();
            document.getElementById('engineer-slots').innerHTML = '';
            addSlotCount = 0;
            await loadTeams();
        } catch (err) {
            showToast('Error: ' + err.message, 'error');
        } finally {
            btn.disabled = false; btn.textContent = 'Create Team';
        }
    };

    async function loadTeams() {
        try {
            const { collection, getDocs, query, orderBy } = window.FM;
            const snap = await getDocs(query(collection(window.db, 'team-database'), orderBy('createdAt','desc')));
            allTeams = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            renderTeams();
            updateStats();
        } catch (err) {
            showToast('Error loading teams: ' + err.message, 'error');
        }
    }

    function renderTeams() {
        const panel = document.getElementById('teams-panel');
        if (allTeams.length === 0) {
            panel.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">👷</div>
                    <h3>No Teams Yet</h3>
                    <p>Create your first team using the panel on the left</p>
                </div>`;
            return;
        }

        panel.innerHTML = allTeams.map(team => {
            const engs = team.engineers || [];
            return `
            <div class="team-card">
                <div class="team-card-header">
                    <div class="team-card-title">
                        <span class="team-emoji">${team.emoji || '⚡'}</span>
                        <div>
                            <div class="team-name-display">${esc(team.lead?.name || '—')}'s Team</div>
                            <div class="team-meta">${engs.length} engineer${engs.length !== 1 ? 's' : ''}</div>
                        </div>
                    </div>
                    <div class="team-card-actions">
                        <span class="chip lead">Lead ✓</span>
                        <span class="chip members">${engs.length} eng</span>
                        <button class="btn-icon" title="Edit" onclick="openEdit('${team.id}')">✏️</button>
                        <button class="btn-icon delete" title="Delete" onclick="quickDelete('${team.id}')">🗑️</button>
                    </div>
                </div>
                <div class="team-body">
                    <div class="lead-row">
                        <div class="lead-avatar">${initials(team.lead?.name)}</div>
                        <div>
                            <div class="lead-info-name">
                                ${esc(team.lead?.name || '—')}
                                <span class="badge-lead">Lead</span>
                            </div>
                        </div>
                    </div>
                    ${engs.length > 0 ? `
                        <div class="engineers-label">Team Engineers</div>
                        <div class="engineers-grid">
                            ${engs.map(eng => `
                            <div class="engineer-card">
                                <div class="eng-avatar">${initials(eng.name)}</div>
                                <div>
                                    <div class="eng-name">${esc(eng.name)}</div>
                                </div>
                            </div>`).join('')}
                        </div>
                    ` : '<p style="color:var(--text-dim);font-size:0.85rem;margin-top:0.3rem;">No engineers assigned.</p>'}
                </div>
            </div>`;
        }).join('');
    }

    window.openEdit = function(teamId) {
        const team = allTeams.find(t => t.id === teamId);
        if (!team) return;
        editingId = teamId;

        document.getElementById('edit-id').value = teamId;
        document.getElementById('edit-team-name').value = team.name;
        document.getElementById('edit-lead-name').value = team.lead?.name || '';

        const slotsEl = document.getElementById('edit-slots');
        slotsEl.innerHTML = '';
        editSlotCount = 0;

        (team.engineers || []).forEach(eng => {
            addSlot('edit-slots', 'edit');
            const slot = slotsEl.lastElementChild;
            slot.querySelector('.eng-name').value = eng.name || '';
        });

        document.getElementById('edit-modal').classList.add('show');
    };

    window.closeModal = function() {
        document.getElementById('edit-modal').classList.remove('show');
        editingId = null;
    };

    window.updateTeam = async function(e) {
        e.preventDefault();
        if (!editingId) return;

        const leadName  = document.getElementById('edit-lead-name').value.trim();
        const engineers = collectEngineers('edit-slots');

        try {
            const { doc, updateDoc } = window.FM;
            await updateDoc(doc(window.db, 'team-database', editingId), {
                lead: { name: leadName },
                engineers,
                updatedAt: new Date().toISOString()
            });
            showToast('Team updated!', 'success');
            closeModal();
            await loadTeams();
        } catch (err) {
            showToast('Error: ' + err.message, 'error');
        }
    };

    window.deleteTeam = async function() {
        if (!editingId) return;
        if (!confirm('Delete this team? This cannot be undone.')) return;
        try {
            const { doc, deleteDoc } = window.FM;
            await deleteDoc(doc(window.db, 'team-database', editingId));
            showToast('Team deleted', 'success');
            closeModal();
            await loadTeams();
        } catch (err) {
            showToast('Error: ' + err.message, 'error');
        }
    };

    window.quickDelete = async function(teamId) {
        if (!confirm('Delete this team? This cannot be undone.')) return;
        try {
            const { doc, deleteDoc } = window.FM;
            await deleteDoc(doc(window.db, 'team-database', teamId));
            showToast('Team deleted', 'success');
            await loadTeams();
        } catch (err) {
            showToast('Error: ' + err.message, 'error');
        }
    };

    function updateStats() {
        document.getElementById('stat-teams').textContent = allTeams.length;
        const total = allTeams.reduce((sum, t) => sum + (t.engineers?.length || 0), 0);
        document.getElementById('stat-engs').textContent = total;
    }

    function initials(name) {
        return (name || '?').split(' ').map(w => w[0]).join('').toUpperCase().substring(0, 2);
    }

    function esc(text) {
        const d = document.createElement('div');
        d.textContent = text || '';
        return d.innerHTML;
    }

    function showToast(msg, type) {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'toast ' + type + ' show';
        setTimeout(() => el.classList.remove('show'), 3500);
    }

    document.getElementById('edit-modal').addEventListener('click', e => {
        if (e.target.id === 'edit-modal') closeModal();
    });
</script>
</body>
</html>
