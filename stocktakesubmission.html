<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stocktake | Pingu - Solar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --secondary: #FFC857;
            --accent: #00D9FF;
            --dark: #1A1A2E;
            --dark-light: #252541;
            --dark-lighter: #2F2F4A;
            --text: #EAEAEA;
            --text-dim: #9A9AB0;
            --success: #4ECCA3;
            --error: #FF6B6B;
            --shadow: rgba(255, 107, 53, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--dark);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(circle at 15% 35%, rgba(255,107,53,0.07) 0%, transparent 50%),
                radial-gradient(circle at 85% 65%, rgba(0,217,255,0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 5%, rgba(255,200,87,0.05) 0%, transparent 50%);
            animation: bgDrift 28s ease-in-out infinite;
            pointer-events: none; z-index: 0;
        }
        @keyframes bgDrift { 0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-18px);} }

        .container { max-width: 900px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }

        header { margin-bottom: 2.5rem; animation: slideDown 0.6s ease-out; }
        @keyframes slideDown { from{opacity:0;transform:translateY(-22px);}to{opacity:1;transform:translateY(0);} }

        .header-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; margin-bottom:1rem; }
        .logo {
            font-family:'Syne',sans-serif; font-size:2rem; font-weight:800;
            background:linear-gradient(135deg,var(--primary),var(--secondary),var(--accent));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-decoration:none;
        }
        .back-btn {
            background:var(--dark-light); color:var(--text); text-decoration:none;
            padding:0.65rem 1.3rem; border-radius:8px; font-size:0.85rem;
            border:2px solid transparent; transition:all 0.2s;
        }
        .back-btn:hover { border-color:var(--accent); }

        h1 { font-family:'Syne',sans-serif; font-size:2.3rem; font-weight:800; }
        .subtitle { color:var(--text-dim); font-size:0.88rem; margin-top:0.25rem; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);} }

        /* META CARD */
        .meta-card {
            background:var(--dark-light); border:2px solid var(--dark-lighter);
            border-radius:14px; padding:1.5rem; margin-bottom:1.8rem;
            animation: fadeUp 0.5s ease-out 0.1s both;
        }
        .meta-card h2 {
            font-family:'Syne',sans-serif; font-size:0.9rem; font-weight:700;
            color:var(--accent); margin-bottom:1rem; text-transform:uppercase; letter-spacing:0.08em;
        }
        .meta-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
        .meta-group { display:flex; flex-direction:column; gap:0.4rem; }
        .meta-label { font-size:0.72rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.08em; }
        .meta-input {
            background:var(--dark-lighter); border:2px solid var(--dark-lighter);
            color:var(--text); padding:0.6rem 0.9rem; border-radius:8px;
            font-family:'JetBrains Mono',monospace; font-size:0.9rem; transition:border-color 0.2s;
        }
        .meta-input:focus { outline:none; border-color:var(--accent); }
        .meta-input::placeholder { color:var(--text-dim); }

        /* SEARCH */
        .search-bar {
            background:var(--dark-light); border:2px solid var(--dark-lighter);
            border-radius:12px; padding:0.8rem 1.2rem; margin-bottom:1.2rem;
            display:flex; gap:0.8rem; align-items:center;
            animation: fadeUp 0.5s ease-out 0.15s both;
        }
        .search-bar input {
            flex:1; background:none; border:none; color:var(--text);
            font-family:'JetBrains Mono',monospace; font-size:0.88rem; outline:none;
        }
        .search-bar input::placeholder { color:var(--text-dim); }

        /* PROGRESS */
        .progress-wrap {
            background:var(--dark-light); border:2px solid var(--dark-lighter);
            border-radius:12px; padding:0.9rem 1.3rem; margin-bottom:1.4rem;
            animation: fadeUp 0.5s ease-out 0.18s both;
            display:flex; align-items:center; gap:1rem; flex-wrap:wrap;
        }
        .progress-label { font-size:0.8rem; color:var(--text-dim); white-space:nowrap; }
        .progress-label span { color:var(--text); font-weight:600; }
        .progress-track { flex:1; min-width:120px; height:8px; background:var(--dark-lighter); border-radius:4px; overflow:hidden; }
        .progress-fill {
            height:100%; border-radius:4px;
            background:linear-gradient(90deg,var(--primary),var(--accent));
            transition:width 0.3s ease; width:0%;
        }
        .progress-pct { font-size:0.8rem; font-weight:700; color:var(--accent); white-space:nowrap; }

        /* ITEMS CARD */
        .items-card {
            background:var(--dark-light); border:2px solid var(--dark-lighter);
            border-radius:14px; overflow:hidden;
            animation: fadeUp 0.5s ease-out 0.2s both;
            margin-bottom:1.8rem;
        }
        .items-header {
            padding:0.9rem 1.3rem; border-bottom:1px solid var(--dark-lighter);
            display:flex; align-items:center; justify-content:space-between;
        }
        .items-header h2 {
            font-family:'Syne',sans-serif; font-size:0.9rem; font-weight:700;
            color:var(--accent); text-transform:uppercase; letter-spacing:0.08em;
        }
        .items-count { font-size:0.75rem; color:var(--text-dim); }

        .item-row {
            display:grid; grid-template-columns:1fr auto;
            gap:1rem; align-items:center;
            padding:0.75rem 1.3rem;
            border-bottom:1px solid rgba(255,255,255,0.04);
            transition:background 0.15s;
        }
        .item-row:last-child { border-bottom:none; }
        .item-row:hover { background:rgba(255,255,255,0.02); }
        .item-row.counted { background:rgba(78,204,163,0.04); }
        .item-row.hidden { display:none; }

        .item-desc { font-size:0.86rem; color:var(--text); line-height:1.4; }
        .item-row.counted .item-desc { color:var(--success); }

        .qty-wrap { display:flex; align-items:center; gap:0.4rem; }
        .qty-btn {
            width:28px; height:28px; border-radius:6px;
            background:var(--dark-lighter); border:1.5px solid var(--dark-lighter);
            color:var(--text); font-size:1.1rem; cursor:pointer;
            display:flex; align-items:center; justify-content:center;
            transition:all 0.15s; font-weight:700; flex-shrink:0; line-height:1;
        }
        .qty-btn:hover { border-color:var(--primary); color:var(--primary); }
        .qty-input {
            width:64px; background:var(--dark-lighter); border:2px solid var(--dark-lighter);
            color:var(--secondary); padding:0.35rem 0.4rem; border-radius:7px;
            font-family:'JetBrains Mono',monospace; font-size:0.9rem; font-weight:600;
            text-align:center; transition:border-color 0.2s;
        }
        .qty-input:focus { outline:none; border-color:var(--secondary); }
        .qty-input.has-value { border-color:rgba(78,204,163,0.45); }

        /* SUBMIT */
        .submit-section {
            background:var(--dark-light); border:2px solid var(--dark-lighter);
            border-radius:14px; padding:1.2rem 1.5rem;
            display:flex; align-items:center; justify-content:space-between;
            flex-wrap:wrap; gap:1rem;
            animation: fadeUp 0.5s ease-out 0.25s both;
        }
        .submit-info { font-size:0.82rem; color:var(--text-dim); }
        .submit-info span { color:var(--text); font-weight:600; }

        .btn-submit {
            background:linear-gradient(135deg,var(--primary),var(--accent));
            color:white; border:none; padding:0.75rem 2rem; border-radius:10px;
            font-family:'Syne',sans-serif; font-size:0.92rem; font-weight:700;
            cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:0.5rem;
        }
        .btn-submit:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 22px var(--shadow); }
        .btn-submit:disabled { opacity:0.45; cursor:not-allowed; transform:none; }

        /* TOAST */
        .toast {
            position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(80px);
            background:var(--dark-light); border:2px solid var(--success); color:var(--success);
            padding:0.8rem 1.5rem; border-radius:10px; font-size:0.88rem; font-weight:600;
            z-index:200; transition:transform 0.3s ease; pointer-events:none;
            display:flex; align-items:center; gap:0.5rem; white-space:nowrap;
        }
        .toast.show { transform:translateX(-50%) translateY(0); }
        .toast.error { border-color:var(--error); color:var(--error); }

        .no-results { padding:2rem; text-align:center; color:var(--text-dim); font-size:0.88rem; display:none; }
        .no-results.show { display:block; }

        @media(max-width:600px) {
            .meta-grid { grid-template-columns:1fr; }
            .item-row { grid-template-columns:1fr; gap:0.5rem; }
            .qty-wrap { justify-content:flex-start; }
            .submit-section { flex-direction:column; align-items:stretch; }
            .btn-submit { justify-content:center; }
        }
    </style>
</head>
<body>
<div class="container">

    <header>
        <div class="header-row">
            <a href="admin.html" class="logo">Pingu - Solar</a>
            <a href="admin.html" class="back-btn">← Back to Admin</a>
        </div>
        <h1>🗃️ Stocktake</h1>
        <p class="subtitle">Count and record current stock levels — results saved to database.</p>
    </header>

    <!-- Meta -->
    <div class="meta-card">
        <h2>📋 Stocktake Details</h2>
        <div class="meta-grid">
            <div class="meta-group">
                <label class="meta-label">Date</label>
                <input type="date" class="meta-input" id="stocktake-date">
            </div>
            <div class="meta-group">
                <label class="meta-label">Counted By</label>
                <input type="text" class="meta-input" id="stocktake-name" placeholder="Enter your name…">
            </div>
        </div>
    </div>

    <!-- Search -->
    <div class="search-bar">
        <span>🔍</span>
        <input type="text" id="search-input" placeholder="Search items…" oninput="filterItems()">
    </div>

    <!-- Progress -->
    <div class="progress-wrap">
        <div class="progress-label"><span id="prog-counted">0</span> / <span id="prog-total">0</span> items counted</div>
        <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
        <div class="progress-pct" id="prog-pct">0%</div>
    </div>

    <!-- Items -->
    <div class="items-card">
        <div class="items-header">
            <h2>📦 Items to Count</h2>
            <span class="items-count" id="items-showing"></span>
        </div>
        <div id="items-list"></div>
        <div class="no-results" id="no-results">No items match your search.</div>
    </div>

    <!-- Submit -->
    <div class="submit-section">
        <div class="submit-info">All <span id="sub-total">0</span> items must be counted before submitting.</div>
        <button class="btn-submit" id="btn-submit" onclick="submitStocktake()" disabled>
            💾 Save Stocktake
        </button>
    </div>

</div>

<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, addDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const app = initializeApp({
    apiKey:            'AIzaSyAc_yJQ_rkzuOBh-Yxg0Q4eooXtB-tQjm0',
    authDomain:        'pingu-solar.firebaseapp.com',
    projectId:         'pingu-solar',
    storageBucket:     'pingu-solar.firebasestorage.app',
    messagingSenderId: '232764952866',
    appId:             '1:232764952866:web:5923b7f419de6355d6157b'
});
const db = getFirestore(app);
window._db = db;
window._col = collection;
window._addDoc = addDoc;
</script>

<script>
const stockItems = [
    "1 inch screws (box)",
    "16mm Earth",
    "2 inch screws (box)",
    "25mm Double Insulated Stranded Blue (per meter)",
    "25mm Double Insulated Stranded Brown (per meter)",
    "32MM COPEX PACK",
    "32mm gland (pack of 10)",
    "32mm p clips metal",
    "BioHazard Label - Roof",
    "Biohazard Label Set",
    "bootlace ferruls 6mm (pack)",
    "brown plugs (box)",
    "DC Cable Labels",
    "Engex 300mm x 4.8mm Cable Ties Black (Pack of 100)",
    "penny washers 6mm",
    "Proteus Blank Module",
    "Proteus IP65 rated consumer unit 6 way with SPD and isolator",
    "RCD testing label",
    "seals and ferruls",
    "Solar Array Sticker Set",
    "Terminal Block 100A 5 Way Blue",
    "Terminal Block 100A 5 Way Brown",
    "Terminal Block 100A 5 Way Green",
    "Wago compact 3 way connection max 6mm (box of 30)",
    "Adhesive & Sealant - Clear"
];

const quantities = {};
stockItems.forEach(item => { quantities[item] = null; });

// Default to today
document.getElementById('stocktake-date').valueAsDate = new Date();

function escHtml(t) {
    const d = document.createElement('div');
    d.textContent = String(t ?? '');
    return d.innerHTML;
}

function renderItems() {
    const list = document.getElementById('items-list');
    list.innerHTML = stockItems.map((item, i) => `
        <div class="item-row" id="row-${i}" data-desc="${escHtml(item)}">
            <div class="item-desc">${escHtml(item)}</div>
            <div class="qty-wrap">
                <button class="qty-btn" onclick="adjustQty(${i}, -1)">−</button>
                <input type="number" min="0"
                    class="qty-input" id="qty-${i}"
                    placeholder="Qty"
                    oninput="onQtyInput(${i}, this.value)"
                />
                <button class="qty-btn" onclick="adjustQty(${i}, 1)">+</button>
            </div>
        </div>
    `).join('');

    document.getElementById('prog-total').textContent  = stockItems.length;
    document.getElementById('sub-total').textContent   = stockItems.length;
    document.getElementById('items-showing').textContent = stockItems.length + ' items';
    updateProgress();
}

window.onQtyInput = function(idx, val) {
    const item   = stockItems[idx];
    const parsed = val === '' ? null : Math.max(0, parseInt(val, 10) || 0);
    quantities[item] = parsed;

    const input = document.getElementById(`qty-${idx}`);
    const row   = document.getElementById(`row-${idx}`);
    input.classList.toggle('has-value', parsed !== null);
    row.classList.toggle('counted', parsed !== null);
    updateProgress();
};

window.adjustQty = function(idx, delta) {
    const item   = stockItems[idx];
    const cur    = quantities[item] ?? 0;
    const newVal = Math.max(0, cur + delta);
    quantities[item] = newVal;

    const input = document.getElementById(`qty-${idx}`);
    input.value = newVal;
    input.classList.add('has-value');
    document.getElementById(`row-${idx}`).classList.add('counted');
    updateProgress();
};

function updateProgress() {
    const total   = stockItems.length;
    const counted = stockItems.filter(i => quantities[i] !== null).length;
    const pct     = total ? Math.round((counted / total) * 100) : 0;

    document.getElementById('prog-counted').textContent = counted;
    document.getElementById('prog-fill').style.width    = pct + '%';
    document.getElementById('prog-pct').textContent     = pct + '%';
    document.getElementById('btn-submit').disabled      = counted < total;
}

window.filterItems = function() {
    const q = document.getElementById('search-input').value.toLowerCase().trim();
    let visible = 0;
    document.querySelectorAll('.item-row').forEach(row => {
        const match = !q || row.dataset.desc.toLowerCase().includes(q);
        row.classList.toggle('hidden', !match);
        if (match) visible++;
    });
    document.getElementById('items-showing').textContent = visible + ' items';
    document.getElementById('no-results').classList.toggle('show', visible === 0);
};

window.submitStocktake = async function() {
    const date = document.getElementById('stocktake-date').value;
    const name = document.getElementById('stocktake-name').value.trim();

    if (!date) { showToast('Please enter a date.', true); return; }
    if (!name) { showToast('Please enter your name.', true); return; }

    const btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const items = stockItems.map(desc => ({
        description: desc,
        quantity: quantities[desc] ?? 0
    }));

    try {
        await window._addDoc(window._col(window._db, 'stocktake'), {
            date,
            countedBy: name,
            submittedAt: new Date().toISOString(),
            items
        });
        showToast('Stocktake saved successfully!');
        // Reset after short delay
        setTimeout(() => {
            stockItems.forEach(item => { quantities[item] = null; });
            document.getElementById('stocktake-name').value = '';
            document.getElementById('search-input').value   = '';
            document.getElementById('stocktake-date').valueAsDate = new Date();
            renderItems();
        }, 1600);
    } catch (e) {
        console.error(e);
        showToast('Firebase error: ' + e.message, true);
        btn.disabled = false;
        btn.innerHTML = '💾 Save Stocktake';
    }
};

function showToast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = (error ? '⚠ ' : '✓ ') + msg;
    t.className = 'toast show' + (error ? ' error' : '');
    setTimeout(() => t.classList.remove('show'), 3500);
}

renderItems();
</script>
</body>
</html>
