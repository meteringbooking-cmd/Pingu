<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Report | Pingu - Solar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --secondary: #FFC857;
            --accent: #00D9FF;
            --dark: #1A1A2E;
            --dark-light: #252541;
            --dark-lighter: #2F2F4A;
            --text: #EAEAEA;
            --text-dim: #9A9AB0;
            --success: #4ECCA3;
            --error: #FF6B6B;
            --kf: #B57BFF;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:'JetBrains Mono',monospace;
            background:var(--dark); color:var(--text);
            line-height:1.6; min-height:100vh;
        }

        body::before {
            content:''; position:fixed; top:-50%; left:-50%;
            width:200%; height:200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(255,107,53,0.07) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0,217,255,0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 10%, rgba(255,200,87,0.05) 0%, transparent 50%);
            animation:bgf 24s ease-in-out infinite; pointer-events:none; z-index:0;
        }
        @keyframes bgf { 0%,100%{transform:translate(0,0);} 50%{transform:translate(20px,-18px);} }

        .container { max-width:900px; margin:0 auto; padding:2rem; position:relative; z-index:1; }

        /* ── HEADER ── */
        .top-bar {
            display:flex; align-items:center; justify-content:space-between;
            flex-wrap:wrap; gap:1rem; margin-bottom:2rem;
        }
        .logo {
            font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:800;
            background:linear-gradient(135deg,var(--primary),var(--secondary),var(--accent));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
            text-decoration:none;
        }
        .powered {
            font-size:0.72rem; color:var(--text-dim);
            background:var(--dark-light); border:1px solid var(--dark-lighter);
            padding:0.35rem 0.8rem; border-radius:20px;
        }

        /* ── HERO ── */
        .hero {
            background:var(--dark-light); border:2px solid var(--dark-lighter);
            border-radius:16px; padding:1.8rem 2rem; margin-bottom:1.5rem;
            animation:fadeUp 0.5s ease-out;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);} }

        .hero-top { display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:1rem; margin-bottom:1.2rem; }
        .hero-title { font-family:'Syne',sans-serif; font-size:1.9rem; font-weight:800; }
        .hero-title span { color:var(--accent); }
        .type-badge {
            padding:0.3rem 0.9rem; border-radius:20px; font-size:0.78rem; font-weight:700;
        }
        .badge-bo  { background:rgba(0,217,255,0.12); color:var(--accent); border:1px solid rgba(0,217,255,0.3); }
        .badge-bas { background:rgba(255,200,87,0.12); color:var(--secondary); border:1px solid rgba(255,200,87,0.3); }

        .hero-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:0.8rem; }
        .hero-item { display:flex; flex-direction:column; gap:0.15rem; }
        .hero-lbl { font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.06em; }
        .hero-val { font-size:0.92rem; color:var(--text); font-weight:500; }

        /* ── SECTIONS ── */
        .section {
            background:var(--dark-light); border:2px solid var(--dark-lighter);
            border-radius:14px; margin-bottom:1.2rem; overflow:hidden;
            animation:fadeUp 0.4s ease-out both;
        }
        .section-hdr {
            display:flex; align-items:center; justify-content:space-between;
            padding:1rem 1.4rem; cursor:pointer; user-select:none;
            transition:background 0.15s;
        }
        .section-hdr:hover { background:rgba(255,255,255,0.02); }
        .section-hdr-left { display:flex; align-items:center; gap:0.6rem; }
        .section-title-text {
            font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700;
            color:var(--accent);
        }
        .section-chevron { color:var(--text-dim); font-size:0.8rem; transition:transform 0.25s; }
        .section.open .section-chevron { transform:rotate(180deg); }

        .section-body {
            max-height:0; overflow:hidden; transition:max-height 0.35s ease;
            border-top:0px solid var(--dark-lighter);
        }
        .section.open .section-body { max-height:9999px; border-top-width:1px; }
        .section-inner { padding:1.2rem 1.4rem; }

        /* ── FIELDS ── */
        .fields-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:0.7rem; margin-bottom:1rem; }
        .field { display:flex; flex-direction:column; gap:0.18rem; }
        .field-lbl { font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; }
        .field-val { font-size:0.88rem; color:var(--text); }
        .field-val.missing { color:var(--text-dim); font-style:italic; font-size:0.8rem; }
        .val-yes { color:var(--success); font-weight:700; }
        .val-no  { color:var(--error);   font-weight:700; }
        .val-na  { color:var(--text-dim); }

        /* ── PHOTO GALLERY ── */
        .photo-group { margin-top:1rem; }
        .photo-group-lbl {
            font-size:0.68rem; color:var(--text-dim); text-transform:uppercase;
            letter-spacing:0.06em; margin-bottom:0.5rem;
        }
        .photo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:0.5rem; }
        .photo-wrap {
            aspect-ratio:1; border-radius:8px; overflow:hidden;
            border:2px solid var(--dark-lighter); cursor:pointer;
            transition:all 0.2s; position:relative;
        }
        .photo-wrap:hover { border-color:var(--accent); transform:scale(1.03); }
        .photo-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
        .photo-wrap .photo-num {
            position:absolute; bottom:3px; right:5px;
            font-size:0.6rem; color:rgba(255,255,255,0.7);
            background:rgba(0,0,0,0.5); padding:0.1rem 0.3rem; border-radius:3px;
        }

        /* ── MATERIALS ── */
        .materials-list { display:flex; flex-direction:column; gap:0.3rem; }
        .material-item {
            background:var(--dark-lighter); border-radius:6px;
            padding:0.4rem 0.75rem; font-size:0.82rem; color:var(--kf);
            border-left:3px solid var(--kf);
        }
        .no-materials { color:var(--text-dim); font-style:italic; font-size:0.82rem; }

        /* ── SIGN-OFF ── */
        .signoff-box {
            background:rgba(78,204,163,0.07); border:1px solid rgba(78,204,163,0.25);
            border-radius:10px; padding:1rem 1.2rem;
            display:flex; gap:2rem; flex-wrap:wrap;
        }
        .signoff-item { display:flex; flex-direction:column; gap:0.15rem; }
        .signoff-lbl { font-size:0.65rem; color:var(--success); text-transform:uppercase; letter-spacing:0.06em; }
        .signoff-val { font-size:0.95rem; color:var(--text); font-weight:600; }

        /* ── STATES ── */
        .state { text-align:center; padding:5rem 2rem; color:var(--text-dim); }
        .state .icon { font-size:3.5rem; margin-bottom:1rem; }
        .state h2 { font-family:'Syne',sans-serif; font-size:1.5rem; color:var(--text); margin-bottom:0.5rem; }

        /* ── FOOTER ── */
        .footer { text-align:center; padding:2rem 0 1rem; color:var(--text-dim); font-size:0.75rem; }

        /* ── LIGHTBOX ── */
        .lightbox {
            position:fixed; inset:0; background:rgba(0,0,0,0.93);
            z-index:9000; display:none; flex-direction:column;
            align-items:center; justify-content:center; padding:1rem;
        }
        .lightbox.show { display:flex; }
        .lightbox img { max-width:94vw; max-height:82vh; border-radius:10px; object-fit:contain; }
        .lb-nav {
            display:flex; align-items:center; gap:1.5rem; margin-top:1rem;
        }
        .lb-btn {
            background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
            color:white; padding:0.5rem 1.1rem; border-radius:8px; font-size:1rem;
            cursor:pointer; transition:all 0.2s;
        }
        .lb-btn:hover { background:rgba(255,255,255,0.2); }
        .lb-btn:disabled { opacity:0.3; cursor:not-allowed; }
        .lb-counter { color:rgba(255,255,255,0.6); font-size:0.82rem; min-width:60px; text-align:center; }
        .lb-close {
            position:absolute; top:1.2rem; right:1.5rem;
            background:none; border:none; color:white; font-size:2.5rem;
            cursor:pointer; opacity:0.7; line-height:1;
        }
        .lb-close:hover { opacity:1; }
        .lb-label {
            color:rgba(255,255,255,0.5); font-size:0.75rem; margin-top:0.4rem;
            font-family:'JetBrains Mono',monospace;
        }

        @media(max-width:600px) {
            .container { padding:1rem; }
            .hero-title { font-size:1.5rem; }
            .photo-grid { grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="top-bar">
        <span class="logo">Pingu — Solar</span>
        <span class="powered">🔒 Shared Survey Report</span>
    </div>

    <div id="state-loading" class="state">
        <div class="icon">⏳</div>
        <h2>Loading Survey…</h2>
        <p>Please wait a moment.</p>
    </div>

    <div id="state-error" class="state" style="display:none">
        <div class="icon">⚠️</div>
        <h2>Survey Not Found</h2>
        <p>This link may be invalid or the survey may have been removed.</p>
    </div>

    <div id="survey-content" style="display:none">
        <!-- Hero injected by JS -->
        <div id="hero-wrap"></div>
        <!-- Sections injected by JS -->
        <div id="sections-wrap"></div>
        <!-- Footer -->
        <div class="footer">Generated by Pingu Solar · Survey data is read-only</div>
    </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <button class="lb-close" onclick="closeLb()">×</button>
    <img id="lb-img" src="" alt="Photo">
    <div class="lb-label" id="lb-label"></div>
    <div class="lb-nav">
        <button class="lb-btn" id="lb-prev" onclick="lbNav(-1)">◀</button>
        <span class="lb-counter" id="lb-counter"></span>
        <button class="lb-btn" id="lb-next" onclick="lbNav(1)">▶</button>
    </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const app = initializeApp({
    apiKey:            'AIzaSyAc_yJQ_rkzuOBh-Yxg0Q4eooXtB-tQjm0',
    authDomain:        'pingu-solar.firebaseapp.com',
    projectId:         'pingu-solar',
    storageBucket:     'pingu-solar.firebasestorage.app',
    messagingSenderId: '232764952866',
    appId:             '1:232764952866:web:5923b7f419de6355d6157b'
});
const db = getFirestore(app);

// ── All photos across the survey for lightbox navigation ──────────────────
let allPhotos = []; // [{url, label}]
let lbIndex   = 0;

// ── Load survey ───────────────────────────────────────────────────────────
async function load() {
    const params = new URLSearchParams(window.location.search);
    const id     = params.get('id');

    if (!id) { showError(); return; }

    try {
        const snap = await getDoc(doc(db, 'site-surveys', id));
        if (!snap.exists()) { showError(); return; }
        render({ _id: snap.id, ...snap.data() });
    } catch(e) {
        console.error(e);
        showError();
    }
}

function showError() {
    document.getElementById('state-loading').style.display = 'none';
    document.getElementById('state-error').style.display   = 'block';
}

// ── Render ────────────────────────────────────────────────────────────────
function render(s) {
    document.getElementById('state-loading').style.display = 'none';
    document.getElementById('survey-content').style.display = 'block';

    const sec  = s.sections || {};
    const sd   = sec.surveyDetails || {};
    const type = s.surveyType || 'unknown';
    const typeLabel = type === 'battery-only' ? 'Battery Only' : type === 'battery-and-solar' ? 'Battery & Solar' : 'Unknown';
    const badgeCls  = type === 'battery-only' ? 'badge-bo' : 'badge-bas';

    // Update page title
    document.title = `Survey — Job #${s.jobNumber || '—'} | Pingu Solar`;

    // ── Hero ──────────────────────────────────────────────────────────────
    document.getElementById('hero-wrap').innerHTML = `
    <div class="hero">
        <div class="hero-top">
            <div>
                <div class="hero-title">Job <span>#${esc(s.jobNumber || '—')}</span></div>
                <div style="color:var(--text-dim);font-size:0.82rem;margin-top:0.3rem">Site Survey Report</div>
            </div>
            <span class="type-badge ${badgeCls}">${typeLabel}</span>
        </div>
        <div class="hero-grid">
            ${hItem('Submitted',    fmtDatetime(s.submittedAt))}
            ${hItem('Surveyor',     sd.surveyor || '—')}
            ${hItem('Conducted On', fmtDatetime(sd.conductedOn || ''))}
            ${hItem('Customer Present', sd.customerPresent || '—')}
            ${hItem('Risk Assessment',  sec.riskAssessment?.riskAssessmentDone || '—')}
        </div>
    </div>`;

    // ── Build sections ────────────────────────────────────────────────────
    allPhotos = [];
    const wrap = document.getElementById('sections-wrap');
    const sections = buildSections(s, sec, type);
    wrap.innerHTML = sections.map((sec, i) => buildSectionEl(sec, i)).join('');

    // attach toggle listeners
    wrap.querySelectorAll('.section-hdr').forEach(hdr => {
        hdr.addEventListener('click', () => hdr.closest('.section').classList.toggle('open'));
    });

    // open first section by default
    const first = wrap.querySelector('.section');
    if (first) first.classList.add('open');
}

function hItem(label, val) {
    return `<div class="hero-item">
        <div class="hero-lbl">${label}</div>
        <div class="hero-val">${esc(val)}</div>
    </div>`;
}

// ── Section definitions ───────────────────────────────────────────────────
function buildSections(s, sec, type) {
    const el = sec.electricalSystem || {};
    const am = sec.additionalMaterials || [];
    const sections = [];

    // Electrical System
    sections.push({
        icon:'⚡', title:'Electrical System',
        fields:[
            {l:'Meter Position',    v:el.meterPosition},
            {l:'Meter Work Needed', v:el.meterWorkNeeded},
            {l:'Meter Work Details',v:el.meterWorkDetails, skip:!el.meterWorkDetails},
            {l:'Fuse Rating',       v:el.fuseRating},
            {l:'Earthing System',   v:el.earthingSystem},
            {l:'Gas Bonded',        v:el.gasBonded,        radio:true},
            {l:'Gas Bonding Equipment', v:el.gasBondingEquipment, skip:!el.gasBondingEquipment},
            {l:'Water Bonded',      v:el.waterBonded,      radio:true},
            {l:'Water Bonding Equipment', v:el.waterBondingEquipment, skip:!el.waterBondingEquipment},
            {l:'Cable Run',         v:el.cableRun},
            {l:'Cable Run Length',  v:el.cableRunLength != null ? el.cableRunLength + ' m' : null},
            {l:'Battery Location',  v:el.batteryLocation},
            {l:'Surface Type',      v:el.surfaceType},
            {l:'Dimensions W/D/L',  v:`${el.batteryWidth||0} / ${el.batteryDepth||0} / ${el.batteryLength||0} mm`},
            {l:'Render / Cladding', v:el.renderCladding},
            {l:'WiFi Signal',       v:el.wifiSignal},
        ],
        photos:[
            {label:'Meter Position',   urls:el.meterPositionPhotos},
            {label:'Meter Work',       urls:el.meterWorkPhotos},
            {label:'Earthing System',  urls:el.earthingSystemPhotos},
            {label:'Gas Bonded',       urls:el.gasBondedPhotos},
            {label:'Water Bonded',     urls:el.waterBondedPhotos},
            {label:'Cable Run',        urls:el.cableRunPhotos},
            {label:'Battery Location', urls:el.batteryLocationPhotos},
            {label:'Surface',          urls:el.surfacePhotos},
        ]
    });

    if (type === 'battery-and-solar') {
        const pi = sec.propertyInternal || {};
        const pe = sec.propertyExternal || {};
        const sc = sec.scaffolding     || {};

        sections.push({
            icon:'🏠', title:'Property — Internal',
            fields:[
                {l:'Loft Accessible', v:pi.loftAccessible, radio:true},
                {l:'Loft Ladder',     v:pi.loftLadder,     radio:true},
                {l:'Loft Boarded',    v:pi.loftBoarded,    radio:true},
                {l:'Asbestos',        v:pi.asbestos,        radio:true},
                {l:'Rafter W/D mm',   v:`${pi.rafterWidth||0} / ${pi.rafterDepth||0}`},
                {l:'Web W/D/L mm',    v:`${pi.webWidth||0} / ${pi.webDepth||0} / ${pi.webLength||0}`},
                {l:'Truss Spacing mm',v:pi.trussSpacing},
                {l:'Deflection',      v:pi.deflection,      radio:true},
                {l:'Rot / Damage',    v:pi.rotDamage,       radio:true},
                {l:'Roof Concern',    v:pi.roofConcern,     radio:true},
                {l:'Dwarf Walls',     v:pi.dwarfWalls,      radio:true},
                {l:'Structural Work', v:pi.structuralWork,  radio:true},
            ],
            photos:[
                {label:'Loft Access',  urls:pi.loftAccessiblePhotos},
                {label:'Asbestos',     urls:pi.asbestosPhotos},
                {label:'Loft Space',   urls:pi.loftSpacePhotos},
                {label:'Deflection',   urls:pi.deflectionPhotos},
                {label:'Rot / Damage', urls:pi.rotDamagePhotos},
                {label:'Roof Concern', urls:pi.roofConcernPhotos},
                {label:'Dwarf Walls',  urls:pi.dwarfWallsPhotos},
                {label:'Structural Work', urls:pi.structuralWorkPhotos},
            ]
        });

        sections.push({
            icon:'🏗️', title:'Property — External',
            fields:[
                {l:'Proposed Design Fits', v:pe.proposedDesignFit, radio:true},
                {l:'Design Reason',        v:pe.proposedDesignReasonWhyNot, skip:!pe.proposedDesignReasonWhyNot},
                {l:'Roof Covering',        v:pe.roofCovering},
                {l:'No. of Stories',       v:pe.numberStories},
                {l:'Roof Condition',       v:pe.roofCondition},
                {l:'Roof Work Age',        v:pe.roofWorkAge != null ? pe.roofWorkAge + ' yrs ago' : null},
                {l:'Roof Obstructions',    v:pe.roofObstructions, radio:true},
                {l:'Obstruction Detail',   v:pe.obstructionsDescription, skip:!pe.obstructionsDescription},
                {l:'Shading',              v:pe.roofShading, radio:true},
                {l:'Additional Notes',     v:pe.additionalNotesProperty, skip:!pe.additionalNotesProperty},
            ],
            photos:[
                {label:'Property',       urls:pe.propertyPhotos},
                {label:'Roof Covering',  urls:pe.roofCoveringPhotos},
                {label:'Roof Condition', urls:pe.roofConditionPhotos},
                {label:'Obstructions',   urls:pe.obstructionsPhotos},
                {label:'Shading',        urls:pe.shadingPhotos},
            ]
        });

        sections.push({
            icon:'🔧', title:'Scaffolding',
            fields:[
                {l:'Access Type',          v:sc.accessType},
                {l:'Parking Available',    v:sc.parkingAvailable, radio:true},
                {l:'Overhead Powerlines',  v:sc.overheadPowerlines, radio:true},
                {l:'On Pavement/Highway',  v:sc.propertyOnPavement, radio:true},
                {l:'Ground Type',          v:sc.groundType},
                {l:'Access Issues',        v:sc.accessIssues},
                {l:'Gutter Obstacles',     v:sc.gutterObstacles, radio:true},
                {l:'Obstacle Detail',      v:sc.gutterObstaclesDescription, skip:!sc.gutterObstaclesDescription},
                {l:'Lower Roofs',          v:sc.lowerRoofs, skip:!sc.lowerRoofs},
                {l:'Additional Notes',     v:sc.additionalNotes, skip:!sc.additionalNotes},
            ],
            photos:[
                {label:'Powerlines',       urls:sc.powerlinesPhotos},
                {label:'Pavement',         urls:sc.pavementPhotos},
                {label:'Ground Type',      urls:sc.groundTypePhotos},
                {label:'Gutter Obstacles', urls:sc.gutterObstaclesPhotos},
                {label:'Lower Roofs',      urls:sc.lowerRoofsPhotos},
            ]
        });
    }

    // Materials
    sections.push({
        icon:'🛠️', title:'Additional Materials',
        materials: am
    });

    // Sign-off (as special section)
    const signoff = sec.customerSignOff || {};
    if (signoff.name || signoff.date) {
        sections.push({
            icon:'✍️', title:'Customer Sign-off',
            signoff
        });
    }

    return sections;
}

function buildSectionEl(sec, idx) {
    let body = '';

    // Fields
    if (sec.fields) {
        const shown = sec.fields.filter(f => !f.skip);
        if (shown.length) {
            body += `<div class="fields-grid">${shown.map(f => fieldEl(f.l, f.v, f.radio)).join('')}</div>`;
        }
    }

    // Photo groups
    if (sec.photos) {
        sec.photos.forEach(pg => {
            if (!Array.isArray(pg.urls) || !pg.urls.length) return;
            const startIdx = allPhotos.length;
            pg.urls.forEach(u => allPhotos.push({url:u, label:pg.label}));
            body += `<div class="photo-group">
                <div class="photo-group-lbl">📸 ${esc(pg.label)}</div>
                <div class="photo-grid">
                    ${pg.urls.map((u, i) => `
                        <div class="photo-wrap" onclick="openLb(${startIdx + i})">
                            <img src="${esc(u)}" alt="Photo" loading="lazy">
                            <span class="photo-num">${i+1}</span>
                        </div>`).join('')}
                </div>
            </div>`;
        });
    }

    // Materials
    if (sec.materials !== undefined) {
        body += sec.materials.length
            ? `<div class="materials-list">${sec.materials.map(m=>`<div class="material-item">${esc(m)}</div>`).join('')}</div>`
            : `<div class="no-materials">None requested</div>`;
    }

    // Sign-off
    if (sec.signoff) {
        body += `<div class="signoff-box">
            <div class="signoff-item">
                <div class="signoff-lbl">Customer Name</div>
                <div class="signoff-val">${esc(sec.signoff.name || '—')}</div>
            </div>
            <div class="signoff-item">
                <div class="signoff-lbl">Date</div>
                <div class="signoff-val">${esc(fmtDate(sec.signoff.date))}</div>
            </div>
        </div>`;
    }

    return `
    <div class="section" style="animation-delay:${idx*0.07}s">
        <div class="section-hdr">
            <div class="section-hdr-left">
                <span>${sec.icon}</span>
                <span class="section-title-text">${sec.title}</span>
            </div>
            <span class="section-chevron">▼</span>
        </div>
        <div class="section-body">
            <div class="section-inner">${body || '<div class="no-materials">No data recorded</div>'}</div>
        </div>
    </div>`;
}

function fieldEl(label, value, isRadio) {
    const hasVal = value !== null && value !== undefined && value !== '';
    let display;
    if (!hasVal) {
        display = '<span class="missing">Not recorded</span>';
    } else if (isRadio) {
        const map = { Yes:'<span class="val-yes">Yes ✓</span>', No:'<span class="val-no">No ✗</span>', 'N/A':'<span class="val-na">N/A</span>' };
        display = map[value] || esc(value);
    } else {
        display = esc(String(value));
    }
    return `<div class="field">
        <div class="field-lbl">${label}</div>
        <div class="field-val">${display}</div>
    </div>`;
}

// ── Lightbox ──────────────────────────────────────────────────────────────
window.openLb = function(idx) {
    lbIndex = idx;
    updateLb();
    document.getElementById('lightbox').classList.add('show');
};
window.closeLb = function() {
    document.getElementById('lightbox').classList.remove('show');
};
window.lbNav = function(dir) {
    lbIndex = Math.max(0, Math.min(allPhotos.length - 1, lbIndex + dir));
    updateLb();
};
function updateLb() {
    const p = allPhotos[lbIndex];
    document.getElementById('lb-img').src       = p.url;
    document.getElementById('lb-label').textContent = p.label;
    document.getElementById('lb-counter').textContent = `${lbIndex+1} / ${allPhotos.length}`;
    document.getElementById('lb-prev').disabled = lbIndex === 0;
    document.getElementById('lb-next').disabled = lbIndex === allPhotos.length - 1;
}
document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLb();
});
document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('show')) return;
    if (e.key === 'ArrowLeft')  lbNav(-1);
    if (e.key === 'ArrowRight') lbNav(1);
    if (e.key === 'Escape')     closeLb();
});

// ── Utils ─────────────────────────────────────────────────────────────────
function esc(t) {
    const d = document.createElement('div');
    d.textContent = String(t ?? '');
    return d.innerHTML;
}
function fmtDatetime(str) {
    if (!str) return '—';
    const d = new Date(str);
    return isNaN(d) ? str : d.toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtDate(str) {
    if (!str) return '—';
    const d = new Date(str.length === 10 ? str + 'T00:00:00' : str);
    return isNaN(d) ? str : d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}

// ── Boot ──────────────────────────────────────────────────────────────────
load();
</script>
