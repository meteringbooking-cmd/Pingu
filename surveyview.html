<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey Report | Pingu - Solar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --secondary: #FFC857;
            --accent: #00D9FF;
            --dark: #1A1A2E;
            --dark-light: #252541;
            --dark-lighter: #2F2F4A;
            --text: #EAEAEA;
            --text-dim: #9A9AB0;
            --success: #4ECCA3;
            --error: #FF6B6B;
            --kf: #B57BFF;
            --warning: #FFA500;
            --ripper: #FF6B35;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            font-family:'JetBrains Mono',monospace;
            background:var(--dark); color:var(--text);
            line-height:1.6; min-height:100vh;
        }

        body::before {
            content:''; position:fixed; top:-50%; left:-50%;
            width:200%; height:200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(255,107,53,0.07) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0,217,255,0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 10%, rgba(255,200,87,0.05) 0%, transparent 50%);
            animation:bgf 24s ease-in-out infinite; pointer-events:none; z-index:0;
        }
        @keyframes bgf { 0%,100%{transform:translate(0,0);} 50%{transform:translate(20px,-18px);} }

        .container { max-width:900px; margin:0 auto; padding:2rem; position:relative; z-index:1; }

        /* ── HEADER ── */
        .top-bar {
            display:flex; align-items:center; justify-content:space-between;
            flex-wrap:wrap; gap:1rem; margin-bottom:2rem;
        }
        .logo {
            font-family:'Syne',sans-serif; font-size:1.8rem; font-weight:800;
            background:linear-gradient(135deg,var(--primary),var(--secondary),var(--accent));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
            text-decoration:none;
        }
        .powered {
            font-size:0.72rem; color:var(--text-dim);
            background:var(--dark-light); border:1px solid var(--dark-lighter);
            padding:0.35rem 0.8rem; border-radius:20px;
        }

        /* ── HERO ── */
        .hero {
            background:var(--dark-light); border:2px solid var(--dark-lighter);
            border-radius:16px; padding:1.8rem 2rem; margin-bottom:1.5rem;
            animation:fadeUp 0.5s ease-out;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);} }

        .hero-top { display:flex; align-items:flex-start; justify-content:space-between; flex-wrap:wrap; gap:1rem; margin-bottom:1.2rem; }
        .hero-title { font-family:'Syne',sans-serif; font-size:1.9rem; font-weight:800; }
        .hero-title span { color:var(--accent); }
        .type-badge {
            padding:0.3rem 0.9rem; border-radius:20px; font-size:0.78rem; font-weight:700;
        }
        .badge-bo  { background:rgba(0,217,255,0.12); color:var(--accent); border:1px solid rgba(0,217,255,0.3); }
        .badge-bas { background:rgba(255,200,87,0.12); color:var(--secondary); border:1px solid rgba(255,200,87,0.3); }

        .hero-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(190px,1fr)); gap:0.8rem; }
        .hero-item { display:flex; flex-direction:column; gap:0.15rem; }
        .hero-lbl { font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.06em; }
        .hero-val { font-size:0.92rem; color:var(--text); font-weight:500; }

        /* ── SECTIONS ── */
        .section {
            background:var(--dark-light); border:2px solid var(--dark-lighter);
            border-radius:14px; margin-bottom:1.2rem; overflow:hidden;
            animation:fadeUp 0.4s ease-out both;
        }
        .section-hdr {
            display:flex; align-items:center; justify-content:space-between;
            padding:1rem 1.4rem; cursor:pointer; user-select:none;
            transition:background 0.15s;
        }
        .section-hdr:hover { background:rgba(255,255,255,0.02); }
        .section-hdr-left { display:flex; align-items:center; gap:0.6rem; }
        .section-title-text {
            font-family:'Syne',sans-serif; font-size:0.95rem; font-weight:700;
            color:var(--accent);
        }
        .section-chevron { color:var(--text-dim); font-size:0.8rem; transition:transform 0.25s; }
        .section.open .section-chevron { transform:rotate(180deg); }

        .section-body {
            max-height:0; overflow:hidden; transition:max-height 0.35s ease;
            border-top:0px solid var(--dark-lighter);
        }
        .section.open .section-body { max-height:9999px; border-top-width:1px; }
        .section-inner { padding:1.2rem 1.4rem; }

        /* ── FIELDS ── */
        .fields-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(210px,1fr)); gap:0.7rem; margin-bottom:1rem; }
        .field { display:flex; flex-direction:column; gap:0.18rem; }
        .field-lbl { font-size:0.65rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; }
        .field-val { font-size:0.88rem; color:var(--text); }
        .field-val.missing { color:var(--text-dim); font-style:italic; font-size:0.8rem; }
        .val-yes { color:var(--success); font-weight:700; }
        .val-no  { color:var(--error);   font-weight:700; }
        .val-na  { color:var(--text-dim); }

        /* ── PHOTO GALLERY ── */
        .photo-group { margin-top:1rem; }
        .photo-group-lbl {
            font-size:0.68rem; color:var(--text-dim); text-transform:uppercase;
            letter-spacing:0.06em; margin-bottom:0.5rem;
        }
        .photo-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(110px,1fr)); gap:0.5rem; }
        .photo-wrap {
            aspect-ratio:1; border-radius:8px; overflow:hidden;
            border:2px solid var(--dark-lighter); cursor:pointer;
            transition:all 0.2s; position:relative;
        }
        .photo-wrap:hover { border-color:var(--accent); transform:scale(1.03); }
        .photo-wrap img { width:100%; height:100%; object-fit:cover; display:block; }
        .photo-wrap .photo-num {
            position:absolute; bottom:3px; right:5px;
            font-size:0.6rem; color:rgba(255,255,255,0.7);
            background:rgba(0,0,0,0.5); padding:0.1rem 0.3rem; border-radius:3px;
        }

        /* ── MATERIALS ── */
        .materials-list { display:flex; flex-direction:column; gap:0.3rem; }
        .material-item {
            background:var(--dark-lighter); border-radius:6px;
            padding:0.4rem 0.75rem; font-size:0.82rem; color:var(--kf);
            border-left:3px solid var(--kf);
        }
        .no-materials { color:var(--text-dim); font-style:italic; font-size:0.82rem; }

        /* ── SIGN-OFF ── */
        .signoff-box {
            background:rgba(78,204,163,0.07); border:1px solid rgba(78,204,163,0.25);
            border-radius:10px; padding:1rem 1.2rem;
            display:flex; gap:2rem; flex-wrap:wrap;
        }
        .signoff-item { display:flex; flex-direction:column; gap:0.15rem; }
        .signoff-lbl { font-size:0.65rem; color:var(--success); text-transform:uppercase; letter-spacing:0.06em; }
        .signoff-val { font-size:0.95rem; color:var(--text); font-weight:600; }

        /* ── PICKLIST SECTION ── */
        .section.picklist-section { border-color:rgba(255,200,87,0.35); }
        .section.picklist-section .section-title-text { color:var(--secondary); }
        .section.picklist-section .section-chevron { color:rgba(255,200,87,0.5); }

        .pl-section-label {
            font-size:0.72rem; font-weight:700; color:var(--secondary);
            text-transform:uppercase; letter-spacing:0.08em;
            margin:1.2rem 0 0.6rem; padding-bottom:0.3rem;
            border-bottom:1px solid rgba(255,200,87,0.18);
        }
        .pl-section-label:first-child { margin-top:0; }
        .pl-specs-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:0.6rem; margin-bottom:0.5rem; }
        .pl-spec-card {
            background:var(--dark); border-radius:9px;
            padding:0.7rem 0.9rem 0.7rem 1rem;
            border-left:3px solid rgba(0,217,255,0.4); position:relative;
        }
        .pl-spec-card.no-val  { opacity:0.35; border-left-color:transparent; }
        .pl-spec-card.cost-saving { border-left-color:var(--success); }
        .pl-spec-lbl  { font-size:0.64rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.05em; margin-bottom:0.2rem; }
        .pl-spec-note { font-size:0.6rem; color:var(--text-dim); font-style:italic; }
        .pl-spec-val  { font-size:0.9rem; color:var(--text); font-weight:500; }
        .pl-spec-val.empty { font-style:italic; color:var(--text-dim); font-size:0.76rem; font-weight:400; }
        .pl-spec-unit { font-size:0.64rem; color:var(--text-dim); margin-left:0.2rem; }

        .pl-roof-wrap {
            margin-top:1.2rem; padding:1.1rem; background:var(--dark);
            border-radius:12px; border:2px solid rgba(0,217,255,0.15);
        }
        .pl-roof-header {
            display:flex; align-items:center; justify-content:space-between;
            flex-wrap:wrap; gap:0.5rem; margin-bottom:0.8rem;
        }
        .pl-roof-title {
            font-family:'Syne',sans-serif; font-size:0.88rem; color:var(--accent);
            display:flex; align-items:center; gap:0.4rem;
        }
        .pl-legend { display:flex; gap:0.9rem; flex-wrap:wrap; }
        .pl-legend-item { display:flex; align-items:center; gap:0.35rem; font-size:0.7rem; color:var(--text-dim); }
        .pl-swatch { width:20px; height:13px; border-radius:3px; }
        .pl-swatch.p { background:linear-gradient(135deg,#FF6B35,#FF9559); border:1px solid rgba(255,107,53,0.6); }
        .pl-swatch.l { background:linear-gradient(135deg,#00D9FF,#00A8CC); border:1px solid rgba(0,217,255,0.6); width:26px; }
        .pl-swatch.e { background:var(--dark-lighter); border:1px dashed rgba(255,255,255,0.1); }
        .pl-roof-grid-wrap { overflow-x:auto; padding-bottom:0.3rem; }
        .pl-roof-grid {
            display:inline-grid; gap:3px; padding:0.7rem;
            background:rgba(255,255,255,0.02); border-radius:9px;
            border:1px solid rgba(255,255,255,0.04); min-width:100%;
        }
        .pl-cell {
            width:24px; height:24px; border-radius:3px;
            display:flex; align-items:center; justify-content:center;
            font-size:0.54rem; font-weight:700; position:relative;
            transition:transform 0.12s; cursor:default;
        }
        .pl-cell:hover { transform:scale(1.35); z-index:5; }
        .pl-cell.e { background:rgba(255,255,255,0.03); border:1px dashed rgba(255,255,255,0.07); }
        .pl-cell.p { background:linear-gradient(135deg,#FF6B35,#FF9559); border:1px solid rgba(255,149,89,0.8); color:rgba(255,255,255,0.9); box-shadow:0 1px 5px rgba(255,107,53,0.3); }
        .pl-cell.l { background:linear-gradient(135deg,#00D9FF,#00A8CC); border:1px solid rgba(0,217,255,0.8); color:rgba(0,30,50,0.9); box-shadow:0 1px 5px rgba(0,217,255,0.25); }
        .pl-cell.p::after,.pl-cell.l::after { content:''; position:absolute; inset:3px; border:1px solid rgba(255,255,255,0.25); border-radius:1px; }
        .pl-roof-stats { display:flex; gap:1.1rem; margin-top:0.7rem; flex-wrap:wrap; }
        .pl-roof-stat { font-size:0.76rem; color:var(--text-dim); }
        .pl-roof-stat strong { color:var(--text); }

        .pl-kf-wrap {
            margin-top:1.2rem; padding:1.1rem; background:var(--dark);
            border-radius:12px; border:2px solid rgba(181,123,255,0.22);
        }
        .pl-kf-header {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:0.8rem; flex-wrap:wrap; gap:0.4rem;
        }
        .pl-kf-title {
            font-family:'Syne',sans-serif; font-size:0.88rem; color:var(--kf);
            display:flex; align-items:center; gap:0.4rem;
        }
        .pl-kf-count {
            font-size:0.7rem; color:var(--text-dim);
            background:rgba(181,123,255,0.1); border:1px solid rgba(181,123,255,0.22);
            padding:0.12rem 0.5rem; border-radius:20px;
        }
        .pl-kf-table-wrap { overflow-x:auto; }
        .pl-kf-table { width:100%; border-collapse:collapse; font-size:0.8rem; }
        .pl-kf-table th {
            text-align:left; padding:0.38rem 0.7rem; font-size:0.65rem;
            color:var(--text-dim); text-transform:uppercase; letter-spacing:0.06em;
            border-bottom:1px solid rgba(181,123,255,0.18);
        }
        .pl-kf-table td { padding:0.42rem 0.7rem; border-bottom:1px solid rgba(255,255,255,0.04); }
        .pl-kf-table tr:last-child td { border-bottom:none; }
        .pl-kf-table tr:hover td { background:rgba(181,123,255,0.05); }
        .pl-kf-part { font-family:'JetBrains Mono',monospace; color:var(--kf); font-size:0.78rem; }
        .pl-kf-qty {
            display:inline-block; background:rgba(181,123,255,0.12); color:var(--kf);
            border:1px solid rgba(181,123,255,0.28); padding:0.08rem 0.4rem;
            border-radius:4px; font-weight:700; font-size:0.78rem;
        }
        .pl-kf-total td { border-top:2px solid rgba(181,123,255,0.22); color:var(--text-dim); font-size:0.72rem; padding-top:0.55rem; }

        .pl-saved-pill {
            font-size:0.72rem; color:var(--text-dim);
            font-family:'JetBrains Mono',monospace; margin-left:auto;
        }
        .pl-no-data {
            padding:0.9rem 1rem; background:var(--dark); border-radius:8px;
            color:var(--text-dim); font-size:0.82rem; border-left:3px solid var(--text-dim);
        }

        /* ── PDF RIPPER SECTION ── */
        .section.ripper-section { border-color:rgba(255,107,53,0.35); }
        .section.ripper-section .section-title-text { color:var(--primary); }
        .section.ripper-section .section-chevron { color:rgba(255,107,53,0.5); }

        .ripper-saved-pill {
            font-size:0.72rem; color:var(--text-dim);
            font-family:'JetBrains Mono',monospace; margin-left:auto;
        }

        .ripper-grid {
            display:grid; grid-template-columns:1fr 1fr; gap:1.2rem;
            margin-bottom:1rem;
        }
        @media(max-width:600px) { .ripper-grid { grid-template-columns:1fr; } }

        .ripper-img-card {
            background:var(--dark); border-radius:10px;
            border:2px solid rgba(255,107,53,0.2);
            overflow:hidden;
        }
        .ripper-img-card-label {
            padding:0.55rem 0.9rem;
            font-size:0.68rem; color:var(--text-dim); text-transform:uppercase;
            letter-spacing:0.07em; border-bottom:1px solid rgba(255,107,53,0.12);
            display:flex; align-items:center; gap:0.4rem;
        }
        .ripper-img-card img {
            width:100%; display:block; cursor:pointer;
            transition:transform 0.2s; max-height:340px; object-fit:contain;
            background:rgba(0,0,0,0.2);
        }
        .ripper-img-card img:hover { transform:scale(1.01); }
        .ripper-img-placeholder {
            padding:2rem; text-align:center;
            color:var(--text-dim); font-size:0.82rem; font-style:italic;
        }
        .ripper-address-card {
            background:var(--dark); border-radius:10px; padding:1rem 1.1rem;
            border:2px solid rgba(255,107,53,0.2); margin-bottom:1rem;
        }
        .ripper-address-label {
            font-size:0.68rem; color:var(--text-dim); text-transform:uppercase;
            letter-spacing:0.07em; margin-bottom:0.5rem;
        }
        .ripper-address-val {
            font-family:'Syne',sans-serif; font-size:1rem; color:var(--text);
            line-height:1.7;
        }
        .ripper-meta-row {
            display:flex; gap:0.6rem; flex-wrap:wrap; margin-top:0.5rem;
            font-size:0.72rem; color:var(--text-dim);
        }
        .ripper-meta-chip {
            background:rgba(255,107,53,0.08); border:1px solid rgba(255,107,53,0.2);
            padding:0.18rem 0.6rem; border-radius:20px; color:var(--primary);
        }

        /* ── STATES ── */
        .state { text-align:center; padding:5rem 2rem; color:var(--text-dim); }
        .state .icon { font-size:3.5rem; margin-bottom:1rem; }
        .state h2 { font-family:'Syne',sans-serif; font-size:1.5rem; color:var(--text); margin-bottom:0.5rem; }

        /* ── FOOTER ── */
        .footer { text-align:center; padding:2rem 0 1rem; color:var(--text-dim); font-size:0.75rem; }

        /* ── LIGHTBOX ── */
        .lightbox {
            position:fixed; inset:0; background:rgba(0,0,0,0.93);
            z-index:9000; display:none; flex-direction:column;
            align-items:center; justify-content:center; padding:1rem;
        }
        .lightbox.show { display:flex; }
        .lightbox img { max-width:94vw; max-height:82vh; border-radius:10px; object-fit:contain; }
        .lb-nav {
            display:flex; align-items:center; gap:1.5rem; margin-top:1rem;
        }
        .lb-btn {
            background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2);
            color:white; padding:0.5rem 1.1rem; border-radius:8px; font-size:1rem;
            cursor:pointer; transition:all 0.2s;
        }
        .lb-btn:hover { background:rgba(255,255,255,0.2); }
        .lb-btn:disabled { opacity:0.3; cursor:not-allowed; }
        .lb-counter { color:rgba(255,255,255,0.6); font-size:0.82rem; min-width:60px; text-align:center; }
        .lb-close {
            position:absolute; top:1.2rem; right:1.5rem;
            background:none; border:none; color:white; font-size:2.5rem;
            cursor:pointer; opacity:0.7; line-height:1;
        }
        .lb-close:hover { opacity:1; }
        .lb-label {
            color:rgba(255,255,255,0.5); font-size:0.75rem; margin-top:0.4rem;
            font-family:'JetBrains Mono',monospace;
        }

        @media(max-width:600px) {
            .container { padding:1rem; }
            .hero-title { font-size:1.5rem; }
            .photo-grid { grid-template-columns:repeat(auto-fill,minmax(80px,1fr)); }
            .pl-specs-grid { grid-template-columns:1fr 1fr; }
        }
    </style>
</head>
<body>
<div class="container">

    <div class="top-bar">
        <span class="logo">Pingu — Solar</span>
        <span class="powered">🔒 Shared Survey Report</span>
    </div>

    <div id="state-loading" class="state">
        <div class="icon">⏳</div>
        <h2>Loading Survey…</h2>
        <p>Please wait a moment.</p>
    </div>

    <div id="state-error" class="state" style="display:none">
        <div class="icon">⚠️</div>
        <h2>Survey Not Found</h2>
        <p>This link may be invalid or the survey may have been removed.</p>
    </div>

    <div id="survey-content" style="display:none">
        <div id="hero-wrap"></div>
        <div id="sections-wrap"></div>
        <!-- Picklist section injected here -->
        <div id="picklist-wrap"></div>
        <!-- PDF Ripper + Sign-off injected into sections-wrap via render() -->
        <div class="footer">Generated by Pingu Solar · Survey data is read-only</div>
    </div>

</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox">
    <button class="lb-close" onclick="closeLb()">×</button>
    <img id="lb-img" src="" alt="Photo">
    <div class="lb-label" id="lb-label"></div>
    <div class="lb-nav">
        <button class="lb-btn" id="lb-prev" onclick="lbNav(-1)">◀</button>
        <span class="lb-counter" id="lb-counter"></span>
        <button class="lb-btn" id="lb-next" onclick="lbNav(1)">▶</button>
    </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, doc, getDoc, collection, query, where, orderBy, limit, getDocs }
    from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const app = initializeApp({
    apiKey:            'AIzaSyAc_yJQ_rkzuOBh-Yxg0Q4eooXtB-tQjm0',
    authDomain:        'pingu-solar.firebaseapp.com',
    projectId:         'pingu-solar',
    storageBucket:     'pingu-solar.firebasestorage.app',
    messagingSenderId: '232764952866',
    appId:             '1:232764952866:web:5923b7f419de6355d6157b'
});
const db = getFirestore(app);

// ── Lightbox state ─────────────────────────────────────────────────────────
let allPhotos = []; // [{url, label}]
let lbIndex   = 0;

// ── Spec definitions matching the picklist generator ──────────────────────
const SPECS = {
    system: [
        {label:'Type of System',    col:'AO', row:2},
        {label:'Inverter Size',     col:'AO', row:4,  note:'Fox & Tesla'},
        {label:'No. of Batteries',  col:'AO', row:6},
        {label:'Battery',           col:'AO', row:7},
        {label:'Retrofit',          col:'AO', row:8,  note:'Fox only'},
        {label:'Enphase Pedestal',  col:'AO', row:17},
        {label:'Enphase Branches',  col:'AO', row:12},
        {label:'DC Expansion',      col:'AO', row:21, note:'Tesla'},
    ],
    mounting: [
        {label:'Mounting System',   col:'AS', row:2},
        {label:'Hook Type',         col:'AS', row:4},
        {label:'Ave Hook Spacing',  col:'AS', row:6,  unit:'mm'},
        {label:'Hook Spacing',      col:'AS', row:7,  unit:'mm'},
        {label:'Min. Roof Anchors', col:'AS', row:12},
        {label:'Bird Mesh',         col:'AS', row:14},
        {label:'Roof Type',         col:'AS', row:16},

// ── Load ───────────────────────────────────────────────────────────────────
async function load() {
    const params = new URLSearchParams(window.location.search);
    const id     = params.get('id');
    if (!id) { showError(); return; }

    try {
        const surveySnap = await getDoc(doc(db, 'site-surveys', id));
        if (!surveySnap.exists()) { showError(); return; }

        const survey = { _id: surveySnap.id, ...surveySnap.data() };

        let picklistData = null;
        let jobData      = null;
        const promises   = [];

        if (survey.jobNumber) {
            // Picklist
            promises.push(
                getDocs(query(
                    collection(db, 'picklists'),
                    where('jobNumber', '==', survey.jobNumber),
                    orderBy('savedAt', 'desc'),
                    limit(1)
                )).then(snap => { if (!snap.empty) picklistData = snap.docs[0].data(); })
                  .catch(e => console.warn('Picklist load failed:', e))
            );
            // Job record (holds pdfRipper data)
            promises.push(
                getDocs(query(
                    collection(db, 'jobs'),
                    where('Job Number', '==', survey.jobNumber),
                    limit(1)
                )).then(snap => { if (!snap.empty) jobData = snap.docs[0].data(); })
                  .catch(e => console.warn('Job record load failed:', e))
            );
        }

        await Promise.all(promises);
        render(survey, picklistData, jobData);

    } catch(e) {
        console.error(e);
        showError();
    }
}

function showError() {
    document.getElementById('state-loading').style.display = 'none';
    document.getElementById('state-error').style.display   = 'block';
}

// ── Main render ────────────────────────────────────────────────────────────
function render(s, picklist, jobData) {
    document.getElementById('state-loading').style.display  = 'none';
    document.getElementById('survey-content').style.display = 'block';

    const sec       = s.sections || {};
    const sd        = sec.surveyDetails || {};
    const type      = s.surveyType || 'unknown';
    const typeLabel = type === 'battery-only' ? 'Battery Only'
                    : type === 'battery-and-solar' ? 'Battery & Solar' : 'Unknown';
    const badgeCls  = type === 'battery-only' ? 'badge-bo' : 'badge-bas';

    document.title = `Survey — Job #${s.jobNumber || '—'} | Pingu Solar`;

    // Hero
    document.getElementById('hero-wrap').innerHTML = `
    <div class="hero">
        <div class="hero-top">
            <div>
                <div class="hero-title">Job <span>#${esc(s.jobNumber || '—')}</span></div>
                <div style="color:var(--text-dim);font-size:0.82rem;margin-top:0.3rem">Site Survey Report</div>
            </div>
            <span class="type-badge ${badgeCls}">${typeLabel}</span>
        </div>
        <div class="hero-grid">
            ${hItem('Submitted',       fmtDatetime(s.submittedAt))}
            ${hItem('Surveyor',        sd.surveyor || '—')}
            ${hItem('Conducted On',    fmtDatetime(sd.conductedOn || ''))}
            ${hItem('Customer Present',sd.customerPresent || '—')}
            ${hItem('Risk Assessment', sec.riskAssessment?.riskAssessmentDone || '—')}
        </div>
    </div>`;

    // ── Build survey sections, keeping sign-off separate ──────────────────
    allPhotos = [];
    const wrap = document.getElementById('sections-wrap');

    const { mainSections, signoffSection } = buildSections(s, sec, type);
    const ripperData = jobData?.pdfRipper || null;

    // Render: main sections → PDF Ripper → sign-off (if present)
    const parts = [
        ...mainSections.map((sec, i) => buildSectionEl(sec, i)),
        buildRipperSection(ripperData, mainSections.length),
        ...(signoffSection ? [buildSectionEl(signoffSection, mainSections.length + 1)] : [])
    ];

    wrap.innerHTML = parts.join('');

    wrap.querySelectorAll('.section-hdr').forEach(hdr =>
        hdr.addEventListener('click', () => hdr.closest('.section').classList.toggle('open'))
    );
    const first = wrap.querySelector('.section');
    if (first) first.classList.add('open');

    // Picklist section
    document.getElementById('picklist-wrap').innerHTML = buildPicklistSection(picklist);
    document.querySelectorAll('#picklist-wrap .section-hdr').forEach(hdr =>
        hdr.addEventListener('click', () => hdr.closest('.section').classList.toggle('open'))
    );
}

function hItem(label, val) {
    return `<div class="hero-item">
        <div class="hero-lbl">${label}</div>
        <div class="hero-val">${esc(val)}</div>
    </div>`;
}

function buildSectionEl(sec, idx) {
    let body = '';
    if (sec.fields) {
        const shown = sec.fields.filter(f => !f.skip);
        if (shown.length) body += `<div class="fields-grid">${shown.map(f => fieldEl(f.l, f.v, f.radio)).join('')}</div>`;
    }
    if (sec.photos) {
        sec.photos.forEach(pg => {
            if (!Array.isArray(pg.urls) || !pg.urls.length) return;
            const startIdx = allPhotos.length;
            pg.urls.forEach(u => allPhotos.push({url:u, label:pg.label}));
            body += `<div class="photo-group">
                <div class="photo-group-lbl">📸 ${esc(pg.label)}</div>
                <div class="photo-grid">
                    ${pg.urls.map((u,i) => `
                        <div class="photo-wrap" onclick="openLb(${startIdx+i})">
                            <img src="${esc(u)}" alt="Photo" loading="lazy">
                            <span class="photo-num">${i+1}</span>
                        </div>`).join('')}
                </div>
            </div>`;
        });
    }
    if (sec.materials !== undefined) {
        body += sec.materials.length
            ? `<div class="materials-list">${sec.materials.map(m=>`<div class="material-item">${esc(m)}</div>`).join('')}</div>`
            : `<div class="no-materials">None requested</div>`;
    }
    if (sec.signoff) {
        body += `<div class="signoff-box">
            <div class="signoff-item">
                <div class="signoff-lbl">Customer Name</div>
                <div class="signoff-val">${esc(sec.signoff.name || '—')}</div>
            </div>
            <div class="signoff-item">
                <div class="signoff-lbl">Date</div>
                <div class="signoff-val">${esc(fmtDate(sec.signoff.date))}</div>
            </div>
        </div>`;
    }
    return `
    <div class="section" style="animation-delay:${idx*0.07}s">
        <div class="section-hdr">
            <div class="section-hdr-left">
                <span>${sec.icon}</span>
                <span class="section-title-text">${sec.title}</span>
            </div>
            <span class="section-chevron">▼</span>
        </div>
        <div class="section-body">
            <div class="section-inner">${body || '<div class="no-materials">No data recorded</div>'}</div>
        </div>
    </div>`;
}

// ── Picklist section ───────────────────────────────────────────────────────
function buildPicklistSection(d) {
    const savedDate = d?.savedAt
        ? new Date(d.savedAt).toLocaleDateString('en-GB', {day:'2-digit',month:'short',year:'numeric'})
        : null;

    const savedPill = savedDate
        ? `<span class="pl-saved-pill">Saved ${savedDate}</span>`
        : '';

    let body = '';

    if (!d) {
        body = `<div class="pl-no-data">📭 No picklist found for this job.</div>`;
    } else {
        const specCard = (def) => {
            const val  = d.specs?.[def.label] || '';
            const hasV = !!val;
            const note = def.note ? `<span class="pl-spec-note"> (${def.note})</span>` : '';
            const unit = (val && def.unit) ? `<span class="pl-spec-unit">${def.unit}</span>` : '';
            const extra = def.highlight ? ' cost-saving' : '';
            return `<div class="pl-spec-card${hasV?'':' no-val'}${extra}">
                <div class="pl-spec-lbl">${esc(def.label)}${note}</div>
                <div class="pl-spec-val${hasV?'':' empty'}">${hasV ? esc(val)+unit : '—'}</div>
            </div>`;
        };

        if (d.specs) {
            body += `<div class="pl-section-label">⚡ System Configuration</div>
                     <div class="pl-specs-grid">${SPECS.system.map(specCard).join('')}</div>`;
            body += `<div class="pl-section-label">🔩 Mounting &amp; Hardware</div>
                     <div class="pl-specs-grid">${SPECS.mounting.map(specCard).join('')}</div>`;
            body += `<div class="pl-section-label">🔌 Electrical &amp; Supply</div>
                     <div class="pl-specs-grid">${SPECS.electrical.map(specCard).join('')}</div>`;
        }

        if (d.mountCheck) {
            const mcCards = MOUNT_CHECK.map(def => {
                const val  = d.mountCheck[def.label] || '';
                const hasV = !!val;
                const extra = def.highlight ? ' cost-saving' : '';
                return `<div class="pl-spec-card${hasV?'':' no-val'}${extra}">
                    <div class="pl-spec-lbl">${esc(def.label)}</div>
                    <div class="pl-spec-val${hasV?'':' empty'}">${hasV ? esc(val) : '—'}</div>
                </div>`;
            }).join('');
            body += `<div class="pl-section-label">✅ Mount System Sense Check</div>
                     <div class="pl-specs-grid">${mcCards}</div>`;
        }

        const flatArr = d.panelFlat || (d.panelGrid ? d.panelGrid.flat() : null);
        const cols    = d.panelCols || (d.panelGrid?.[0]?.length) || 0;
        if (flatArr && cols) {
            let pC = 0, lC = 0, cells = '';
            flatArr.forEach(v => {
                if (v === 'P') pC++; if (v === 'L') lC++;
                const cls = v === 'P' ? 'p' : v === 'L' ? 'l' : 'e';
                cells += `<div class="pl-cell ${cls}" title="${v==='P'?'Portrait':v==='L'?'Landscape':'Empty'}">${v==='P'?'P':v==='L'?'L':''}</div>`;
            });
            if (pC || lC) {
                body += `<div class="pl-roof-wrap">
                    <div class="pl-roof-header">
                        <div class="pl-roof-title">🏠 Roof Panel Layout</div>
                        <div class="pl-legend">
                            <div class="pl-legend-item"><div class="pl-swatch p"></div>Portrait</div>
                            <div class="pl-legend-item"><div class="pl-swatch l"></div>Landscape</div>
                            <div class="pl-legend-item"><div class="pl-swatch e"></div>Empty</div>
                        </div>
                    </div>
                    <div class="pl-roof-grid-wrap">
                        <div class="pl-roof-grid" style="grid-template-columns:repeat(${cols},24px)">${cells}</div>
                    </div>
                    <div class="pl-roof-stats">
                        <div class="pl-roof-stat">🟧 Portrait: <strong>${pC}</strong></div>
                        <div class="pl-roof-stat">🟦 Landscape: <strong>${lC}</strong></div>
                        <div class="pl-roof-stat">📐 Total: <strong>${pC+lC}</strong></div>
                    </div>
                </div>`;
            }
        }

        if (Array.isArray(d.kfPicklist) && d.kfPicklist.length) {
            let totalQty = 0;
            d.kfPicklist.forEach(it => { const q = parseFloat(it.qty); if (!isNaN(q)) totalQty += q; });
            const rows = d.kfPicklist.map((it,i) => `
                <tr>
                    <td style="color:var(--text-dim);font-size:0.7rem">${i+1}</td>
                    <td><span class="pl-kf-part">${esc(it.partCode || '—')}</span></td>
                    <td><span class="pl-kf-qty">${esc(it.qty || '—')}</span></td>
                </tr>`).join('') +
                `<tr class="pl-kf-total">
                    <td></td>
                    <td style="color:var(--text-dim)">Total qty</td>
                    <td><span class="pl-kf-qty">${totalQty}</span></td>
                </tr>`;
            body += `<div class="pl-kf-wrap">
                <div class="pl-kf-header">
                    <div class="pl-kf-title">🧩 KF Picklist</div>
                    <span class="pl-kf-count">${d.kfPicklist.length} item${d.kfPicklist.length!==1?'s':''}</span>
                </div>
                <div class="pl-kf-table-wrap">
                    <table class="pl-kf-table">
                        <thead><tr><th>#</th><th>Part Code</th><th>Qty</th></tr></thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            </div>`;
        }

        if (!body) {
            body = `<div class="pl-no-data">Picklist found but contains no displayable data.</div>`;
        }
    }

    return `
    <div class="section picklist-section" style="animation-delay:0.6s">
        <div class="section-hdr">
            <div class="section-hdr-left">
                <span>📦</span>
                <span class="section-title-text">Picklist</span>
                ${savedPill}
            </div>
            <span class="section-chevron">▼</span>
        </div>
        <div class="section-body">
            <div class="section-inner">${body}</div>
        </div>
    </div>`;
}

                <span class="section-title-text">PDF Ripper Data</span>
                ${savedPill}
            </div>
            <span class="section-chevron">▼</span>
        </div>
        <div class="section-body">
            <div class="section-inner">${body}</div>
        </div>
    </div>`;
}

// ── Lightbox ───────────────────────────────────────────────────────────────
window.openLb = function(idx) {
    lbIndex = idx;
    updateLb();
    document.getElementById('lightbox').classList.add('show');
};
window.closeLb = function() {
    document.getElementById('lightbox').classList.remove('show');
};
window.lbNav = function(dir) {
    lbIndex = Math.max(0, Math.min(allPhotos.length - 1, lbIndex + dir));
    updateLb();
};
function updateLb() {
    const p = allPhotos[lbIndex];
    document.getElementById('lb-img').src             = p.url;
    document.getElementById('lb-label').textContent   = p.label;
    document.getElementById('lb-counter').textContent = `${lbIndex+1} / ${allPhotos.length}`;
    document.getElementById('lb-prev').disabled = lbIndex === 0;
    document.getElementById('lb-next').disabled = lbIndex === allPhotos.length - 1;
}

window.openRipperImg = function(url, label) {
    const tempIdx = allPhotos.length;
    allPhotos.push({ url, label });
    lbIndex = tempIdx;
    updateLb();
    document.getElementById('lightbox').classList.add('show');
};

document.getElementById('lightbox').addEventListener('click', e => {
    if (e.target === document.getElementById('lightbox')) closeLb();
});
document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('show')) return;
    if (e.key === 'ArrowLeft')  lbNav(-1);
    if (e.key === 'ArrowRight') lbNav(1);
    if (e.key === 'Escape')     closeLb();
});

// ── Utils ──────────────────────────────────────────────────────────────────
function esc(t) {
    const d = document.createElement('div');
    d.textContent = String(t ?? '');
    return d.innerHTML;
}
function fmtDatetime(str) {
    if (!str) return '—';
    const d = new Date(str);
    return isNaN(d) ? str : d.toLocaleString('en-GB',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function fmtDate(str) {
    if (!str) return '—';
    const d = new Date(str.length===10 ? str+'T00:00:00' : str);
    return isNaN(d) ? str : d.toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}

function fieldEl(label, value, isRadio) {
    const hasVal = value !== null && value !== undefined && value !== '';
    let display;
    if (!hasVal) {
        display = '<span class="missing">Not recorded</span>';
    } else if (isRadio) {
        const map = { Yes:'<span class="val-yes">Yes ✓</span>', No:'<span class="val-no">No ✗</span>', 'N/A':'<span class="val-na">N/A</span>' };
        display = map[value] || esc(value);
    } else {
        display = esc(String(value));
    }
    return `<div class="field">
        <div class="field-lbl">${label}</div>
        <div class="field-val">${display}</div>
    </div>`;
}

// ── Boot ───────────────────────────────────────────────────────────────────
load();
</script>
