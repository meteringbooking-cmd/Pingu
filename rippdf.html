<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Ripper | Pingu - Solar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"><\/script>
    <style>
        :root {
            --primary: #FF6B35; --secondary: #FFC857; --accent: #00D9FF;
            --dark: #1A1A2E; --dark-light: #252541; --dark-lighter: #2F2F4A;
            --text: #EAEAEA; --text-dim: #9A9AB0; --success: #4ECCA3;
            --error: #FF6B6B; --warning: #FFA500; --kf: #B57BFF;
            --shadow: rgba(255,107,53,0.3);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'JetBrains Mono',monospace; background:var(--dark); color:var(--text); line-height:1.6; min-height:100vh; overflow-x:hidden; }
        body::before { content:''; position:fixed; top:-50%; left:-50%; width:200%; height:200%;
            background: radial-gradient(circle at 20% 40%,rgba(255,107,53,0.07) 0%,transparent 50%), radial-gradient(circle at 80% 70%,rgba(0,217,255,0.06) 0%,transparent 50%), radial-gradient(circle at 50% 10%,rgba(181,123,255,0.05) 0%,transparent 50%);
            animation:bgDrift 24s ease-in-out infinite; pointer-events:none; z-index:0; }
        @keyframes bgDrift { 0%,100%{transform:translate(0,0);}50%{transform:translate(18px,-15px);} }
        .container { max-width:960px; margin:0 auto; padding:2rem; position:relative; z-index:1; }
        header { margin-bottom:2.5rem; animation:slideDown 0.6s ease-out; }
        @keyframes slideDown { from{opacity:0;transform:translateY(-22px);}to{opacity:1;transform:translateY(0);} }
        .header-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; margin-bottom:0.75rem; }
        .logo { font-family:'Syne',sans-serif; font-size:2rem; font-weight:800; background:linear-gradient(135deg,var(--primary),var(--secondary),var(--accent)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-decoration:none; }
        .back-btn { background:var(--dark-light); color:var(--text); text-decoration:none; padding:0.65rem 1.3rem; border-radius:8px; font-size:0.85rem; border:2px solid transparent; transition:all 0.2s; }
        .back-btn:hover { border-color:var(--accent); }
        h1 { font-family:'Syne',sans-serif; font-size:2.2rem; font-weight:800; }
        .subtitle { color:var(--text-dim); font-size:0.88rem; margin-top:0.25rem; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);} }

        .upload-zone { border:2px dashed rgba(0,217,255,0.3); border-radius:16px; padding:3rem 2rem; text-align:center; background:var(--dark-light); transition:all 0.3s ease; cursor:pointer; margin-bottom:2rem; animation:fadeUp 0.5s ease-out 0.1s both; }
        .upload-zone:hover,.upload-zone.drag-over { border-color:var(--accent); background:rgba(0,217,255,0.05); }
        .upload-zone.has-file { border-color:var(--success); background:rgba(78,204,163,0.05); }
        .upload-icon { font-size:3.5rem; margin-bottom:1rem; display:block; }
        .upload-title { font-family:'Syne',sans-serif; font-size:1.4rem; font-weight:700; margin-bottom:0.5rem; }
        .upload-sub { color:var(--text-dim); font-size:0.85rem; }
        .upload-file-name { margin-top:0.75rem; color:var(--success); font-size:0.9rem; font-weight:600; }
        #file-input { display:none; }

        .extract-btn { width:100%; padding:1.1rem; background:linear-gradient(135deg,var(--primary),var(--accent)); color:white; border:none; border-radius:12px; font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700; cursor:pointer; transition:all 0.3s ease; margin-bottom:2rem; display:none; }
        .extract-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 8px 24px var(--shadow); }
        .extract-btn:disabled { opacity:0.5; cursor:not-allowed; transform:none; }
        .extract-btn.visible { display:block; animation:fadeUp 0.3s ease-out; }

        .progress-area { display:none; background:var(--dark-light); border:2px solid var(--dark-lighter); border-radius:12px; padding:1.5rem; margin-bottom:2rem; }
        .progress-area.show { display:block; animation:fadeUp 0.3s ease-out; }
        .progress-step { display:flex; align-items:center; gap:0.75rem; padding:0.55rem 0; color:var(--text-dim); font-size:0.85rem; border-bottom:1px solid rgba(255,255,255,0.04); transition:color 0.3s; }
        .progress-step:last-child { border-bottom:none; }
        .progress-step.active { color:var(--accent); }
        .progress-step.done   { color:var(--success); }
        .progress-step.error  { color:var(--error); }
        .step-icon { font-size:1rem; width:20px; flex-shrink:0; text-align:center; }
        .spinner { width:16px; height:16px; border:2px solid rgba(0,217,255,0.3); border-top-color:var(--accent); border-radius:50%; animation:spin 0.7s linear infinite; flex-shrink:0; }
        @keyframes spin { to{transform:rotate(360deg);} }

        .results-area { display:none; animation:fadeUp 0.5s ease-out; }
        .results-area.show { display:block; }
        .result-section { background:var(--dark-light); border:2px solid var(--dark-lighter); border-radius:14px; margin-bottom:1.5rem; overflow:hidden; }
        .result-header { display:flex; align-items:center; gap:0.75rem; padding:1rem 1.3rem; background:rgba(255,255,255,0.02); border-bottom:2px solid var(--dark-lighter); }
        .result-header-icon { font-size:1.2rem; }
        .result-header-title { font-family:'Syne',sans-serif; font-weight:700; font-size:1rem; color:var(--accent); }
        .result-header-badge { margin-left:auto; padding:0.2rem 0.65rem; background:rgba(0,217,255,0.1); border:1px solid rgba(0,217,255,0.3); border-radius:20px; font-size:0.7rem; color:var(--accent); }
        .result-body { padding:1.3rem; }

        .address-block { font-family:'Syne',sans-serif; font-size:1.1rem; line-height:2; color:var(--text); }
        .address-line { display:block; }

        .layout-image-wrap { text-align:center; background:rgba(255,255,255,0.02); border-radius:10px; padding:1rem; }
        #layout-canvas { max-width:100%; border-radius:8px; border:1px solid var(--dark-lighter); display:none; }
        .image-hint { color:var(--text-dim); font-size:0.78rem; margin-top:0.75rem; }

        .boxes-grid { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
        .box-card { border-radius:10px; padding:1rem 1.1rem; border:1px solid; }
        .box-card.solar    { background:rgba(255,107,53,0.07);  border-color:rgba(255,107,53,0.3); }
        .box-card.inverter { background:rgba(0,217,255,0.06);   border-color:rgba(0,217,255,0.25); }
        .box-card.battery  { background:rgba(78,204,163,0.06);  border-color:rgba(78,204,163,0.25); }
        .box-card.bird     { background:rgba(181,123,255,0.06); border-color:rgba(181,123,255,0.25); }
        .box-label { font-size:0.65rem; text-transform:uppercase; letter-spacing:0.08em; margin-bottom:0.5rem; font-weight:700; }
        .solar   .box-label { color:var(--primary); }
        .inverter .box-label { color:var(--accent); }
        .battery .box-label { color:var(--success); }
        .bird    .box-label { color:var(--kf); }
        .box-text { font-size:0.88rem; color:var(--text); line-height:1.7; white-space:pre-wrap; }
        .box-empty { color:var(--text-dim); font-style:italic; font-size:0.85rem; }

        .copy-row { display:flex; gap:0.6rem; margin-top:1rem; flex-wrap:wrap; }
        .copy-btn { background:var(--dark-lighter); border:1px solid rgba(255,255,255,0.1); color:var(--text-dim); padding:0.45rem 0.9rem; border-radius:7px; font-family:'JetBrains Mono',monospace; font-size:0.78rem; cursor:pointer; transition:all 0.2s; }
        .copy-btn:hover  { border-color:var(--accent); color:var(--accent); }
        .copy-btn.copied { border-color:var(--success); color:var(--success); }

        .reset-btn { width:100%; padding:0.8rem; background:none; border:2px solid rgba(255,107,53,0.25); color:var(--text-dim); border-radius:10px; font-family:'JetBrains Mono',monospace; font-size:0.85rem; cursor:pointer; transition:all 0.2s; margin-top:0.5rem; }
        .reset-btn:hover { border-color:var(--primary); color:var(--primary); }
        .error-msg { background:rgba(255,107,107,0.1); border:2px solid rgba(255,107,107,0.3); border-radius:10px; padding:1rem 1.2rem; color:var(--error); font-size:0.88rem; margin-bottom:1rem; display:none; }
        .error-msg.show { display:block; animation:fadeUp 0.3s ease; }

        .pages-preview { display:none; gap:0.75rem; margin-bottom:1.5rem; overflow-x:auto; padding-bottom:0.5rem; }
        .pages-preview.show { display:flex; }
        .page-thumb { flex-shrink:0; text-align:center; }
        .page-thumb canvas { border-radius:6px; border:2px solid var(--dark-lighter); display:block; }
        .page-thumb.highlight canvas { border-color:var(--accent); }
        .page-thumb-label { font-size:0.65rem; color:var(--text-dim); margin-top:0.3rem; }
        .page-thumb.highlight .page-thumb-label { color:var(--accent); }

        @media (max-width:600px) { h1{font-size:1.8rem;} .boxes-grid{grid-template-columns:1fr;} }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="header-row">
            <a href="teamview.html" class="logo">Pingu - Solar</a>
            <a href="teamview.html" class="back-btn">← Back to Dashboard</a>
        </div>
        <h1>📄 PDF Ripper</h1>
        <p class="subtitle">Upload a solar survey PDF — extracts the address (page 1), proposed layout image (page 3), and Solar Panels / Inverter / Battery / Bird Deterrent Mesh boxes (page 4).</p>
    </header>

    <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
        <span class="upload-icon" id="upload-icon">📂</span>
        <div class="upload-title" id="upload-title">Drop your PDF here</div>
        <div class="upload-sub">or click to browse · PDF files only</div>
        <div class="upload-file-name" id="upload-file-name"></div>
        <input type="file" id="file-input" accept=".pdf,application/pdf" />
    </div>

    <div class="error-msg" id="error-msg"></div>
    <button class="extract-btn" id="extract-btn" onclick="startExtraction()">⚡ Extract Data from PDF</button>
    <div class="pages-preview" id="pages-preview"></div>

    <div class="progress-area" id="progress-area">
        <div class="progress-step" id="step-render"><span class="step-icon">🖼️</span> Rendering PDF pages to images…</div>
        <div class="progress-step" id="step-address"><span class="step-icon">📍</span> Reading address from below "Address" label on page 1…</div>
        <div class="progress-step" id="step-layout"><span class="step-icon">🗺️</span> Cropping layout image from below "Your proposed layout" on page 3…</div>
        <div class="progress-step" id="step-boxes"><span class="step-icon">📦</span> Reading Solar Panels / Inverter / Battery / Bird Deterrent Mesh boxes from page 4…</div>
    </div>

    <div class="results-area" id="results-area">
        <div class="result-section">
            <div class="result-header">
                <span class="result-header-icon">📍</span>
                <span class="result-header-title">Property Address</span>
                <span class="result-header-badge">Page 1</span>
            </div>
            <div class="result-body">
                <div class="address-block" id="result-address">—</div>
                <div class="copy-row">
                    <button class="copy-btn" id="copy-address-btn" onclick="copyAddress()">📋 Copy Address</button>
                </div>
            </div>
        </div>

        <div class="result-section">
            <div class="result-header">
                <span class="result-header-icon">🗺️</span>
                <span class="result-header-title">Proposed Layout</span>
                <span class="result-header-badge">Page 3</span>
            </div>
            <div class="result-body">
                <div class="layout-image-wrap">
                    <canvas id="layout-canvas"></canvas>
                    <div id="layout-placeholder" style="color:var(--text-dim);font-size:0.9rem;padding:2rem 0;">Layout image will appear here</div>
                </div>
                <div class="copy-row">
                    <button class="copy-btn" onclick="downloadLayout()">⬇️ Download Layout Image</button>
                </div>
                <p class="image-hint">Cropped to the region below "Your proposed layout" · right-click to save</p>
            </div>
        </div>

        <div class="result-section">
            <div class="result-header">
                <span class="result-header-icon">📦</span>
                <span class="result-header-title">Site Assessment Boxes</span>
                <span class="result-header-badge">Page 4</span>
            </div>
            <div class="result-body">
                <div class="boxes-grid">
                    <div class="box-card solar">
                        <div class="box-label">☀️ Solar Panels</div>
                        <div class="box-text" id="box-solar">—</div>
                    </div>
                    <div class="box-card inverter">
                        <div class="box-label">⚡ Inverter</div>
                        <div class="box-text" id="box-inverter">—</div>
                    </div>
                    <div class="box-card battery">
                        <div class="box-label">🔋 Battery</div>
                        <div class="box-text" id="box-battery">—</div>
                    </div>
                    <div class="box-card bird">
                        <div class="box-label">🐦 Bird Deterrent Mesh</div>
                        <div class="box-text" id="box-bird">—</div>
                    </div>
                </div>
                <div class="copy-row">
                    <button class="copy-btn" data-box="solar"    onclick="copyBox(this,'solar',   'Solar Panels')">📋 Solar Panels</button>
                    <button class="copy-btn" data-box="inverter" onclick="copyBox(this,'inverter','Inverter')">📋 Inverter</button>
                    <button class="copy-btn" data-box="battery"  onclick="copyBox(this,'battery', 'Battery')">📋 Battery</button>
                    <button class="copy-btn" data-box="bird"     onclick="copyBox(this,'bird',    'Bird Mesh')">📋 Bird Mesh</button>
                    <button class="copy-btn" onclick="copyAllBoxes(this)">📋 Copy All</button>
                </div>
            </div>
        </div>

        <button class="reset-btn" onclick="resetAll()">↩ Upload Another PDF</button>
    </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let pdfFile = null, pageCanvases = {}, extractedAddress = '', layoutCroppedUrl = '';

const fileInput  = document.getElementById('file-input');
const uploadZone = document.getElementById('upload-zone');

fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
uploadZone.addEventListener('dragover',  e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
    e.preventDefault(); uploadZone.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type === 'application/pdf') handleFile(f);
    else showError('Please drop a PDF file.');
});

function handleFile(f) {
    pdfFile = f;
    uploadZone.classList.add('has-file');
    document.getElementById('upload-icon').textContent  = '✅';
    document.getElementById('upload-title').textContent = f.name;
    document.getElementById('upload-file-name').textContent = (f.size/1024/1024).toFixed(2) + ' MB';
    document.getElementById('extract-btn').classList.add('visible');
    hideError(); resetResults();
}

async function renderPages(pdf, nums) {
    const SCALE = 2.5;
    for (const n of nums) {
        if (n > pdf.numPages) continue;
        const page = await pdf.getPage(n);
        const vp   = page.getViewport({ scale: SCALE });
        const c    = document.createElement('canvas');
        c.width = vp.width; c.height = vp.height;
        await page.render({ canvasContext: c.getContext('2d'), viewport: vp }).promise;
        pageCanvases[n] = { dataUrl: c.toDataURL('image/jpeg', 0.93), w: c.width, h: c.height, canvas: c };
    }
}

function showThumbnails() {
    const container = document.getElementById('pages-preview');
    container.innerHTML = '';
    [[1,'Page 1 – Address'],[3,'Page 3 – Layout'],[4,'Page 4 – Boxes']].forEach(([n, lbl]) => {
        const pd = pageCanvases[n];
        if (!pd) return;
        const img = new Image();
        img.onload = () => {
            const s = 0.1, c = document.createElement('canvas');
            c.width = Math.round(img.width*s); c.height = Math.round(img.height*s);
            c.getContext('2d').drawImage(img,0,0,c.width,c.height);
            const wrap = document.createElement('div');
            wrap.className = 'page-thumb highlight';
            const lblEl = document.createElement('div');
            lblEl.className = 'page-thumb-label'; lblEl.textContent = lbl;
            wrap.appendChild(c); wrap.appendChild(lblEl);
            container.appendChild(wrap);
        };
        img.src = pd.dataUrl;
    });
    container.classList.add('show');
}

async function askClaude(imageDataUrl, prompt) {
    const base64 = imageDataUrl.split(',')[1];
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            model: 'claude-sonnet-4-20250514',
            max_tokens: 1500,
            messages: [{ role: 'user', content: [
                { type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: base64 } },
                { type: 'text',  text: prompt }
            ]}]
        })
    });
    if (!resp.ok) { const err = await resp.json().catch(()=>({})); throw new Error(err?.error?.message || 'API error '+resp.status); }
    const data = await resp.json();
    return data.content.find(b => b.type==='text')?.text?.trim() || '';
}

function setStep(id, state) {
    const el = document.getElementById(id);
    el.className = 'progress-step ' + state;
    const icon = el.querySelector('.step-icon');
    const existing = el.querySelector('.spinner');
    if (existing) existing.remove();
    if (state === 'active') {
        const sp = document.createElement('div'); sp.className = 'spinner';
        el.insertBefore(sp, icon); icon.style.display = 'none';
    } else {
        icon.style.display = '';
        if (state === 'done')  icon.textContent = '✅';
        if (state === 'error') icon.textContent = '❌';
    }
}

async function startExtraction() {
    if (!pdfFile) return;
    hideError(); resetResults();
    const btn = document.getElementById('extract-btn');
    btn.disabled = true; btn.textContent = '⏳ Processing…';
    document.getElementById('progress-area').classList.add('show');

    try {
        // Step 1 — render
        setStep('step-render', 'active');
        const pdf = await pdfjsLib.getDocument({ data: await pdfFile.arrayBuffer() }).promise;
        await renderPages(pdf, [1,3,4]);
        showThumbnails();
        setStep('step-render', 'done');

        // Step 2 — address from page 1
        setStep('step-address', 'active');
        let address = 'NOT FOUND';
        if (pageCanvases[1]) {
            address = await askClaude(pageCanvases[1].dataUrl,
`This is page 1 of a solar installation survey PDF.

There is a field or label on this page that says "Address" (it may say "Property Address", "Site Address", or similar).
Directly below that label is the actual property address.

Extract ONLY the lines of the address that appear below that label.
Do NOT include the word "Address" itself. Do NOT include company names, logos, or any other text.
Return one address line per line, nothing else.

Example output:
14 Maple Avenue
Sheffield
S10 3LW

If you cannot find it, return: NOT FOUND`);
            extractedAddress = address;
        }
        setStep('step-address', 'done');

        // Step 3 — crop layout from page 3
        setStep('step-layout', 'active');
        if (pageCanvases[3]) {
            const { dataUrl, w, h, canvas: srcCanvas } = pageCanvases[3];

            // Ask Claude for pixel bounding box of diagram below "Your proposed layout"
            const coordsRaw = await askClaude(dataUrl,
`This is page 3 of a solar installation survey PDF.

Somewhere on this page there is a heading or label that says "Your proposed layout" (or very similar wording).
Directly below that heading there is a diagram or image showing the proposed solar panel layout on a roof.

The full image dimensions are ${w} x ${h} pixels.

Return ONLY a JSON object giving the bounding box (in pixels) of the diagram/image area that appears BELOW the "Your proposed layout" heading. Do NOT include the heading text itself in the box — start the box where the diagram begins.

{"x": <left edge>, "y": <top of diagram, below the heading>, "w": <width>, "h": <height>}

No other text. If you cannot find the diagram, return: {"x":0,"y":${Math.round(h*0.25)},"w":${w},"h":${Math.round(h*0.7)}}`);

            let rx=0, ry=Math.round(h*0.25), rw=w, rh=Math.round(h*0.7);
            try {
                const cleaned = coordsRaw.replace(/```json|```/g,'').trim();
                const parsed  = JSON.parse(cleaned);
                rx = Math.max(0, Math.min(parseInt(parsed.x)||0, w-10));
                ry = Math.max(0, Math.min(parseInt(parsed.y)||0, h-10));
                rw = Math.max(50, Math.min(parseInt(parsed.w)||w, w-rx));
                rh = Math.max(50, Math.min(parseInt(parsed.h)||h, h-ry));
            } catch(e) { /* use defaults */ }

            const out = document.getElementById('layout-canvas');
            out.width = rw; out.height = rh;
            out.getContext('2d').drawImage(srcCanvas, rx, ry, rw, rh, 0, 0, rw, rh);
            layoutCroppedUrl = out.toDataURL('image/jpeg', 0.93);
        }
        setStep('step-layout', 'done');

        // Step 4 — four boxes from page 4
        setStep('step-boxes', 'active');
        let solar='—', inverter='—', battery='—', bird='—';
        if (pageCanvases[4]) {
            const raw = await askClaude(pageCanvases[4].dataUrl,
`This is page 4 of a solar installation survey PDF.

This page contains four distinct bordered boxes or sections. Each box has a label/heading. The four boxes are labelled:
1. "Solar Panels" (may also say "PV Panels" or "Solar panels")
2. "Inverter" (may also say "Inverter/Optimiser")
3. "Battery" (may also say "Battery storage")
4. "Bird Deterrent Mesh" (may also say "Bird Mesh", "Bird mesh", or "Bird deterrent")

For each box, extract ALL the text that appears inside the box boundary — this may include product names, quantities, model numbers, specifications, prices, notes, or any other content written inside that box.

Return ONLY valid JSON with no markdown formatting, no preamble, no explanation:
{"solar":"...","inverter":"...","battery":"...","bird":"..."}

Use empty string "" for any box you cannot find or that appears blank.`);

            try {
                const parsed = JSON.parse(raw.replace(/```json|```/g,'').trim());
                solar    = parsed.solar    || '—';
                inverter = parsed.inverter || '—';
                battery  = parsed.battery  || '—';
                bird     = parsed.bird     || '—';
            } catch(e) { solar = raw; }
        }
        setStep('step-boxes', 'done');

        populateResults(address, solar, inverter, battery, bird);

    } catch(err) {
        console.error(err);
        showError('Extraction failed: ' + err.message);
        ['step-render','step-address','step-layout','step-boxes'].forEach(id => {
            if (document.getElementById(id).classList.contains('active')) setStep(id,'error');
        });
    } finally {
        btn.disabled = false; btn.textContent = '⚡ Extract Data from PDF';
    }
}

function populateResults(address, solar, inverter, battery, bird) {
    const addrEl = document.getElementById('result-address');
    const lines  = address.split('\n').filter(l=>l.trim());
    addrEl.innerHTML = lines.map(l=>`<span class="address-line">${escHtml(l)}</span>`).join('');

    const canvas = document.getElementById('layout-canvas');
    const ph     = document.getElementById('layout-placeholder');
    if (layoutCroppedUrl) { canvas.style.display='block'; ph.style.display='none'; }

    setBoxText('box-solar',    solar);
    setBoxText('box-inverter', inverter);
    setBoxText('box-battery',  battery);
    setBoxText('box-bird',     bird);

    document.getElementById('results-area').classList.add('show');
    setTimeout(() => document.getElementById('results-area').scrollIntoView({behavior:'smooth',block:'start'}), 100);
}

function setBoxText(id, text) {
    const el = document.getElementById(id);
    if (!text || text==='—') el.innerHTML = '<span class="box-empty">No content found</span>';
    else el.textContent = text;
}

function escHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

function copyAddress() {
    navigator.clipboard.writeText(extractedAddress).then(() => {
        const btn = document.getElementById('copy-address-btn');
        btn.classList.add('copied'); btn.textContent='✅ Copied!';
        setTimeout(()=>{ btn.classList.remove('copied'); btn.textContent='📋 Copy Address'; },2000);
    });
}

function copyBox(btn, which, label) {
    const text = document.getElementById('box-'+which).textContent;
    navigator.clipboard.writeText(label+':\n'+text).then(()=>{
        btn.classList.add('copied'); btn.textContent='✅ Copied!';
        setTimeout(()=>{ btn.classList.remove('copied'); btn.textContent='📋 '+label; },2000);
    });
}

function copyAllBoxes(btn) {
    const parts = [
        'Solar Panels:\n'       + document.getElementById('box-solar').textContent,
        'Inverter:\n'           + document.getElementById('box-inverter').textContent,
        'Battery:\n'            + document.getElementById('box-battery').textContent,
        'Bird Deterrent Mesh:\n'+ document.getElementById('box-bird').textContent,
    ];
    navigator.clipboard.writeText(parts.join('\n\n')).then(()=>{
        btn.classList.add('copied'); btn.textContent='✅ All Copied!';
        setTimeout(()=>{ btn.classList.remove('copied'); btn.textContent='📋 Copy All'; },2000);
    });
}

function downloadLayout() {
    if (!layoutCroppedUrl) return;
    const a = document.createElement('a'); a.href=layoutCroppedUrl; a.download='proposed-layout.jpg'; a.click();
}

function showError(msg) { const el=document.getElementById('error-msg'); el.textContent=msg; el.classList.add('show'); }
function hideError()    { document.getElementById('error-msg').classList.remove('show'); }

function resetResults() {
    document.getElementById('results-area').classList.remove('show');
    document.getElementById('progress-area').classList.remove('show');
    document.getElementById('pages-preview').classList.remove('show');
    document.getElementById('pages-preview').innerHTML = '';
    ['step-render','step-address','step-layout','step-boxes'].forEach(id => {
        document.getElementById(id).className='progress-step';
        const icon=document.getElementById(id).querySelector('.step-icon');
        if(icon){icon.style.display='';icon.textContent=icon.textContent;}
    });
    const canvas=document.getElementById('layout-canvas');
    canvas.style.display='none';
    document.getElementById('layout-placeholder').style.display='';
    pageCanvases={}; layoutCroppedUrl=''; extractedAddress='';
}

function resetAll() {
    resetResults(); pdfFile=null;
    uploadZone.classList.remove('has-file');
    document.getElementById('upload-icon').textContent='📂';
    document.getElementById('upload-title').textContent='Drop your PDF here';
    document.getElementById('upload-file-name').textContent='';
    document.getElementById('extract-btn').classList.remove('visible');
    fileInput.value=''; hideError();
}
<\/script>
</body>
