<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Van Replenishment Orders | Pingu - Solar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --primary-dark: #E55A2B;
            --secondary: #FFC857;
            --accent: #00D9FF;
            --dark: #1A1A2E;
            --dark-light: #252541;
            --dark-lighter: #2F2F4A;
            --text: #EAEAEA;
            --text-dim: #9A9AB0;
            --success: #4ECCA3;
            --error: #FF6B6B;
            --warning: #FFC857;
            --shadow: rgba(255, 107, 53, 0.3);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--dark); color: var(--text);
            line-height: 1.6; overflow-x: hidden; min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(255,107,53,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0,217,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255,200,87,0.06) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none; z-index: -1;
        }
        @keyframes float {
            0%, 100% { transform: translate(0,0) rotate(0deg); }
            33%       { transform: translate(30px,-30px) rotate(120deg); }
            66%       { transform: translate(-20px,20px) rotate(240deg); }
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
        header { margin-bottom: 2rem; animation: slideDown 0.8s ease-out; }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .header-content { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        .logo {
            font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            text-decoration: none;
        }
        .back-btn {
            background: var(--dark-light); color: var(--text); text-decoration: none;
            padding: 0.7rem 1.5rem; border-radius: 8px; font-size: 0.9rem;
            transition: all 0.3s ease; border: 2px solid transparent;
        }
        .back-btn:hover { background: var(--dark-lighter); border-color: var(--primary); transform: translateX(-5px); }
        h1 { font-family: 'Syne', sans-serif; font-size: 2.5rem; margin-bottom: 0.5rem; }
        .subtitle { color: var(--text-dim); font-size: 0.95rem; }

        /* Stats */
        .stats-row {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem; margin-bottom: 2rem;
        }
        .stat-card {
            background: var(--dark-light); border-radius: 12px; padding: 1.2rem 1.5rem;
            border: 2px solid var(--dark-lighter); text-align: center;
            transition: border-color 0.3s ease;
        }
        .stat-card:hover { border-color: var(--primary); }
        .stat-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.4rem; }
        .stat-value {
            font-family: 'Syne', sans-serif; font-size: 2rem; font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }

        /* Filters */
        .filters-card {
            background: var(--dark-light); border-radius: 16px; padding: 1.5rem;
            border: 2px solid var(--dark-lighter); margin-bottom: 2rem;
        }
        .filters-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 1rem;
            margin-bottom: 1rem;
        }
        .filter-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .filter-label { color: var(--text-dim); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.1em; }
        .filter-input, .filter-select {
            background: var(--dark-lighter); border: 2px solid var(--dark-lighter);
            color: var(--text); padding: 0.7rem 1rem; border-radius: 8px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; transition: all 0.3s ease;
        }
        .filter-input:focus, .filter-select:focus { outline: none; border-color: var(--primary); }
        .filter-input::placeholder { color: var(--text-dim); }
        .filter-actions { display: flex; gap: 1rem; flex-wrap: wrap; }
        .btn {
            padding: 0.7rem 1.4rem; border: none; border-radius: 8px;
            font-family: 'Syne', sans-serif; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s ease;
        }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--accent)); color: white; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 16px var(--shadow); }
        .btn-secondary { background: var(--dark-lighter); color: var(--text); border: 2px solid var(--dark-lighter); }
        .btn-secondary:hover { border-color: var(--primary); }

        /* Orders grid */
        .orders-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(420px, 1fr));
            gap: 1.5rem;
        }
        .order-card {
            background: var(--dark-light); border-radius: 16px; padding: 0;
            border: 2px solid var(--dark-lighter); overflow: hidden;
            transition: all 0.3s ease; animation: fadeInUp 0.5s ease-out;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .order-card:hover { border-color: var(--primary); transform: translateY(-2px); }

        .order-card-header {
            padding: 1.2rem 1.5rem;
            background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(0,217,255,0.05));
            border-bottom: 1px solid var(--dark-lighter);
            display: flex; justify-content: space-between; align-items: flex-start; gap: 1rem;
        }
        .order-job {
            font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 800;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            margin-bottom: 0.2rem;
        }
        .order-submitter { color: var(--text-dim); font-size: 0.8rem; }
        .order-date { color: var(--text-dim); font-size: 0.75rem; text-align: right; white-space: nowrap; }

        .order-card-body { padding: 1.2rem 1.5rem; }
        .order-info-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem; margin-bottom: 1rem;
        }
        .order-info-item { display: flex; flex-direction: column; gap: 0.2rem; }
        .order-info-label { color: var(--text-dim); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; }
        .order-info-value { color: var(--text); font-size: 0.85rem; font-weight: 500; }

        /* Status badge */
        .status-badge {
            display: inline-flex; align-items: center; gap: 0.3rem;
            padding: 0.3rem 0.8rem; border-radius: 20px;
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em;
            white-space: nowrap;
        }
        .status-pending  { background: rgba(255,200,87,0.2);  color: var(--warning); border: 1px solid rgba(255,200,87,0.4); }
        .status-fulfilled { background: rgba(78,204,163,0.2); color: var(--success); border: 1px solid rgba(78,204,163,0.4); }
        .status-cancelled { background: rgba(255,107,107,0.2); color: var(--error); border: 1px solid rgba(255,107,107,0.4); }

        /* Items toggle */
        .items-toggle {
            background: var(--dark-lighter); border: none; color: var(--accent);
            padding: 0.5rem 1rem; border-radius: 8px; font-family: 'JetBrains Mono', monospace;
            font-size: 0.8rem; cursor: pointer; width: 100%; text-align: left;
            display: flex; align-items: center; justify-content: space-between;
            transition: all 0.2s ease; margin-bottom: 0.5rem;
        }
        .items-toggle:hover { background: var(--dark); }
        .items-toggle .arrow { transition: transform 0.2s ease; }
        .items-toggle.open .arrow { transform: rotate(180deg); }
        .items-list { display: none; overflow: hidden; }
        .items-list.open {
            display: block; animation: slideDown 0.2s ease-out;
            max-height: 400px; overflow-y: auto;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .items-list::-webkit-scrollbar { width: 5px; }
        .items-list::-webkit-scrollbar-track { background: var(--dark-lighter); border-radius: 3px; }
        .items-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

        .item-cat-header {
            font-size: 0.7rem; color: var(--accent); font-weight: 700;
            text-transform: uppercase; letter-spacing: 0.08em;
            padding: 0.5rem 0 0.2rem; border-bottom: 1px solid rgba(0,217,255,0.15);
            margin-bottom: 0.3rem;
        }
        .item-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.3rem 0; border-bottom: 1px solid rgba(255,255,255,0.04);
            gap: 0.5rem;
        }
        .item-row:last-child { border-bottom: none; }
        .item-name { font-size: 0.78rem; color: var(--text); flex: 1; }
        .item-qty {
            font-size: 0.8rem; font-weight: 700; color: var(--primary);
            background: rgba(255,107,53,0.1); padding: 0.15rem 0.5rem; border-radius: 4px;
            white-space: nowrap;
        }

        /* Card footer */
        .order-card-footer {
            padding: 1rem 1.5rem;
            background: var(--dark-lighter);
            border-top: 1px solid var(--dark);
            display: flex; justify-content: space-between; align-items: center; gap: 1rem; flex-wrap: wrap;
        }
        .total-items-badge {
            background: rgba(0,217,255,0.1); border: 1px solid rgba(0,217,255,0.3);
            color: var(--accent); padding: 0.3rem 0.8rem; border-radius: 6px;
            font-size: 0.75rem; font-weight: 700;
        }
        .status-select {
            background: var(--dark); border: 2px solid var(--dark);
            color: var(--text); padding: 0.4rem 0.8rem; border-radius: 8px;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; cursor: pointer;
            transition: all 0.2s ease;
        }
        .status-select:focus { outline: none; border-color: var(--primary); }
        .save-status-btn {
            background: linear-gradient(135deg, var(--success), #3DB88E);
            color: var(--dark); border: none; padding: 0.4rem 0.9rem; border-radius: 8px;
            font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s ease;
        }
        .save-status-btn:hover { transform: translateY(-2px); }

        /* Empty state */
        .empty-state {
            text-align: center; padding: 4rem; color: var(--text-dim);
            grid-column: 1 / -1;
        }
        .empty-icon { font-size: 4rem; margin-bottom: 1rem; }
        .empty-state h3 { font-family: 'Syne', sans-serif; font-size: 1.5rem; margin-bottom: 0.5rem; color: var(--text); }

        .loading-state {
            text-align: center; padding: 4rem; color: var(--text-dim);
            font-size: 1.1rem; grid-column: 1 / -1;
        }

        /* Toast */
        .toast {
            position: fixed; bottom: 2rem; right: 2rem;
            background: var(--dark-light); color: var(--text); padding: 1rem 1.5rem;
            border-radius: 10px; border: 2px solid var(--success);
            box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 2000;
            animation: slideInRight 0.4s ease; display: none; font-size: 0.9rem;
        }
        .toast.show { display: block; }
        .toast.error { border-color: var(--error); }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(300px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @media (max-width: 768px) {
            .container { padding: 1rem; }
            .orders-grid { grid-template-columns: 1fr; }
            .order-info-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <header>
        <div class="header-content">
            <a href="teamview.html" class="logo">Pingu - Solar</a>
            <a href="admin.html" class="back-btn">← Back to Admin</a>
        </div>
        <h1>🚐 Van Replenishment Orders</h1>
        <p class="subtitle">View and manage all van stock replenishment requests</p>
    </header>

    <!-- Stats -->
    <div class="stats-row" id="stats-row">
        <div class="stat-card"><div class="stat-label">Total Orders</div><div class="stat-value" id="stat-total">—</div></div>
        <div class="stat-card"><div class="stat-label">Pending</div><div class="stat-value" id="stat-pending" style="background:linear-gradient(135deg,var(--warning),#E5A82A);-webkit-background-clip:text;background-clip:text;">—</div></div>
        <div class="stat-card"><div class="stat-label">Fulfilled</div><div class="stat-value" id="stat-fulfilled" style="background:linear-gradient(135deg,var(--success),#3DB88E);-webkit-background-clip:text;background-clip:text;">—</div></div>
        <div class="stat-card"><div class="stat-label">This Week</div><div class="stat-value" id="stat-week">—</div></div>
    </div>

    <!-- Filters -->
    <div class="filters-card">
        <div class="filters-grid">
            <div class="filter-group">
                <label class="filter-label" for="f-job">Job Number</label>
                <input type="text" id="f-job" class="filter-input" placeholder="Search job #...">
            </div>
            <div class="filter-group">
                <label class="filter-label" for="f-name">Submitted By</label>
                <input type="text" id="f-name" class="filter-input" placeholder="Search name...">
            </div>
            <div class="filter-group">
                <label class="filter-label" for="f-status">Status</label>
                <select id="f-status" class="filter-select">
                    <option value="">All Statuses</option>
                    <option value="pending">Pending</option>
                    <option value="fulfilled">Fulfilled</option>
                    <option value="cancelled">Cancelled</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label" for="f-date-from">From Date</label>
                <input type="date" id="f-date-from" class="filter-input">
            </div>
            <div class="filter-group">
                <label class="filter-label" for="f-date-to">To Date</label>
                <input type="date" id="f-date-to" class="filter-input">
            </div>
        </div>
        <div class="filter-actions">
            <button class="btn btn-primary" onclick="applyFilters()">Apply Filters</button>
            <button class="btn btn-secondary" onclick="clearFilters()">Clear</button>
            <button class="btn btn-secondary" onclick="loadOrders()">↻ Refresh</button>
        </div>
    </div>

    <!-- Orders grid -->
    <div class="orders-grid" id="orders-grid">
        <div class="loading-state">⏳ Loading orders...</div>
    </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Firebase -->
<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, getDocs, doc, updateDoc, query, orderBy }
        from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    const firebaseConfig = {
        apiKey: "AIzaSyAc_yJQ_rkzuOBh-Yxg0Q4eooXtB-tQjm0",
        authDomain: "pingu-solar.firebaseapp.com",
        projectId: "pingu-solar",
        storageBucket: "pingu-solar.firebasestorage.app",
        messagingSenderId: "232764952866",
        appId: "1:232764952866:web:5923b7f419de6355d6157b",
        measurementId: "G-PFH059DZ64"
    };

    const app = initializeApp(firebaseConfig);
    window.db = getFirestore(app);
    window.firebaseModules = { collection, getDocs, doc, updateDoc, query, orderBy };
    console.log('✅ Firebase ready');
    window.addEventListener('DOMContentLoaded', () => window.loadOrders());
</script>

<script>
let allOrders = [];
let filteredOrders = [];

/* ══════════════════════════════
   LOAD ORDERS
══════════════════════════════ */
window.loadOrders = async function() {
    document.getElementById('orders-grid').innerHTML = '<div class="loading-state">⏳ Loading orders...</div>';
    try {
        const { collection, getDocs, query, orderBy: ob } = window.firebaseModules;
        const snap = await getDocs(query(collection(window.db, 'Van Replenishment'), ob('submittedAt', 'desc')));
        allOrders = [];
        snap.forEach(doc => allOrders.push({ id: doc.id, ...doc.data() }));
        filteredOrders = [...allOrders];
        updateStats();
        renderOrders();
    } catch (err) {
        console.error(err);
        document.getElementById('orders-grid').innerHTML = `<div class="empty-state"><div class="empty-icon">⚠️</div><h3>Error Loading</h3><p>${escHtml(err.message)}</p></div>`;
    }
};

/* ══════════════════════════════
   STATS
══════════════════════════════ */
function updateStats() {
    const now = new Date();
    const weekAgo = new Date(now); weekAgo.setDate(now.getDate() - 7);

    const pending   = allOrders.filter(o => (o.status || 'pending') === 'pending').length;
    const fulfilled = allOrders.filter(o => o.status === 'fulfilled').length;
    const thisWeek  = allOrders.filter(o => o.submittedAt && new Date(o.submittedAt) >= weekAgo).length;

    document.getElementById('stat-total').textContent     = allOrders.length;
    document.getElementById('stat-pending').textContent   = pending;
    document.getElementById('stat-fulfilled').textContent = fulfilled;
    document.getElementById('stat-week').textContent      = thisWeek;
}

/* ══════════════════════════════
   FILTERS
══════════════════════════════ */
window.applyFilters = function() {
    const job      = document.getElementById('f-job').value.toLowerCase().trim();
    const name     = document.getElementById('f-name').value.toLowerCase().trim();
    const status   = document.getElementById('f-status').value;
    const dateFrom = document.getElementById('f-date-from').value;
    const dateTo   = document.getElementById('f-date-to').value;

    filteredOrders = allOrders.filter(o => {
        if (job    && !String(o.jobNumber || '').toLowerCase().includes(job))           return false;
        if (name   && !String(o.submittedBy || '').toLowerCase().includes(name))        return false;
        if (status && (o.status || 'pending') !== status)                               return false;
        if (dateFrom && o.submittedAt) {
            const s = new Date(dateFrom); s.setHours(0,0,0,0);
            if (new Date(o.submittedAt) < s) return false;
        }
        if (dateTo && o.submittedAt) {
            const e = new Date(dateTo); e.setHours(23,59,59,999);
            if (new Date(o.submittedAt) > e) return false;
        }
        return true;
    });
    renderOrders();
};

window.clearFilters = function() {
    ['f-job','f-name','f-status','f-date-from','f-date-to'].forEach(id => {
        document.getElementById(id).value = '';
    });
    filteredOrders = [...allOrders];
    renderOrders();
};

/* ══════════════════════════════
   RENDER
══════════════════════════════ */
function renderOrders() {
    const grid = document.getElementById('orders-grid');

    if (!filteredOrders.length) {
        grid.innerHTML = `
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <h3>No Orders Found</h3>
                <p>No van replenishment orders match the current filters</p>
            </div>`;
        return;
    }

    grid.innerHTML = filteredOrders.map(order => {
        const status    = order.status || 'pending';
        const statusLabel = status === 'fulfilled' ? '✅ Fulfilled' : status === 'cancelled' ? '🚫 Cancelled' : '⏳ Pending';
        const items     = order.items || [];
        const cats      = [...new Set(items.map(i => i.category))];

        const itemsHtml = cats.map(cat => {
            const catItems = items.filter(i => i.category === cat);
            return `
                <div class="item-cat-header">${escHtml(cat)}</div>
                ${catItems.map(item => `
                    <div class="item-row">
                        <div class="item-name">${escHtml(item.name)}</div>
                        <div class="item-qty">× ${item.quantity}</div>
                    </div>`).join('')}`;
        }).join('');

        return `
        <div class="order-card">
            <div class="order-card-header">
                <div>
                    <div class="order-job">#${escHtml(order.jobNumber || 'N/A')}</div>
                    <div class="order-submitter">by ${escHtml(order.submittedBy || 'Unknown')}</div>
                </div>
                <div class="order-date">
                    <div>${formatDate(order.submittedAt)}</div>
                    <div style="margin-top:0.3rem;">
                        <span class="status-badge status-${escHtml(status)}">${statusLabel}</span>
                    </div>
                </div>
            </div>
            <div class="order-card-body">
                <div class="order-info-grid">
                    <div class="order-info-item">
                        <div class="order-info-label">Customer</div>
                        <div class="order-info-value">${escHtml(order.customerName || 'N/A')}</div>
                    </div>
                    <div class="order-info-item">
                        <div class="order-info-label">Postcode</div>
                        <div class="order-info-value">${escHtml(order.postcode || 'N/A')}</div>
                    </div>
                    <div class="order-info-item">
                        <div class="order-info-label">Delivery Address</div>
                        <div class="order-info-value">${escHtml(order.address || 'N/A')}</div>
                    </div>
                    <div class="order-info-item">
                        <div class="order-info-label">Delivery Date</div>
                        <div class="order-info-value">${escHtml(order.deliveryDate || 'N/A')}</div>
                    </div>
                    <div class="order-info-item">
                        <div class="order-info-label">Lead Engineer</div>
                        <div class="order-info-value">${escHtml(order.leadEngineer || 'N/A')}</div>
                    </div>
                </div>

                <button class="items-toggle" id="toggle-${order.id}" onclick="toggleItems('${order.id}')">
                    <span>📦 ${items.length} item${items.length !== 1 ? 's' : ''} ordered</span>
                    <span class="arrow">▼</span>
                </button>
                <div class="items-list" id="items-${order.id}">
                    ${itemsHtml || '<div style="padding:0.5rem;color:var(--text-dim);font-size:0.85rem;">No items</div>'}
                </div>
            </div>
            <div class="order-card-footer">
                <span class="total-items-badge">${items.length} item${items.length !== 1 ? 's' : ''}</span>
                <div style="display:flex;gap:0.5rem;align-items:center;">
                    <select class="status-select" id="status-${order.id}">
                        <option value="pending"   ${status === 'pending'   ? 'selected' : ''}>⏳ Pending</option>
                        <option value="fulfilled" ${status === 'fulfilled' ? 'selected' : ''}>✅ Fulfilled</option>
                        <option value="cancelled" ${status === 'cancelled' ? 'selected' : ''}>🚫 Cancelled</option>
                    </select>
                    <button class="save-status-btn" onclick="saveStatus('${order.id}')">Save</button>
                </div>
            </div>
        </div>`;
    }).join('');
}

/* ══════════════════════════════
   TOGGLE ITEMS
══════════════════════════════ */
window.toggleItems = function(id) {
    const list = document.getElementById(`items-${id}`);
    const btn  = document.getElementById(`toggle-${id}`);
    const open = list.classList.toggle('open');
    btn.classList.toggle('open', open);
};

/* ══════════════════════════════
   SAVE STATUS
══════════════════════════════ */
window.saveStatus = async function(id) {
    const newStatus = document.getElementById(`status-${id}`).value;
    try {
        const { doc, updateDoc } = window.firebaseModules;
        await updateDoc(doc(window.db, 'Van Replenishment', id), {
            status: newStatus,
            statusUpdatedAt: new Date().toISOString()
        });
        const order = allOrders.find(o => o.id === id);
        if (order) order.status = newStatus;
        showToast(`Status updated to ${newStatus}`, 'success');
        updateStats();
        renderOrders();
    } catch (err) {
        console.error(err);
        showToast('Failed to update status: ' + err.message, 'error');
    }
};

/* ══════════════════════════════
   UTILS
══════════════════════════════ */
function formatDate(iso) {
    if (!iso) return 'N/A';
    const d = new Date(iso);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function escHtml(t) {
    const d = document.createElement('div');
    d.textContent = String(t ?? '');
    return d.innerHTML;
}

function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast show${type === 'error' ? ' error' : ''}`;
    setTimeout(() => t.classList.remove('show'), 4000);
}

/* Live filter on input */
document.addEventListener('DOMContentLoaded', () => {
    ['f-job','f-name','f-status'].forEach(id => {
        document.getElementById(id)?.addEventListener('input', applyFilters);
        document.getElementById(id)?.addEventListener('change', applyFilters);
    });
});
</script>
