<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meter Work Required | Pingu - Solar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --secondary: #FFC857;
            --accent: #00D9FF;
            --dark: #1A1A2E;
            --dark-light: #252541;
            --dark-lighter: #2F2F4A;
            --text: #EAEAEA;
            --text-dim: #9A9AB0;
            --success: #4ECCA3;
            --warning: #FFA500;
            --kf: #B57BFF;
            --shadow: rgba(255, 107, 53, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--dark); color: var(--text);
            line-height: 1.6; min-height: 100vh; overflow-x: hidden;
        }

        body::before {
            content: ''; position: fixed; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(circle at 20% 40%, rgba(255,107,53,0.07) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255,165,0,0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 10%, rgba(0,217,255,0.05) 0%, transparent 50%);
            animation: bgDrift 24s ease-in-out infinite;
            pointer-events: none; z-index: 0;
        }
        @keyframes bgDrift { 0%,100%{transform:translate(0,0);}50%{transform:translate(18px,-15px);} }

        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }

        header { margin-bottom: 2.5rem; animation: slideDown 0.6s ease-out; }
        @keyframes slideDown { from{opacity:0;transform:translateY(-22px);}to{opacity:1;transform:translateY(0);} }

        .header-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; margin-bottom:1rem; }

        .logo {
            font-family:'Syne',sans-serif; font-size:2rem; font-weight:800;
            background:linear-gradient(135deg,var(--primary),var(--secondary),var(--accent));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-decoration:none;
        }
        .back-btn {
            background:var(--dark-light); color:var(--text); text-decoration:none;
            padding:0.65rem 1.3rem; border-radius:8px; font-size:0.85rem;
            border:2px solid transparent; transition:all 0.2s;
        }
        .back-btn:hover { border-color:var(--accent); }

        h1 { font-family:'Syne',sans-serif; font-size:2.3rem; font-weight:800; }
        .subtitle { color:var(--text-dim); font-size:0.88rem; margin-top:0.25rem; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);} }

        .controls-bar {
            display:flex; flex-wrap:wrap; gap:0.7rem; align-items:center;
            background:var(--dark-light); border:2px solid var(--dark-lighter);
            border-radius:12px; padding:1rem 1.3rem; margin-bottom:1.8rem;
            animation: fadeUp 0.5s ease-out 0.1s both;
        }
        .filter-tabs { display:flex; gap:0.5rem; flex-wrap:wrap; }
        .ftab {
            background:var(--dark-lighter); border:2px solid transparent;
            color:var(--text-dim); padding:0.42rem 1rem; border-radius:8px;
            font-family:'JetBrains Mono',monospace; font-size:0.8rem;
            cursor:pointer; transition:all 0.2s;
        }
        .ftab:hover { color:var(--text); border-color:rgba(255,255,255,0.1); }
        .ftab.f-all       { border-color:var(--warning);  color:var(--warning);  background:rgba(255,165,0,0.1); }
        .ftab.f-scheduled { border-color:var(--accent);   color:var(--accent);   background:rgba(0,217,255,0.08); }
        .ftab.f-completed { border-color:var(--success);  color:var(--success);  background:rgba(78,204,163,0.08); }

        .ctrl-sep { width:1px; height:28px; background:var(--dark-lighter); flex-shrink:0; }

        .refresh-btn {
            margin-left:auto; background:linear-gradient(135deg,var(--primary),var(--accent));
            color:white; border:none; padding:0.5rem 1.2rem; border-radius:8px;
            font-family:'Syne',sans-serif; font-size:0.85rem; font-weight:700;
            cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:0.45rem;
        }
        .refresh-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 5px 18px var(--shadow); }
        .refresh-btn:disabled { opacity:0.5; cursor:not-allowed; }

        .stats-bar {
            display:grid; grid-template-columns:repeat(auto-fit,minmax(125px,1fr));
            gap:0.9rem; margin-bottom:2rem; animation: fadeUp 0.5s ease-out 0.15s both;
        }
        .stat-card {
            background:var(--dark-light); border:2px solid var(--dark-lighter);
            border-radius:10px; padding:0.9rem 1.1rem;
        }
        .stat-lbl { font-size:0.67rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:0.25rem; }
        .stat-val { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; }
        .c-orange  { color:var(--primary); }
        .c-warning { color:var(--warning); }
        .c-cyan    { color:var(--accent); }
        .c-green   { color:var(--success); }

        .state-msg { text-align:center; padding:4rem 2rem; color:var(--text-dim); display:none; }
        .state-msg.show { display:block; }
        .state-msg .icon { font-size:3rem; margin-bottom:1rem; }

        .cards-grid {
            display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr));
            gap:1.3rem;
        }

        /* ── JOB CARD ── */
        .job-card {
            background:var(--dark-light); border:2px solid var(--dark-lighter);
            border-radius:14px; overflow:hidden;
            transition:border-color 0.2s, transform 0.2s, box-shadow 0.2s;
            animation: fadeUp 0.4s ease-out both;
        }
        .job-card:hover { border-color:var(--warning); transform:translateY(-2px); box-shadow:0 6px 26px rgba(255,165,0,0.1); }
        .job-card.is-completed { border-color:rgba(78,204,163,0.25); }
        .job-card.is-completed:hover { border-color:var(--success); box-shadow:0 6px 26px rgba(78,204,163,0.1); }

        .card-stripe { height:3px; width:100%; }
        .s-pending   { background:linear-gradient(90deg,var(--warning),var(--primary)); }
        .s-scheduled { background:linear-gradient(90deg,var(--accent),var(--kf)); }
        .s-completed { background:linear-gradient(90deg,var(--success),#2ecc71); }

        .card-head {
            display:flex; justify-content:space-between; align-items:flex-start;
            padding:1.1rem 1.2rem 0.8rem; gap:0.8rem;
        }
        .card-job   { font-family:'Syne',sans-serif; font-size:1.05rem; font-weight:800; color:var(--accent); }
        .card-cust  { font-size:0.8rem; color:var(--text-dim); margin-top:0.1rem; }

        .badge {
            padding:0.2rem 0.65rem; border-radius:20px;
            font-size:0.7rem; font-weight:700; white-space:nowrap; flex-shrink:0;
        }
        .b-pending   { background:rgba(255,165,0,0.14); border:1px solid rgba(255,165,0,0.4); color:var(--warning); }
        .b-scheduled { background:rgba(0,217,255,0.1);  border:1px solid rgba(0,217,255,0.35); color:var(--accent); }
        .b-completed { background:rgba(78,204,163,0.1); border:1px solid rgba(78,204,163,0.35); color:var(--success); }

        .card-meta {
            display:grid; grid-template-columns:1fr 1fr; gap:0.5rem;
            padding:0 1.2rem 0.9rem;
            border-bottom:1px solid rgba(255,255,255,0.05);
        }
        .meta-item { display:flex; flex-direction:column; gap:0.1rem; }
        .meta-lbl  { font-size:0.63rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.06em; }
        .meta-val  { font-size:0.82rem; color:var(--text); font-weight:500; }
        .meta-val.unset { color:var(--warning); }
        .meta-val.ok    { color:var(--success); }

        .card-work {
            padding:0.85rem 1.2rem;
            background:rgba(255,165,0,0.04);
            border-bottom:1px solid rgba(255,255,255,0.05);
        }
        .work-lbl  { font-size:0.64rem; color:var(--warning); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:0.35rem; }
        .work-text { font-size:0.83rem; color:var(--text); line-height:1.55; }

        .card-done-info {
            padding:0.7rem 1.2rem;
            background:rgba(78,204,163,0.05);
            border-bottom:1px solid rgba(78,204,163,0.12);
            display:flex; flex-wrap:wrap; gap:1.2rem;
        }
        .done-item { display:flex; flex-direction:column; gap:0.08rem; }
        .done-lbl  { font-size:0.62rem; color:var(--success); text-transform:uppercase; letter-spacing:0.06em; opacity:0.7; }
        .done-val  { font-size:0.82rem; color:var(--success); font-weight:600; }

        .card-expand { overflow:hidden; max-height:0; transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
        .card-expand.open { max-height:520px; }
        .expand-inner { padding:1.1rem 1.2rem; display:flex; flex-direction:column; gap:0.85rem; }

        .field-lbl {
            font-size:0.67rem; text-transform:uppercase; letter-spacing:0.07em;
            color:var(--text-dim); margin-bottom:0.3rem;
        }
        .expand-input {
            width:100%; background:var(--dark-lighter); border:2px solid var(--dark-lighter);
            color:var(--text); padding:0.65rem 0.9rem; border-radius:9px;
            font-family:'JetBrains Mono',monospace; font-size:0.88rem; transition:border-color 0.2s;
        }
        .expand-input:focus { outline:none; border-color:var(--warning); }
        .expand-input[type="date"]::-webkit-calendar-picker-indicator { filter:invert(0.65); cursor:pointer; }

        .action-row { display:flex; gap:0.7rem; }

        .btn-save {
            flex:1; background:linear-gradient(135deg,var(--warning),var(--primary));
            color:white; border:none; padding:0.65rem 1rem; border-radius:9px;
            font-family:'Syne',sans-serif; font-size:0.85rem; font-weight:700;
            cursor:pointer; transition:all 0.2s;
        }
        .btn-save:hover:not(:disabled) { transform:translateY(-1px); box-shadow:0 4px 14px rgba(255,165,0,0.28); }
        .btn-save:disabled { opacity:0.55; cursor:not-allowed; }

        .btn-complete {
            flex:1; background:rgba(78,204,163,0.1); border:2px solid rgba(78,204,163,0.3);
            color:var(--success); padding:0.65rem 1rem; border-radius:9px;
            font-family:'Syne',sans-serif; font-size:0.85rem; font-weight:700;
            cursor:pointer; transition:all 0.2s;
        }
        .btn-complete:hover:not(:disabled) { background:rgba(78,204,163,0.2); border-color:var(--success); }
        .btn-complete:disabled { opacity:0.55; cursor:not-allowed; }
        .btn-complete.is-done { background:var(--success); color:var(--dark); border-color:var(--success); }

        .btn-reopen {
            width:100%; background:none; border:1px solid rgba(255,107,53,0.25);
            color:var(--text-dim); padding:0.5rem 1rem; border-radius:9px;
            font-family:'JetBrains Mono',monospace; font-size:0.78rem;
            cursor:pointer; transition:all 0.2s;
        }
        .btn-reopen:hover { border-color:var(--primary); color:var(--primary); }

        .card-toggle {
            width:100%; background:none; border:none;
            border-top:1px solid rgba(255,255,255,0.05);
            color:var(--text-dim); padding:0.65rem 1.2rem;
            font-family:'JetBrains Mono',monospace; font-size:0.79rem;
            cursor:pointer; transition:all 0.2s; text-align:left;
            display:flex; align-items:center; justify-content:space-between;
        }
        .card-toggle:hover { background:rgba(255,255,255,0.02); color:var(--text); }
        .chevron { transition:transform 0.25s; font-size:0.68rem; opacity:0.6; }
        .chevron.open { transform:rotate(180deg); }

        #back-top {
            position:fixed; bottom:1.8rem; right:1.8rem;
            background:var(--primary); color:white; border:none;
            width:40px; height:40px; border-radius:50%; font-size:1rem;
            cursor:pointer; box-shadow:0 3px 14px var(--shadow);
            transition:all 0.2s; display:none; align-items:center; justify-content:center; z-index:100;
        }
        #back-top.show { display:flex; }
        #back-top:hover { transform:translateY(-2px); }
        @keyframes spin { to{transform:rotate(360deg);} }
        #refresh-icon { display:inline-block; }

        @media (max-width:640px) {
            .container { padding:1rem; }
            h1 { font-size:1.9rem; }
            .cards-grid { grid-template-columns:1fr; }
            .action-row { flex-direction:column; }
        }
    </style>
</head>
<body>
<div class="container">

    <header>
        <div class="header-row">
            <a href="teamview.html" class="logo">Pingu - Solar</a>
            <a href="teamview.html" class="back-btn">← Back to Dashboard</a>
        </div>
        <h1>⚡ Meter Work Required</h1>
        <p class="subtitle">Jobs flagged during survey as needing meter work — schedule, assign an engineer, and mark complete.</p>
    </header>

    <div class="controls-bar">
        <div class="filter-tabs">
            <button class="ftab f-all"  id="ftab-all"       onclick="setFilter('all')">All</button>
            <button class="ftab"        id="ftab-pending"   onclick="setFilter('pending')">⏳ Pending</button>
            <button class="ftab"        id="ftab-scheduled" onclick="setFilter('scheduled')">📅 Scheduled</button>
            <button class="ftab"        id="ftab-completed" onclick="setFilter('completed')">✅ Completed</button>
        </div>
        <div class="ctrl-sep"></div>
        <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
            <span id="refresh-icon">↻</span> Refresh
        </button>
    </div>

    <div class="stats-bar">
        <div class="stat-card"><div class="stat-lbl">Total Jobs</div><div class="stat-val c-orange" id="stat-total">—</div></div>
        <div class="stat-card"><div class="stat-lbl">Pending</div><div class="stat-val c-warning" id="stat-pending">—</div></div>
        <div class="stat-card"><div class="stat-lbl">Scheduled</div><div class="stat-val c-cyan" id="stat-sched">—</div></div>
        <div class="stat-card"><div class="stat-lbl">Completed</div><div class="stat-val c-green" id="stat-done">—</div></div>
    </div>

    <div class="state-msg" id="loading-state"><div class="icon">⏳</div>Loading meter work jobs…</div>
    <div class="state-msg" id="empty-state"><div class="icon">🎉</div>No jobs matching this filter.</div>

    <div class="cards-grid" id="cards-grid"></div>
</div>

<button id="back-top" title="Back to top">↑</button>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import {
    getFirestore, collection, getDocs, query, orderBy, doc, updateDoc
} from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const app = initializeApp({
    apiKey:            "AIzaSyAc_yJQ_rkzuOBh-Yxg0Q4eooXtB-tQjm0",
    authDomain:        "pingu-solar.firebaseapp.com",
    projectId:         "pingu-solar",
    storageBucket:     "pingu-solar.firebasestorage.app",
    messagingSenderId: "232764952866",
    appId:             "1:232764952866:web:5923b7f419de6355d6157b"
});
const db = getFirestore(app);

window._jobs   = [];
window._filter = 'all';

// ── helpers ──────────────────────────────────────────────────────────────────
function esc(t) {
    const d = document.createElement('div');
    d.textContent = String(t || '');
    return d.innerHTML;
}

function fmtDate(str) {
    if (!str) return '—';
    const d = new Date(str);
    return isNaN(d) ? str : d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}

// meterWorkNeeded is saved as a freetext "yes"/"no" field in the survey
function meterNeeded(s) {
    const v = s.sections?.electricalSystem?.meterWorkNeeded || '';
    return v.trim().toLowerCase() === 'yes';
}

function getDetails(s)   { return (s.sections?.electricalSystem?.meterWorkDetails || '').trim(); }
function getSurveyor(s)  { return s.sections?.surveyDetails?.surveyor || '—'; }
function getCustomer(s)  { return s.sections?.customerSignOff?.name || ''; }
function getSurveyDate(s){ return fmtDate(s.sections?.surveyDetails?.conductedOn || s.submittedAt); }
function getTypeLabel(s) { return s.surveyType === 'battery-and-solar' ? 'Battery & Solar' : 'Battery Only'; }

function getStatus(s) {
    if (s.meterCompleted)               return 'completed';
    if (s.meterDate || s.meterEngineer) return 'scheduled';
    return 'pending';
}

// ── load ─────────────────────────────────────────────────────────────────────
window.loadData = async function () {
    const btn  = document.getElementById('refresh-btn');
    const icon = document.getElementById('refresh-icon');
    document.getElementById('loading-state').classList.add('show');
    document.getElementById('empty-state').classList.remove('show');
    document.getElementById('cards-grid').innerHTML = '';
    btn.disabled = true;
    icon.style.animation = 'spin 0.8s linear infinite';

    try {
        const snap = await getDocs(
            query(collection(db, 'meter-work-required'), orderBy('submittedAt', 'desc'))
        );
        const meterJobs = snap.docs.map(d => ({ _docId: d.id, ...d.data() }));

        // Cross-reference jobs collection to get address + postcode
        const jobNums = [...new Set(meterJobs.map(j => j.jobNumber).filter(Boolean))];
        const jobMap = {};
        if (jobNums.length > 0) {
            const jobsSnap = await getDocs(collection(db, 'jobs'));
            jobsSnap.forEach(d => {
                const jd = d.data();
                if (jd['Job Number']) jobMap[jd['Job Number']] = jd;
            });
        }
        // Attach address & postcode to each record
        window._jobs = meterJobs.map(j => {
            const jd = jobMap[j.jobNumber] || {};
            return {
                ...j,
                _address:  jd['1st line of address'] || '',
                _postcode: jd['Postcode'] || '',
            };
        });
        renderAll();
    } catch (e) {
        document.getElementById('cards-grid').innerHTML =
            `<div class="state-msg show"><div class="icon">⚠️</div>Firebase error: ${esc(e.message)}</div>`;
    } finally {
        btn.disabled = false;
        icon.style.animation = '';
        document.getElementById('loading-state').classList.remove('show');
    }
};

// ── filter ────────────────────────────────────────────────────────────────────
window.setFilter = function (f) {
    window._filter = f;
    // reset all tabs
    document.querySelectorAll('.ftab').forEach(b => {
        b.className = 'ftab';
    });
    const tab = document.getElementById('ftab-' + f);
    const cls = f === 'completed' ? 'f-completed' : f === 'scheduled' ? 'f-scheduled' : 'f-all';
    tab.classList.add(cls);
    renderAll();
};

// ── render ────────────────────────────────────────────────────────────────────
window.renderAll = function () {
    const f     = window._filter;
    const all   = window._jobs;
    const shown = all.filter(s => f === 'all' || getStatus(s) === f);

    document.getElementById('stat-total').textContent   = all.length;
    document.getElementById('stat-pending').textContent  = all.filter(s => getStatus(s) === 'pending').length;
    document.getElementById('stat-sched').textContent    = all.filter(s => getStatus(s) === 'scheduled').length;
    document.getElementById('stat-done').textContent     = all.filter(s => getStatus(s) === 'completed').length;

    const grid    = document.getElementById('cards-grid');
    const emptyEl = document.getElementById('empty-state');

    if (!shown.length) { emptyEl.classList.add('show'); grid.innerHTML = ''; return; }
    emptyEl.classList.remove('show');
    grid.innerHTML = shown.map((s, i) => buildCard(s, i)).join('');
};

// ── card HTML ─────────────────────────────────────────────────────────────────
function buildCard(s, idx) {
    const id       = s._docId;
    const status   = getStatus(s);
    const jobNum   = esc(s.jobNumber || id);
    const customer = esc(getCustomer(s));
    const surveyor = esc(getSurveyor(s));
    const details  = esc(getDetails(s));
    const mDate    = s.meterDate || '';
    const engName  = s.meterEngineer || '';
    const compAt   = s.meterCompletedAt ? fmtDate(s.meterCompletedAt) : '';
    const compBy   = esc(s.meterCompletedBy || '');

    const stripeClass = status === 'completed' ? 's-completed' : status === 'scheduled' ? 's-scheduled' : 's-pending';
    const badgeClass  = status === 'completed' ? 'b-completed' : status === 'scheduled' ? 'b-scheduled' : 'b-pending';
    const badgeLabel  = status === 'completed' ? '✅ Completed' : status === 'scheduled' ? '📅 Scheduled' : '⏳ Pending';
    const toggleLabel = status === 'completed' ? 'View / edit details' : 'Schedule &amp; assign engineer';

    const doneStrip = status === 'completed' ? `
        <div class="card-done-info">
            ${compAt  ? `<div class="done-item"><div class="done-lbl">Completed</div><div class="done-val">${compAt}</div></div>` : ''}
            ${compBy  ? `<div class="done-item"><div class="done-lbl">By</div><div class="done-val">${compBy}</div></div>` : ''}
            ${mDate   ? `<div class="done-item"><div class="done-lbl">Was Booked</div><div class="done-val">${fmtDate(mDate)}</div></div>` : ''}
            ${engName            ? `<div class="done-item"><div class="done-lbl">Engineer</div><div class="done-val">${esc(engName)}</div></div>` : ''}
            ${s.meterJobNumber  ? `<div class="done-item"><div class="done-lbl">Meter Job #</div><div class="done-val">${esc(s.meterJobNumber)}</div></div>` : ''}
        </div>` : '';

    const reopenBtn = status === 'completed'
        ? `<button class="btn-reopen" onclick="reopenJob('${id}')">↩ Re-open job</button>` : '';

    return `
    <div class="job-card${status==='completed'?' is-completed':''}" id="card-${id}" style="animation-delay:${idx*0.045}s">
        <div class="card-stripe ${stripeClass}"></div>

        <div class="card-head">
            <div>
                <div class="card-job">#${jobNum}</div>
                <div class="card-cust">${customer || surveyor}</div>
            </div>
            <span class="badge ${badgeClass}">${badgeLabel}</span>
        </div>

        <div class="card-meta">
            ${s._address ? `
            <div class="meta-item">
                <div class="meta-lbl">Address</div>
                <div class="meta-val">${esc(s._address)}</div>
            </div>` : ''}
            ${s._postcode ? `
            <div class="meta-item">
                <div class="meta-lbl">Postcode</div>
                <div class="meta-val">${esc(s._postcode)}</div>
            </div>` : ''}
            <div class="meta-item">
                <div class="meta-lbl">Survey Date</div>
                <div class="meta-val">${getSurveyDate(s)}</div>
            </div>
            <div class="meta-item">
                <div class="meta-lbl">Survey Type</div>
                <div class="meta-val">${getTypeLabel(s)}</div>
            </div>
            <div class="meta-item">
                <div class="meta-lbl">Surveyor</div>
                <div class="meta-val">${surveyor}</div>
            </div>
            <div class="meta-item">
                <div class="meta-lbl">Work Booked</div>
                <div class="meta-val ${mDate ? 'ok' : 'unset'}">${mDate ? fmtDate(mDate) : 'Not scheduled'}</div>
            </div>
            ${s.meterJobNumber ? `
            <div class="meta-item">
                <div class="meta-lbl">Meter Job #</div>
                <div class="meta-val ok">${esc(s.meterJobNumber)}</div>
            </div>` : ''}
        </div>

        ${details ? `
        <div class="card-work">
            <div class="work-lbl">⚡ Work Required</div>
            <div class="work-text">${details}</div>
        </div>` : ''}

        ${doneStrip}

        <div class="card-expand" id="exp-${id}">
            <div class="expand-inner">
                <div>
                    <div class="field-lbl">Date for Meter Work</div>
                    <input type="date" class="expand-input" id="date-${id}" value="${mDate}" />
                </div>
                <div>
                    <div class="field-lbl">Assigned Engineer</div>
                    <input type="text" class="expand-input" id="eng-${id}"
                        value="${esc(engName)}" placeholder="Enter engineer name…" />
                </div>
                <div>
                    <div class="field-lbl">Meter Work Job Number</div>
                    <input type="text" class="expand-input" id="mjob-${id}"
                        value="${esc(s.meterJobNumber || '')}" placeholder="Enter meter work job number…" />
                </div>
                <div class="action-row">
                    <button class="btn-save" id="save-${id}" onclick="saveDetails('${id}')">💾 Save</button>
                    <button class="btn-complete${status==='completed'?' is-done':''}"
                        id="cmp-${id}" onclick="markComplete('${id}')">
                        ${status === 'completed' ? '✅ Done' : '✓ Mark Complete'}
                    </button>
                </div>
                ${reopenBtn}
            </div>
        </div>

        <button class="card-toggle" id="tog-${id}" onclick="toggleCard('${id}')">
            <span>${toggleLabel}</span>
            <span class="chevron" id="chv-${id}">▼</span>
        </button>
    </div>`;
}

// ── interactions ──────────────────────────────────────────────────────────────
window.toggleCard = function (id) {
    const exp  = document.getElementById('exp-' + id);
    const chv  = document.getElementById('chv-' + id);
    const open = exp.classList.toggle('open');
    chv.classList.toggle('open', open);
};

window.saveDetails = async function (id) {
    const dateVal = document.getElementById('date-'  + id).value;
    const engVal  = document.getElementById('eng-'   + id).value.trim();
    const mjobVal = document.getElementById('mjob-'  + id).value.trim();
    const btn     = document.getElementById('save-'  + id);
    btn.disabled  = true;
    btn.textContent = 'Saving…';
    try {
        await updateDoc(doc(db, 'meter-work-required', id), {
            meterDate: dateVal, meterEngineer: engVal, meterJobNumber: mjobVal
        });
        const job = window._jobs.find(s => s._docId === id);
        if (job) { job.meterDate = dateVal; job.meterEngineer = engVal; job.meterJobNumber = mjobVal; }
        renderAll();
        setTimeout(() => toggleCard(id), 40);
    } catch (e) {
        alert('Save failed: ' + e.message);
        btn.disabled = false;
        btn.textContent = '💾 Save';
    }
};

window.markComplete = async function (id) {
    const engVal  = document.getElementById('eng-'   + id)?.value?.trim() || '';
    const dateVal = document.getElementById('date-'  + id)?.value || '';
    const mjobVal = document.getElementById('mjob-'  + id)?.value?.trim() || '';
    const btn     = document.getElementById('cmp-'   + id);
    if (btn) { btn.disabled = true; btn.textContent = 'Saving…'; }
    try {
        await updateDoc(doc(db, 'meter-work-required', id), {
            meterCompleted:   true,
            meterCompletedAt: new Date().toISOString(),
            meterCompletedBy: engVal,
            meterEngineer:    engVal,
            meterDate:        dateVal,
            meterJobNumber:   mjobVal
        });
        const job = window._jobs.find(s => s._docId === id);
        if (job) {
            job.meterCompleted   = true;
            job.meterCompletedAt = new Date().toISOString();
            job.meterCompletedBy = engVal;
            job.meterEngineer    = engVal;
            job.meterDate        = dateVal;
            job.meterJobNumber   = mjobVal;
        }
        renderAll();
    } catch (e) {
        alert('Could not mark complete: ' + e.message);
        if (btn) { btn.disabled = false; btn.textContent = '✓ Mark Complete'; }
    }
};

window.reopenJob = async function (id) {
    if (!confirm('Re-open this job as pending?')) return;
    try {
        await updateDoc(doc(db, 'meter-work-required', id), {
            meterCompleted:   false,
            meterCompletedAt: null,
            meterCompletedBy: ''
        });
        const job = window._jobs.find(s => s._docId === id);
        if (job) { job.meterCompleted = false; job.meterCompletedAt = null; job.meterCompletedBy = ''; }
        renderAll();
    } catch (e) {
        alert('Could not re-open: ' + e.message);
    }
};

// ── init ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    loadData();
    window.addEventListener('scroll', () =>
        document.getElementById('back-top').classList.toggle('show', scrollY > 400));
    document.getElementById('back-top').addEventListener('click', () =>
        window.scrollTo({ top: 0, behavior: 'smooth' }));
});
</script>
</body>
</html>
