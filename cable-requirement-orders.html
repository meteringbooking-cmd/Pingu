<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View Orders | Pingu - Solar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --primary-dark: #E55A2B;
            --secondary: #FFC857;
            --accent: #00D9FF;
            --dark: #1A1A2E;
            --dark-light: #252541;
            --dark-lighter: #2F2F4A;
            --text: #EAEAEA;
            --text-dim: #9A9AB0;
            --success: #4ECCA3;
            --error: #FF6B6B;
            --warning: #FFC857;
            --shadow: rgba(0, 0, 0, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--dark);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding: 2rem;
        }

        /* Background Animation */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(255, 107, 53, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0, 217, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 200, 87, 0.04) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(120deg); }
            66% { transform: translate(-20px, 20px) rotate(240deg); }
        }

        /* Expanded container to use more screen space */
        .container {
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
        }

        /* Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid var(--dark-lighter);
        }

        .logo-wrap h1 {
            font-family: 'Syne', sans-serif;
            font-size: 2.2rem;
            color: var(--text);
            margin-bottom: 0.25rem;
        }

        .logo-wrap p {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .header-controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }

        /* Search Bar */
        .search-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            font-size: 1.2rem;
            pointer-events: none;
        }

        .search-input {
            background: var(--dark-light);
            border: 2px solid var(--dark-lighter);
            color: var(--text);
            padding: 0.8rem 1rem 0.8rem 2.8rem;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.95rem;
            width: 300px;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(47, 47, 74, 0.9);
            box-shadow: 0 0 15px rgba(255, 107, 53, 0.2);
        }

        .nav-btn {
            background: var(--dark-lighter);
            color: var(--text);
            text-decoration: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            white-space: nowrap;
        }

        .nav-btn:hover {
            border-color: var(--primary);
            background: rgba(255, 107, 53, 0.1);
        }

        /* Status States */
        #loading, #empty-state, #no-results-state {
            text-align: center;
            padding: 4rem 2rem;
            background: var(--dark-light);
            border-radius: 12px;
            border: 2px dashed var(--dark-lighter);
            color: var(--text-dim);
            margin-top: 2rem;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid var(--dark-lighter);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 1rem;
        }

        @keyframes spin { 
            to { transform: rotate(360deg); } 
        }

        /* Table Layout */
        .table-wrapper {
            background: var(--dark-light);
            border-radius: 12px;
            border: 1px solid var(--dark-lighter);
            overflow-x: auto;
            box-shadow: 0 10px 30px var(--shadow);
            display: none; /* Hidden until loaded */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        thead {
            background: var(--dark-lighter);
        }

        th {
            padding: 1.25rem 1rem;
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.85rem;
            white-space: nowrap;
            border-bottom: 2px solid rgba(255, 255, 255, 0.05);
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
            vertical-align: top;
        }

        tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        /* Specific Table Cells */
        .col-job {
            font-weight: 700;
            color: var(--accent);
            font-family: 'Syne', sans-serif;
            font-size: 1.1rem;
            white-space: nowrap;
        }

        .col-date {
            color: var(--text-dim);
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .col-address {
            min-width: 150px;
        }

        /* Items Badges inside rows */
        .item-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .item-badge {
            background: var(--dark-lighter);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.3rem 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            display: inline-flex;
            gap: 0.4rem;
            align-items: center;
        }

        .item-badge.cable span.qty {
            color: var(--primary);
            font-weight: 700;
        }

        .item-badge.misc span.qty {
            color: var(--accent);
            font-weight: 700;
        }
        
        .item-type-tag {
            font-size: 0.6rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            background: rgba(255,255,255,0.05);
            padding: 0.1rem 0.3rem;
            border-radius: 3px;
        }

        .multi-job-text {
            color: var(--warning);
            font-size: 0.85rem;
            display: block;
            margin-top: 0.25rem;
        }

        @media (max-width: 900px) {
            .search-input { width: 100%; }
            .header-controls { width: 100%; justify-content: flex-start; }
            body { padding: 1rem; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div class="logo-wrap">
                <h1>📋 Order Dashboard</h1>
                <p>Pingu - Solar Requirements</p>
            </div>
            <div class="header-controls">
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" class="search-input" placeholder="Search Job #, Postcode...">
                </div>
                <!-- Make sure this links back to your main form page -->
                <a href="cable-requirements.html" class="nav-btn">➕ New Order</a>
            </div>
        </header>

        <div id="loading">
            <div class="spinner"></div>
            <p>Fetching latest orders...</p>
        </div>

        <div id="empty-state" style="display: none;">
            <h2>No orders found</h2>
            <p>Once requirements are submitted, they will appear here.</p>
        </div>

        <div id="no-results-state" style="display: none;">
            <h2>No matches found</h2>
            <p>Try adjusting your search terms.</p>
        </div>

        <div class="table-wrapper" id="table-wrapper">
            <table id="orders-table">
                <thead>
                    <tr>
                        <th>Job #</th>
                        <th>Date Submitted</th>
                        <th>Technician</th>
                        <th>Address</th>
                        <th>Items Requested</th>
                        <th>Applicable Jobs</th>
                    </tr>
                </thead>
                <tbody id="orders-tbody">
                    <!-- Rows injected here by JS -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAc_yJQ_rkzuOBh-Yxg0Q4eooXtB-tQjm0",
            authDomain: "pingu-solar.firebaseapp.com",
            projectId: "pingu-solar",
            storageBucket: "pingu-solar.firebasestorage.app",
            messagingSenderId: "232764952866",
            appId: "1:232764952866:web:5923b7f419de6355d6157b",
            measurementId: "G-PFH059DZ64"
        };

        const CABLE_LABELS = {
            'cable-6mm-ev-ultra': '6mm EV Ultra',
            'cable-fire-fighter': 'Fire Fighter',
            'cable-blue-brown-tails': 'Blue/Brown Tails',
            'cable-earth-16mm': 'Earth 16mm',
            'cable-earth-10mm': 'Earth 10mm',
            'cable-h07-2m': 'H07 2m',
            'cable-2core-pv-ultra': '2 Core PV Ultra',
            'cable-10mm-ev': '10mm EV',
            'cable-4core-pv': '4 Core PV',
            'cable-6mm-single-dc': '6mm single DC cable'
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let allOrders = []; // Store all fetched orders for local searching

        function formatDate(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            return date.toLocaleDateString('en-GB', { 
                day: 'numeric', month: 'short', year: 'numeric', 
                hour: '2-digit', minute:'2-digit' 
            });
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Renders the table rows based on an array of order objects
        function renderTable(orders) {
            const tbody = document.getElementById('orders-tbody');
            const noResults = document.getElementById('no-results-state');
            const tableWrapper = document.getElementById('table-wrapper');

            tbody.innerHTML = '';

            if (orders.length === 0) {
                tableWrapper.style.display = 'none';
                if (allOrders.length > 0) {
                    noResults.style.display = 'block'; 
                }
                return;
            }

            noResults.style.display = 'none';
            tableWrapper.style.display = 'block';

            orders.forEach((data) => {
                let itemsHtml = '<div class="item-list">';
                let hasItems = false;

                // 1. Process Cables
                if (data.cables) {
                    for (const [id, length] of Object.entries(data.cables)) {
                        if (length > 0) {
                            hasItems = true;
                            const label = CABLE_LABELS[id] || id;
                            itemsHtml += `
                                <div class="item-badge cable" title="Cable">
                                    ${escapeHtml(label)} 
                                    <span class="qty">${length}m</span>
                                </div>`;
                        }
                    }
                }

                // 2. Process Miscellaneous Items
                if (data.miscItems && data.miscItems.length > 0) {
                    hasItems = true;
                    data.miscItems.forEach(item => {
                        itemsHtml += `
                            <div class="item-badge misc" title="${escapeHtml(item.type)}">
                                <span class="item-type-tag">${escapeHtml(item.type).substring(0, 4)}</span>
                                ${escapeHtml(item.desc)} 
                                <span class="qty">x${item.qty}</span>
                            </div>`;
                    });
                }

                itemsHtml += '</div>';
                if (!hasItems) itemsHtml = '<span style="color: var(--text-dim);">No items specified</span>';

                // Multi-Job Logic
                const isMultiJob = data.isSingleJob === false;
                let applicabilityHtml = 'Single Job';
                if (isMultiJob && data.extraJobs) {
                    applicabilityHtml = `Multiple<br><span class="multi-job-text">${escapeHtml(data.extraJobs)}</span>`;
                }

                // Append Row
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td class="col-job">#${escapeHtml(data.jobNumber || 'N/A')}</td>
                    <td class="col-date">${formatDate(data.submittedAt)}</td>
                    <td>${escapeHtml(data.name || 'Unknown')}</td>
                    <td class="col-address">
                        ${escapeHtml(data.doorNumber || '')}<br>
                        <strong>${escapeHtml(data.postcode || '')}</strong>
                    </td>
                    <td>${itemsHtml}</td>
                    <td>${applicabilityHtml}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // Fetch Data from Firebase
        async function fetchOrders() {
            try {
                const q = query(collection(db, 'Cable Requirements'), orderBy('submittedAt', 'desc'));
                const querySnapshot = await getDocs(q);
                
                document.getElementById('loading').style.display = 'none';

                if (querySnapshot.empty) {
                    document.getElementById('empty-state').style.display = 'block';
                    return;
                }

                // Populate local array
                querySnapshot.forEach((doc) => {
                    allOrders.push(doc.data());
                });

                // Initial Render
                renderTable(allOrders);

            } catch (error) {
                console.error("Error fetching orders: ", error);
                document.getElementById('loading').innerHTML = `
                    <p style="color: var(--error);">❌ Failed to load orders.</p>
                    <p style="font-size: 0.8rem; margin-top: 0.5rem; color: var(--text-dim);">${error.message}</p>
                `;
            }
        }

        // Search functionality
        document.getElementById('search-input').addEventListener('input', function(e) {
            const searchTerm = e.target.value.toLowerCase().trim();
            
            if (!searchTerm) {
                renderTable(allOrders);
                return;
            }

            const filteredOrders = allOrders.filter(order => {
                const jobNum = (order.jobNumber || '').toLowerCase();
                const postcode = (order.postcode || '').toLowerCase();
                const extraJobs = (order.extraJobs || '').toLowerCase();
                
                return jobNum.includes(searchTerm) || 
                       postcode.includes(searchTerm) || 
                       extraJobs.includes(searchTerm);
            });

            renderTable(filteredOrders);
        });

        // Initialize fetch on load
        window.addEventListener('DOMContentLoaded', fetchOrders);
    </script>
</body>
</html>
