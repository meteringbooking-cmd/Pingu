<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materials Approval | Pingu - Solar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        :root {
            --primary: #FF6B35;
            --secondary: #FFC857;
            --accent: #00D9FF;
            --dark: #1A1A2E;
            --dark-light: #252541;
            --dark-lighter: #2F2F4A;
            --text: #EAEAEA;
            --text-dim: #9A9AB0;
            --success: #4ECCA3;
            --warning: #FFA500;
            --kf: #B57BFF;
            --error: #FF6B6B;
            --shadow: rgba(255, 107, 53, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--dark); color: var(--text);
            line-height: 1.6; min-height: 100vh; overflow-x: hidden;
        }

        body::before {
            content: ''; position: fixed; top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(circle at 15% 35%, rgba(255,107,53,0.07) 0%, transparent 50%),
                radial-gradient(circle at 85% 65%, rgba(181,123,255,0.06) 0%, transparent 50%),
                radial-gradient(circle at 50% 5%, rgba(0,217,255,0.05) 0%, transparent 50%);
            animation: bgDrift 28s ease-in-out infinite;
            pointer-events: none; z-index: 0;
        }
        @keyframes bgDrift { 0%,100%{transform:translate(0,0);}50%{transform:translate(20px,-18px);} }

        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; position: relative; z-index: 1; }

        header { margin-bottom: 2.5rem; animation: slideDown 0.6s ease-out; }
        @keyframes slideDown { from{opacity:0;transform:translateY(-22px);}to{opacity:1;transform:translateY(0);} }

        .header-row { display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:1rem; margin-bottom:1rem; }

        .logo {
            font-family:'Syne',sans-serif; font-size:2rem; font-weight:800;
            background:linear-gradient(135deg,var(--primary),var(--secondary),var(--accent));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; text-decoration:none;
        }
        .back-btn {
            background:var(--dark-light); color:var(--text); text-decoration:none;
            padding:0.65rem 1.3rem; border-radius:8px; font-size:0.85rem;
            border:2px solid transparent; transition:all 0.2s;
        }
        .back-btn:hover { border-color:var(--accent); }

        h1 { font-family:'Syne',sans-serif; font-size:2.3rem; font-weight:800; }
        .subtitle { color:var(--text-dim); font-size:0.88rem; margin-top:0.25rem; }

        @keyframes fadeUp { from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);} }

        /* ── CONTROLS BAR ── */
        .controls-bar {
            display:flex; flex-wrap:wrap; gap:0.7rem; align-items:center;
            background:var(--dark-light); border:2px solid var(--dark-lighter);
            border-radius:12px; padding:1rem 1.3rem; margin-bottom:1.8rem;
            animation: fadeUp 0.5s ease-out 0.1s both;
        }
        .search-input {
            flex:1; min-width:200px; background:var(--dark-lighter); border:2px solid var(--dark-lighter);
            color:var(--text); padding:0.5rem 0.9rem; border-radius:8px;
            font-family:'JetBrains Mono',monospace; font-size:0.85rem; transition:border-color 0.2s;
        }
        .search-input:focus { outline:none; border-color:var(--accent); }
        .search-input::placeholder { color:var(--text-dim); }

        .filter-tabs { display:flex; gap:0.5rem; flex-wrap:wrap; }
        .ftab {
            background:var(--dark-lighter); border:2px solid transparent;
            color:var(--text-dim); padding:0.42rem 1rem; border-radius:8px;
            font-family:'JetBrains Mono',monospace; font-size:0.8rem;
            cursor:pointer; transition:all 0.2s;
        }
        .ftab:hover { color:var(--text); border-color:rgba(255,255,255,0.1); }
        .ftab.active-all      { border-color:var(--accent);   color:var(--accent);   background:rgba(0,217,255,0.08); }
        .ftab.active-pending  { border-color:var(--warning);  color:var(--warning);  background:rgba(255,165,0,0.1); }
        .ftab.active-approved { border-color:var(--success);  color:var(--success);  background:rgba(78,204,163,0.08); }

        .ctrl-sep { width:1px; height:28px; background:var(--dark-lighter); flex-shrink:0; }

        .refresh-btn {
            margin-left:auto; background:linear-gradient(135deg,var(--primary),var(--accent));
            color:white; border:none; padding:0.5rem 1.2rem; border-radius:8px;
            font-family:'Syne',sans-serif; font-size:0.85rem; font-weight:700;
            cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:0.45rem;
        }
        .refresh-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 5px 18px var(--shadow); }
        .refresh-btn:disabled { opacity:0.5; cursor:not-allowed; }

        /* ── STATS ── */
        .stats-bar {
            display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr));
            gap:0.9rem; margin-bottom:2rem; animation: fadeUp 0.5s ease-out 0.15s both;
        }
        .stat-card {
            background:var(--dark-light); border:2px solid var(--dark-lighter);
            border-radius:10px; padding:0.9rem 1.1rem;
        }
        .stat-lbl { font-size:0.67rem; color:var(--text-dim); text-transform:uppercase; letter-spacing:0.07em; margin-bottom:0.25rem; }
        .stat-val { font-family:'Syne',sans-serif; font-size:1.6rem; font-weight:800; }
        .c-cyan   { color:var(--accent); }
        .c-warning{ color:var(--warning); }
        .c-green  { color:var(--success); }
        .c-kf     { color:var(--kf); }

        /* ── STATES ── */
        .state-msg { text-align:center; padding:4rem 2rem; color:var(--text-dim); display:none; }
        .state-msg.show { display:block; }
        .state-msg .icon { font-size:3rem; margin-bottom:1rem; }

        /* ── SURVEY CARDS ── */
        .surveys-list { display:flex; flex-direction:column; gap:1.5rem; }

        .survey-card {
            background:var(--dark-light); border:2px solid var(--dark-lighter);
            border-radius:16px; overflow:hidden;
            transition:border-color 0.2s, box-shadow 0.2s;
            animation: fadeUp 0.4s ease-out both;
        }
        .survey-card:hover { border-color:rgba(181,123,255,0.3); }
        .survey-card.is-approved { border-color:rgba(78,204,163,0.3); }

        .card-stripe { height:4px; width:100%; }
        .stripe-pending  { background:linear-gradient(90deg,var(--kf),var(--primary)); }
        .stripe-approved { background:linear-gradient(90deg,var(--success),#2ecc71); }

        /* ── CARD HEADER ── */
        .card-header {
            display:flex; justify-content:space-between; align-items:flex-start;
            padding:1.3rem 1.5rem 1rem; gap:1rem; flex-wrap:wrap;
            border-bottom:1px solid rgba(255,255,255,0.05);
        }
        .card-header-left { flex:1; min-width:0; }
        .card-job-num { font-family:'Syne',sans-serif; font-size:1.2rem; font-weight:800; color:var(--accent); }
        .card-customer { font-size:0.9rem; color:var(--text); margin-top:0.1rem; font-weight:500; }
        .card-address { font-size:0.8rem; color:var(--text-dim); margin-top:0.15rem; }
        .card-install { font-size:0.78rem; color:var(--secondary); margin-top:0.2rem; }

        .card-header-right { display:flex; flex-direction:column; align-items:flex-end; gap:0.5rem; }
        .badge {
            padding:0.22rem 0.7rem; border-radius:20px;
            font-size:0.7rem; font-weight:700; white-space:nowrap;
        }
        .b-pending  { background:rgba(181,123,255,0.14); border:1px solid rgba(181,123,255,0.4); color:var(--kf); }
        .b-approved { background:rgba(78,204,163,0.12); border:1px solid rgba(78,204,163,0.35); color:var(--success); }
        .card-meta-pills { display:flex; gap:0.5rem; flex-wrap:wrap; justify-content:flex-end; }
        .pill {
            background:var(--dark-lighter); padding:0.2rem 0.6rem; border-radius:6px;
            font-size:0.72rem; color:var(--text-dim);
        }
        .pill.highlight { color:var(--primary); }

        /* ── SECTIONS ── */
        .card-body { padding:1.2rem 1.5rem; display:flex; flex-direction:column; gap:1.2rem; }

        .section-label {
            font-size:0.68rem; text-transform:uppercase; letter-spacing:0.1em;
            color:var(--text-dim); margin-bottom:0.6rem; display:flex; align-items:center; gap:0.5rem;
        }
        .section-label::after { content:''; flex:1; height:1px; background:rgba(255,255,255,0.06); }

        /* ── PICKLIST TABLE ── */
        .picklist-table {
            width:100%; border-collapse:collapse; font-size:0.82rem;
        }
        .picklist-table thead th {
            background:var(--dark-lighter); padding:0.5rem 0.8rem;
            text-align:left; font-size:0.68rem; text-transform:uppercase; letter-spacing:0.06em;
            color:var(--text-dim); font-weight:600;
        }
        .picklist-table thead th:first-child { border-radius:8px 0 0 8px; }
        .picklist-table thead th:last-child  { border-radius:0 8px 8px 0; }
        .picklist-table tbody tr { border-bottom:1px solid rgba(255,255,255,0.04); }
        .picklist-table tbody tr:last-child { border-bottom:none; }
        .picklist-table td { padding:0.6rem 0.8rem; color:var(--text); }
        .picklist-table td.qty { color:var(--secondary); font-weight:600; text-align:center; }
        .picklist-table td.cat { color:var(--text-dim); font-size:0.75rem; }
        .picklist-table td.part-id { color:var(--kf); font-size:0.78rem; font-weight:600; }

        /* ── ADDITIONAL MATERIALS ── */
        .materials-list { display:flex; flex-direction:column; gap:0.6rem; }

        .material-row {
            display:grid; grid-template-columns:1fr auto auto auto;
            gap:0.7rem; align-items:center;
            background:var(--dark-lighter); border-radius:10px;
            padding:0.7rem 1rem; border:2px solid transparent;
            transition:border-color 0.2s;
        }
        .material-row.approved  { border-color:rgba(78,204,163,0.3); background:rgba(78,204,163,0.05); }
        .material-row.denied    { border-color:rgba(255,107,107,0.25); background:rgba(255,107,107,0.04); opacity:0.65; }

        .mat-info { min-width:0; }
        .mat-name { font-size:0.88rem; color:var(--text); font-weight:500; }
        .mat-cat  { font-size:0.72rem; color:var(--text-dim); margin-top:0.1rem; }
        /* Part ID badge shown inline under mat name */
        .mat-part-id {
            display:inline-block; margin-top:0.2rem;
            font-size:0.7rem; color:var(--kf); font-weight:600;
            background:rgba(181,123,255,0.1); border:1px solid rgba(181,123,255,0.25);
            padding:0.1rem 0.5rem; border-radius:5px; letter-spacing:0.04em;
        }
        /* Pack size badge */
        .mat-pack-size {
            display:inline-block; margin-top:0.2rem; margin-left:0.4rem;
            font-size:0.7rem; color:var(--secondary); font-weight:600;
            background:rgba(255,200,87,0.1); border:1px solid rgba(255,200,87,0.28);
            padding:0.1rem 0.5rem; border-radius:5px; letter-spacing:0.04em;
        }

        .mat-qty-wrap { display:flex; align-items:center; gap:0.4rem; }
        .mat-qty-lbl  { font-size:0.7rem; color:var(--text-dim); }
        .mat-qty-input {
            width:60px; background:var(--dark); border:2px solid var(--dark-lighter);
            color:var(--secondary); padding:0.35rem 0.5rem; border-radius:6px;
            font-family:'JetBrains Mono',monospace; font-size:0.85rem; font-weight:600;
            text-align:center; transition:border-color 0.2s;
        }
        .mat-qty-input:focus { outline:none; border-color:var(--secondary); }
        .mat-qty-input:disabled { opacity:0.5; cursor:not-allowed; }

        .mat-actions { display:flex; gap:0.4rem; }

        .btn-approve, .btn-deny {
            padding:0.35rem 0.75rem; border-radius:7px;
            font-family:'Syne',sans-serif; font-size:0.75rem; font-weight:700;
            cursor:pointer; transition:all 0.2s; border:2px solid transparent;
            white-space:nowrap;
        }
        .btn-approve {
            background:rgba(78,204,163,0.12); border-color:rgba(78,204,163,0.3); color:var(--success);
        }
        .btn-approve:hover:not(:disabled) { background:rgba(78,204,163,0.25); border-color:var(--success); }
        .btn-approve.active { background:var(--success); color:var(--dark); border-color:var(--success); }

        .btn-deny {
            background:rgba(255,107,107,0.1); border-color:rgba(255,107,107,0.25); color:var(--error);
        }
        .btn-deny:hover:not(:disabled) { background:rgba(255,107,107,0.2); border-color:var(--error); }
        .btn-deny.active { background:var(--error); color:white; border-color:var(--error); }

        .btn-approve:disabled, .btn-deny:disabled { opacity:0.4; cursor:not-allowed; }

        /* ── SUBMIT SECTION ── */
        .submit-section {
            margin-top:0.4rem; padding:1.1rem 1.5rem;
            border-top:1px solid rgba(255,255,255,0.06);
            background:rgba(0,0,0,0.15);
            display:flex; align-items:center; justify-content:space-between;
            flex-wrap:wrap; gap:0.8rem;
        }
        .submit-progress { font-size:0.8rem; color:var(--text-dim); }
        .submit-progress span { color:var(--text); font-weight:600; }

        .btn-submit {
            background:linear-gradient(135deg,var(--kf),var(--primary));
            color:white; border:none; padding:0.7rem 1.8rem; border-radius:10px;
            font-family:'Syne',sans-serif; font-size:0.9rem; font-weight:700;
            cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:0.5rem;
        }
        .btn-submit:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 6px 22px rgba(181,123,255,0.35); }
        .btn-submit:disabled { opacity:0.45; cursor:not-allowed; transform:none; }

        .already-approved-banner {
            width:100%; padding:0.7rem 1rem; background:rgba(78,204,163,0.08);
            border-radius:8px; border:1px solid rgba(78,204,163,0.2);
            font-size:0.82rem; color:var(--success); display:flex; align-items:center; gap:0.6rem;
        }

        /* ── BACK TO TOP ── */
        #back-top {
            position:fixed; bottom:1.8rem; right:1.8rem;
            background:var(--primary); color:white; border:none;
            width:40px; height:40px; border-radius:50%; font-size:1rem;
            cursor:pointer; box-shadow:0 3px 14px var(--shadow);
            transition:all 0.2s; display:none; align-items:center; justify-content:center; z-index:100;
        }
        #back-top.show { display:flex; }
        #back-top:hover { transform:translateY(-2px); }

        @keyframes spin { to{transform:rotate(360deg);} }
        #refresh-icon { display:inline-block; }

        /* ── TOAST ── */
        .toast {
            position:fixed; bottom:2rem; left:50%; transform:translateX(-50%) translateY(80px);
            background:var(--dark-light); border:2px solid var(--success); color:var(--success);
            padding:0.8rem 1.5rem; border-radius:10px; font-size:0.88rem; font-weight:600;
            z-index:200; transition:transform 0.3s ease; pointer-events:none;
            display:flex; align-items:center; gap:0.5rem;
        }
        .toast.show { transform:translateX(-50%) translateY(0); }
        .toast.error { border-color:var(--error); color:var(--error); }

        /* ── NO MATERIALS NOTICE ── */
        .no-mats { 
            padding:0.8rem 1rem; background:rgba(255,255,255,0.03);
            border-radius:8px; font-size:0.82rem; color:var(--text-dim);
            border:1px dashed rgba(255,255,255,0.08); text-align:center;
        }

        @media (max-width:700px) {
            h1 { font-size:1.8rem; }
            .material-row { grid-template-columns:1fr; }
            .mat-actions { justify-content:flex-end; }
            .submit-section { flex-direction:column; align-items:stretch; }
            .btn-submit { justify-content:center; }
        }
    </style>
</head>
<body>
<div class="container">

    <header>
        <div class="header-row">
            <a href="teamview.html" class="logo">Pingu - Solar</a>
            <a href="teamview.html" class="back-btn">← Back to Dashboard</a>
        </div>
        <h1>📦 Materials Approval</h1>
        <p class="subtitle">Review and approve additional materials requested by surveyors — surveys from 9 March 2026 onwards.</p>
    </header>

    <div class="controls-bar">
        <input type="text" class="search-input" id="search-input"
            placeholder="Search job number or customer…"
            oninput="renderAll()" />
        <div class="ctrl-sep"></div>
        <div class="filter-tabs">
            <button class="ftab active-all" id="ftab-all"      onclick="setFilter('all')">All</button>
            <button class="ftab"            id="ftab-pending"  onclick="setFilter('pending')">⏳ Pending</button>
            <button class="ftab"            id="ftab-approved" onclick="setFilter('approved')">✅ Approved</button>
        </div>
        <div class="ctrl-sep"></div>
        <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
            <span id="refresh-icon">↻</span> Refresh
        </button>
    </div>

    <div class="stats-bar">
        <div class="stat-card"><div class="stat-lbl">Total Surveys</div><div class="stat-val c-cyan"    id="stat-total">—</div></div>
        <div class="stat-card"><div class="stat-lbl">Pending</div>        <div class="stat-val c-warning" id="stat-pending">—</div></div>
        <div class="stat-card"><div class="stat-lbl">Approved</div>       <div class="stat-val c-green"   id="stat-approved">—</div></div>
        <div class="stat-card"><div class="stat-lbl">With Picklist</div>  <div class="stat-val c-kf"      id="stat-picklist">—</div></div>
    </div>

    <div class="state-msg" id="loading-state"><div class="icon">⏳</div>Loading surveys…</div>
    <div class="state-msg" id="empty-state"><div class="icon">📭</div>No surveys match this filter.</div>
    <div class="surveys-list" id="surveys-list"></div>
</div>

<button id="back-top" title="Back to top">↑</button>
<div class="toast" id="toast"></div>

/**
 * Normalise a material name for map lookups.
 */
function normaliseKey(name) {
    return String(name).toLowerCase().replace(/\s+/g, ' ').trim();
}

/**
 * Look up a Part Code for a material name.
 */
function getPartId(name) {
    return PART_ID_MAP[normaliseKey(name)] || null;
}

/**
 * Look up a Pack Size for a material name.
 */
function getPackSize(name) {
    return PACK_SIZE_MAP[normaliseKey(name)] || null;
}

window._surveys   = [];
window._filter    = 'all';
window._approvals = {};

// ── helpers ──────────────────────────────────────────────────────────────────
function esc(t) {
    const d = document.createElement('div');
    d.textContent = String(t ?? '');
    return d.innerHTML;
}
function fmtDate(str) {
    if (!str) return '—';
    const d = new Date(str);
    return isNaN(d) ? str : d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' });
}
function showToast(msg, error = false) {
    const t = document.getElementById('toast');
    t.textContent = (error ? '⚠ ' : '✓ ') + msg;
    t.className = 'toast show' + (error ? ' error' : '');
    setTimeout(() => t.classList.remove('show'), 3500);
}

// ── parse additionalMaterials ─────────────────────────────────────────────────
function parseMaterials(rawArr) {
    if (!Array.isArray(rawArr)) return [];
    const re = /^[•·-]?\s*(Electrical|Roof|KF|Other)?:?\s*(.+?)\s*[×x]\s*(\d+)\s*$/i;
    return rawArr.map(line => {
        const m = String(line).match(re);
        if (m) return { category: m[1] || 'Other', name: m[2].trim(), qty: parseInt(m[3], 10), raw: line };
        return { category: 'Other', name: String(line).replace(/^[•·-]\s*/, '').trim(), qty: 1, raw: line };
    }).filter(m => m.name);
}

// ── parse picklist items ──────────────────────────────────────────────────────
function parsePicklist(survey) {
    const items = [];
    const pl = survey.sections?.picklist || survey.sections?.materials || survey.picklist;
    if (Array.isArray(pl)) {
        pl.forEach(item => {
            if (item && (item.name || item.item)) {
                items.push({
                    name: item.name || item.item,
                    qty:  item.qty  || item.quantity || 1,
                    category: item.category || item.type || '—'
                });
            }
        });
    }
    return items;
}

function isApproved(survey) { return survey._approvedAt != null; }

// ── LOAD ──────────────────────────────────────────────────────────────────────
window.loadData = async function () {
    const btn  = document.getElementById('refresh-btn');
    const icon = document.getElementById('refresh-icon');
    document.getElementById('loading-state').classList.add('show');
    document.getElementById('empty-state').classList.remove('show');
    document.getElementById('surveys-list').innerHTML = '';
    btn.disabled = true;
    icon.style.animation = 'spin 0.8s linear infinite';

    try {
        const [surveysSnap, jobsSnap, approvedSnap] = await Promise.all([
            getDocs(collection(db, 'site-surveys')),
            getDocs(collection(db, 'jobs')),
            getDocs(collection(db, 'approved-additional-materials'))
        ]);

        const jobMap = {};
        jobsSnap.forEach(d => {
            const jd = d.data();
            const num = String(jd['Job Number'] || '').trim();
            if (num) jobMap[num] = jd;
        });

        const approvedMap = {};
        approvedSnap.forEach(d => { approvedMap[d.id] = d.data(); });

        const raw = surveysSnap.docs
            .map(d => ({ _docId: d.id, ...d.data() }))
            .filter(s => {
                const submittedAt = s.submittedAt || s.sections?.surveyDetails?.conductedOn;
                if (!submittedAt) return false;
                const date = new Date(submittedAt);
                if (date < CUTOFF) return false;
                const hasMats     = Array.isArray(s.sections?.additionalMaterials) && s.sections.additionalMaterials.length > 0;
                const hasPicklist = parsePicklist(s).length > 0;
                return hasMats || hasPicklist;
            })
            .sort((a, b) => {
                const ta = a.submittedAt || a.sections?.surveyDetails?.conductedOn || '';
                const tb = b.submittedAt || b.sections?.surveyDetails?.conductedOn || '';
                return String(tb).localeCompare(String(ta));
            });

        window._surveys = raw.map(s => {
            const num = String(s.jobNumber || '').trim();
            const jd  = jobMap[num] || {};
            const ap  = approvedMap[s._docId];
            return {
                ...s,
                _address:      jd['1st line of address'] || '',
                _postcode:     jd['Postcode'] || '',
                _custName:     jd['Name'] || s.sections?.customerSignOff?.name || '',
                _installDate:  jd['Install Date'] || '',
                _approvedAt:   ap?.approvedAt || null,
                _approvedMats: ap?.approvedMaterials || null,
            };
        });

        window._surveys.forEach(s => {
            if (!window._approvals[s._docId]) {
                const mats = parseMaterials(s.sections?.additionalMaterials);
                const state = {};
                mats.forEach((m, i) => { state[i] = { approved: null, qty: m.qty }; });
                window._approvals[s._docId] = state;
            }
        });

        renderAll();
    } catch (e) {
        console.error(e);
        document.getElementById('surveys-list').innerHTML =
            `<div class="state-msg show"><div class="icon">⚠️</div>Firebase error: ${esc(e.message)}</div>`;
    } finally {
        btn.disabled = false;
        icon.style.animation = '';
        document.getElementById('loading-state').classList.remove('show');
    }
};

// ── FILTER ────────────────────────────────────────────────────────────────────
window.setFilter = function (f) {
    window._filter = f;
    document.querySelectorAll('.ftab').forEach(b => b.className = 'ftab');
    const cls = f === 'approved' ? 'active-approved' : f === 'pending' ? 'active-pending' : 'active-all';
    document.getElementById('ftab-' + f).classList.add(cls);
    renderAll();
};

// ── RENDER ALL ────────────────────────────────────────────────────────────────
window.renderAll = function () {
    const f      = window._filter;
    const search = document.getElementById('search-input').value.trim().toLowerCase();
    const all    = window._surveys;

    let shown = all.filter(s => {
        if (f === 'approved' && !isApproved(s)) return false;
        if (f === 'pending'  &&  isApproved(s)) return false;
        if (search) {
            const hay = `${s.jobNumber} ${s._custName} ${s._address} ${s._postcode}`.toLowerCase();
            if (!hay.includes(search)) return false;
        }
        return true;
    });

    document.getElementById('stat-total').textContent    = all.length;
    document.getElementById('stat-pending').textContent  = all.filter(s => !isApproved(s)).length;
    document.getElementById('stat-approved').textContent = all.filter(s =>  isApproved(s)).length;
    document.getElementById('stat-picklist').textContent = all.filter(s => parsePicklist(s).length > 0).length;

    const listEl  = document.getElementById('surveys-list');
    const emptyEl = document.getElementById('empty-state');

    if (!shown.length) { emptyEl.classList.add('show'); listEl.innerHTML = ''; return; }
    emptyEl.classList.remove('show');
    listEl.innerHTML = shown.map((s, i) => buildCard(s, i)).join('');
};

// ── BUILD CARD ────────────────────────────────────────────────────────────────
function buildCard(s, idx) {
    const id       = s._docId;
    const approved = isApproved(s);
    const jobNum   = esc(s.jobNumber || id);
    const customer = esc(s._custName || '—');
    const address  = esc(s._address ? `${s._address}${s._postcode ? ', ' + s._postcode : ''}` : s._postcode || '—');
    const surveyor = esc(s.sections?.surveyDetails?.surveyor || '—');
    const survDate = fmtDate(s.sections?.surveyDetails?.conductedOn || s.submittedAt);
    const installDate = s._installDate ? fmtDate(s._installDate) : '—';
    const survType = s.surveyType === 'battery-and-solar' ? 'Battery & Solar' : 'Battery Only';

    const picklist  = parsePicklist(s);
    const materials = parseMaterials(s.sections?.additionalMaterials);
    const apState   = window._approvals[id] || {};

    const total    = materials.length;
    const actioned = Object.values(apState).filter(v => v.approved !== null).length;

    // ── picklist HTML (with Part ID column) ──────────────────────────────────
    const picklistHtml = picklist.length ? `
        <div>
            <div class="section-label">📋 Standard Picklist</div>
            <table class="picklist-table">
                <thead>
                    <tr>
                        <th>Item</th>
                        <th>Category</th>
                        <th>Part Code</th>
                        <th>Pack Size</th>
                        <th style="text-align:center">Qty</th>
                    </tr>
                </thead>
                <tbody>
                    ${picklist.map(item => {
                        const pid  = getPartId(item.name);
                        const pack = getPackSize(item.name);
                        return `
                        <tr>
                            <td>${esc(item.name)}</td>
                            <td class="cat">${esc(item.category)}</td>
                            <td class="part-id">${pid  ? esc(pid)  : '<span style="color:var(--text-dim);font-size:0.72rem">—</span>'}</td>
                            <td class="part-id">${pack ? esc(pack) : '<span style="color:var(--text-dim);font-size:0.72rem">—</span>'}</td>
                            <td class="qty">${esc(String(item.qty))}</td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table>
        </div>` : '';

    // ── additional materials HTML (with Part ID badge) ────────────────────────
    let matsHtml = '';
    if (materials.length) {
        const rows = materials.map((mat, i) => {
            const st     = apState[i] || { approved: null, qty: mat.qty };
            const rowCls = st.approved === true ? 'approved' : st.approved === false ? 'denied' : '';
            const appCls = st.approved === true  ? 'active' : '';
            const denCls = st.approved === false ? 'active' : '';
            const disabled = approved ? 'disabled' : '';
            const pid  = getPartId(mat.name);
            const pack = getPackSize(mat.name);
            const pidHtml = pid
                ? `<span class="mat-part-id">${esc(pid)}</span>`
                : '';
            const packHtml = pack
                ? `<span class="mat-pack-size">${esc(pack)}</span>`
                : '';
            return `
            <div class="material-row ${rowCls}" id="matrow-${id}-${i}">
                <div class="mat-info">
                    <div class="mat-name">${esc(mat.name)}</div>
                    ${pidHtml}${packHtml}
                    <div class="mat-cat">${esc(mat.category)}</div>
                </div>
                <div class="mat-qty-wrap">
                    <span class="mat-qty-lbl">Qty</span>
                    <input type="number" class="mat-qty-input" min="1"
                        id="qty-${id}-${i}" value="${st.qty}"
                        ${approved ? 'disabled' : ''}
                        onchange="updateQty('${id}', ${i}, this.value)" />
                </div>
                <div class="mat-actions">
                    <button class="btn-approve ${appCls}" id="app-${id}-${i}"
                        onclick="setApproval('${id}', ${i}, true)" ${disabled}>✓ Approve</button>
                    <button class="btn-deny ${denCls}" id="den-${id}-${i}"
                        onclick="setApproval('${id}', ${i}, false)" ${disabled}>✕ Deny</button>
                </div>
            </div>`;
        }).join('');

        matsHtml = `
        <div>
            <div class="section-label">⚡ Additional Materials Requested</div>
            <div class="materials-list">${rows}</div>
        </div>`;
    } else {
        matsHtml = `
        <div>
            <div class="section-label">⚡ Additional Materials Requested</div>
            <div class="no-mats">No additional materials requested for this survey.</div>
        </div>`;
    }

    // ── submit section ────────────────────────────────────────────────────────
    let submitHtml = '';
    if (approved) {
        submitHtml = `
        <div class="submit-section">
            <div class="already-approved-banner">
                ✅ Materials approved on ${fmtDate(s._approvedAt)} — email sent to procurement.
            </div>
        </div>`;
    } else if (materials.length) {
        submitHtml = `
        <div class="submit-section">
            <div class="submit-progress">
                <span>${actioned}</span> / <span>${total}</span> materials reviewed
            </div>
            <button class="btn-submit" id="sub-${id}"
                onclick="submitApproval('${id}')"
                ${actioned < total ? 'disabled' : ''}>
                📧 Submit Approval &amp; Send Email
            </button>
        </div>`;
    }

    return `
    <div class="survey-card${approved ? ' is-approved' : ''}" id="card-${id}" style="animation-delay:${idx * 0.06}s">
        <div class="card-stripe ${approved ? 'stripe-approved' : 'stripe-pending'}"></div>

        <div class="card-header">
            <div class="card-header-left">
                <div class="card-job-num">#${jobNum}</div>
                <div class="card-customer">${customer}</div>
                <div class="card-address">📍 ${address}</div>
                <div class="card-install">📅 Install: ${installDate}</div>
            </div>
            <div class="card-header-right">
                <span class="badge ${approved ? 'b-approved' : 'b-pending'}">
                    ${approved ? '✅ Approved' : '⏳ Pending Review'}
                </span>
                <div class="card-meta-pills">
                    <span class="pill">${survType}</span>
                    <span class="pill">${survDate}</span>
                    <span class="pill highlight">${surveyor}</span>
                </div>
            </div>
        </div>

        <div class="card-body">
            ${picklistHtml}
            ${matsHtml}
        </div>

        ${submitHtml}
    </div>`;
}

// ── APPROVAL STATE MANAGEMENT ─────────────────────────────────────────────────
window.updateQty = function (id, idx, val) {
    if (!window._approvals[id]) return;
    window._approvals[id][idx].qty = Math.max(1, parseInt(val, 10) || 1);
    updateSubmitBtn(id);
};

window.setApproval = function (id, idx, approved) {
    if (!window._approvals[id]) return;
    window._approvals[id][idx].approved = approved;

    const row  = document.getElementById(`matrow-${id}-${idx}`);
    const appB = document.getElementById(`app-${id}-${idx}`);
    const denB = document.getElementById(`den-${id}-${idx}`);
    if (row)  { row.className = `material-row ${approved ? 'approved' : 'denied'}`; }
    if (appB) { appB.className = `btn-approve ${approved ? 'active' : ''}`; }
    if (denB) { denB.className = `btn-deny    ${!approved ? 'active' : ''}`; }

    const qtyEl = document.getElementById(`qty-${id}-${idx}`);
    if (qtyEl) qtyEl.disabled = !approved;

    updateSubmitBtn(id);
};

function updateSubmitBtn(id) {
    const survey  = window._surveys.find(s => s._docId === id);
    if (!survey) return;
    const mats    = parseMaterials(survey.sections?.additionalMaterials);
    const apState = window._approvals[id] || {};
    const total   = mats.length;
    const actioned = Object.values(apState).filter(v => v.approved !== null).length;

    const progEl = document.querySelector(`#card-${id} .submit-progress`);
    const subBtn = document.getElementById(`sub-${id}`);
    if (progEl) progEl.innerHTML = `<span>${actioned}</span> / <span>${total}</span> materials reviewed`;
    if (subBtn) subBtn.disabled = actioned < total;
}

// ── SUBMIT ────────────────────────────────────────────────────────────────────
window.submitApproval = async function (id) {
    const survey  = window._surveys.find(s => s._docId === id);
    if (!survey) return;

    const mats    = parseMaterials(survey.sections?.additionalMaterials);
    const apState = window._approvals[id] || {};
    const resolved = mats.map((m, i) => {
        const st = apState[i] || { approved: true, qty: m.qty };
        return { ...m, qty: st.qty, approved: st.approved, partId: getPartId(m.name), packSize: getPackSize(m.name) };
    });
    const approvedMats = resolved.filter(m => m.approved === true);
    const deniedMats   = resolved.filter(m => m.approved === false);

    const btn = document.getElementById(`sub-${id}`);
    if (btn) { btn.disabled = true; btn.textContent = 'Submitting…'; }

    const nowISO   = new Date().toISOString();
    const jobNum   = survey.jobNumber || id;
    const custName = survey._custName || survey.sections?.customerSignOff?.name || '—';
    const address  = [survey._address, survey._postcode].filter(Boolean).join(', ') || '—';
    const install  = survey._installDate ? fmtDate(survey._installDate) : '—';

    // ── Firestore ─────────────────────────────────────────────────────────────
    try {
        await setDoc(doc(db, 'approved-additional-materials', id), {
            surveyDocId:       id,
            jobNumber:         jobNum,
            customerName:      custName,
            address:           address,
            installDate:       survey._installDate || '',
            surveyType:        survey.surveyType || '',
            surveyor:          survey.sections?.surveyDetails?.surveyor || '',
            approvedAt:        nowISO,
            approvedMaterials: approvedMats.map(m => ({ name: m.name, category: m.category, qty: m.qty, partId: m.partId || '', packSize: m.packSize || '' })),
            deniedMaterials:   deniedMats.map(m  => ({ name: m.name, category: m.category, qty: m.qty, partId: m.partId || '', packSize: m.packSize || '' })),
        });
    } catch (e) {
        showToast('Firestore save failed: ' + e.message, true);
        if (btn) { btn.disabled = false; btn.textContent = '📧 Submit Approval & Send Email'; }
        return;
    }

    // ── EmailJS ───────────────────────────────────────────────────────────────
    if (approvedMats.length === 0) {
        showToast('All items denied — saved to Firestore, no email sent.');
    } else {
        // Build approved list with Part ID included
        const approvedListText = approvedMats
            .map(m => {
                const pidStr  = m.partId   ? ` [${m.partId}]`   : '';
                const packStr = m.packSize ? ` (${m.packSize})` : '';
                return `• ${m.category}: ${m.name}${pidStr}${packStr} × ${m.qty}`;
            })
            .join('\n');

        const deniedListText = deniedMats.length
            ? deniedMats.map(m => {
                const pidStr  = m.partId   ? ` [${m.partId}]`   : '';
                const packStr = m.packSize ? ` (${m.packSize})` : '';
                return `• ${m.name}${pidStr}${packStr}`;
              }).join('\n')
            : 'None denied.';

        try {
            await emailjs.send('service_jovorbh', 'template_0uhapew', {
                job_number:         jobNum,
                customer_name:      custName,
                address:            address,
                install_date:       install,
                approved_materials: approvedListText,
                denied_materials:   deniedListText,
                surveyor:           survey.sections?.surveyDetails?.surveyor || '—',
                survey_type:        survey.surveyType === 'battery-and-solar' ? 'Battery & Solar' : 'Battery Only',
            });
            showToast('Approval submitted & email sent!');
        } catch (e) {
            showToast('Saved to Firestore, but email failed: ' + e.message, true);
        }
    }

    survey._approvedAt   = nowISO;
    survey._approvedMats = approvedMats;
    renderAll();
};

// ── INIT ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
    loadData();
    window.addEventListener('scroll', () =>
        document.getElementById('back-top').classList.toggle('show', scrollY > 400));
    document.getElementById('back-top').addEventListener('click', () =>
        window.scrollTo({ top:0, behavior:'smooth' }));
});
</script>
</body>
</html>
