<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Pingu - Solar</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF6B35;
            --secondary: #FFC857;
            --accent: #00D9FF;
            --dark: #1A1A2E;
            --dark-light: #252541;
            --dark-lighter: #2F2F4A;
            --text: #EAEAEA;
            --text-dim: #9A9AB0;
            --success: #4ECCA3;
            --error: #FF6B6B;
            --shadow: rgba(255, 107, 53, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--dark);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background:
                radial-gradient(circle at 20% 50%, rgba(255,107,53,0.08) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(0,217,255,0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255,200,87,0.06) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes float {
            0%,100% { transform: translate(0,0) rotate(0deg); }
            33% { transform: translate(30px,-30px) rotate(120deg); }
            66% { transform: translate(-20px,20px) rotate(240deg); }
        }

        .grid-bg {
            position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(255,107,53,0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,107,53,0.04) 1px, transparent 1px);
            background-size: 60px 60px;
            z-index: 0; pointer-events: none;
        }

        /* ── LAYOUT ── */
        .page {
            position: relative; z-index: 1;
            display: flex; flex-direction: column;
            align-items: center;
            padding: 2rem 1rem 4rem;
            min-height: 100vh;
        }

        /* ── LOGO ── */
        .logo-area { text-align: center; margin-bottom: 2.5rem; margin-top: 1.5rem; }
        .logo {
            font-family: 'Syne', sans-serif; font-size: 2.4rem; font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 50%, var(--accent) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            display: block; text-decoration: none; margin-bottom: 0.4rem;
        }
        .login-label {
            color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase;
            letter-spacing: 0.2em; display: flex; align-items: center; justify-content: center; gap: 0.6rem;
        }
        .login-label::before, .login-label::after {
            content:''; flex:1; max-width:60px; height:1px; background:var(--dark-lighter);
        }

        /* ── SESSION BANNER ── */
        .session-banner {
            width: 100%; max-width: 480px; margin-bottom: 1.5rem;
            padding: 1rem 1.4rem; border-radius: 12px;
            display: flex; align-items: center; gap: 1rem;
            font-size: 0.85rem; animation: fadeInUp 0.5s ease-out both;
        }
        .session-banner.active {
            background: rgba(78,204,163,0.12);
            border: 1px solid rgba(78,204,163,0.4);
            color: var(--success);
        }
        .session-banner.expired {
            background: rgba(255,107,107,0.12);
            border: 1px solid rgba(255,107,107,0.4);
            color: var(--error);
        }
        .session-banner.hidden { display: none; }
        .session-icon { font-size: 1.4rem; flex-shrink: 0; }
        .session-info { flex: 1; }
        .session-title { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; margin-bottom: 0.2rem; }
        .session-sub { font-size: 0.78rem; opacity: 0.85; }
        .countdown-ring { font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; flex-shrink: 0; }

        /* ── LOGIN CARD ── */
        .login-card {
            background: var(--dark-light); border-radius: 20px;
            padding: 2.5rem; border: 2px solid var(--dark-lighter);
            width: 100%; max-width: 480px;
            position: relative; overflow: hidden;
            transition: border-color 0.3s ease;
            animation: fadeInUp 0.8s ease-out both;
        }
        .login-card:focus-within { border-color: rgba(255,107,53,0.4); }
        .login-card::before {
            content:''; position:absolute; top:0; left:0; right:0; height:3px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
        }

        .card-title { font-family:'Syne',sans-serif; font-size:1.5rem; font-weight:700; color:var(--text); margin-bottom:0.3rem; }
        .card-subtitle { color:var(--text-dim); font-size:0.82rem; margin-bottom:2rem; }

        .form-group { margin-bottom: 1.4rem; }
        .form-group label {
            display:block; color:var(--text-dim); font-size:0.78rem;
            text-transform:uppercase; letter-spacing:0.12em; margin-bottom:0.5rem;
        }
        .input-wrapper { position:relative; }
        .input-icon {
            position:absolute; left:1rem; top:50%; transform:translateY(-50%);
            font-size:1rem; pointer-events:none; opacity:0.6;
        }
        .form-input {
            width:100%; background:var(--dark-lighter); border:2px solid var(--dark-lighter);
            color:var(--text); padding:0.9rem 1rem 0.9rem 2.8rem;
            border-radius:10px; font-family:'JetBrains Mono',monospace;
            font-size:0.92rem; transition:all 0.3s ease;
        }
        .form-input:focus {
            outline:none; border-color:var(--primary); background:var(--dark);
            box-shadow:0 0 0 4px rgba(255,107,53,0.1);
        }
        .form-input::placeholder { color:var(--text-dim); opacity:0.5; }

        .submit-btn {
            width:100%; padding:1.1rem;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color:white; border:none; border-radius:12px;
            font-family:'Syne',sans-serif; font-size:1.05rem; font-weight:700;
            cursor:pointer; transition:all 0.3s ease; margin-top:0.5rem;
        }
        .submit-btn:hover { transform:translateY(-3px); box-shadow:0 10px 30px var(--shadow); }
        .submit-btn:disabled { background:var(--dark-lighter); cursor:not-allowed; transform:none; box-shadow:none; }

        .ip-strip {
            display:flex; align-items:center; gap:0.6rem;
            margin-top:1.5rem; padding:0.8rem 1rem;
            background:var(--dark-lighter); border-radius:8px;
            border-left:3px solid var(--accent);
            font-size:0.78rem; color:var(--text-dim);
        }
        .ip-strip .dot {
            width:7px; height:7px; border-radius:50%; background:var(--accent);
            flex-shrink:0; animation:pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100%{opacity:1;transform:scale(1);} 50%{opacity:0.4;transform:scale(0.8);} }
        .ip-value { color:var(--accent); font-weight:500; margin-left:auto; }

        /* ── HISTORY PANEL ── */
        .history-panel {
            width:100%; max-width:700px; margin-top:2rem;
            animation: fadeInUp 0.6s ease-out 0.2s both;
        }
        .history-panel.hidden { display:none; }

        .history-header {
            display:flex; align-items:center; justify-content:space-between;
            margin-bottom:1.2rem;
        }
        .history-title {
            font-family:'Syne',sans-serif; font-size:1.2rem; color:var(--text);
            display:flex; align-items:center; gap:0.7rem;
        }
        .user-count-badge {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color:white; font-size:0.7rem; padding:0.2rem 0.6rem;
            border-radius:99px; font-family:'Syne',sans-serif; font-weight:700;
        }
        .clear-all-btn {
            background:none; border:1px solid var(--dark-lighter);
            color:var(--text-dim); font-family:'JetBrains Mono',monospace;
            font-size:0.75rem; padding:0.3rem 0.8rem; border-radius:6px;
            cursor:pointer; transition:all 0.2s;
        }
        .clear-all-btn:hover { border-color:var(--error); color:var(--error); }

        .users-grid { display:flex; flex-direction:column; gap:1rem; }

        /* User card */
        .user-card {
            background:var(--dark-light); border-radius:14px;
            border:2px solid var(--dark-lighter);
            overflow:hidden; transition:border-color 0.3s ease;
            cursor:pointer;
        }
        .user-card:hover { border-color:rgba(255,107,53,0.5); }
        .user-card.expanded { border-color:var(--primary); }

        .user-card-header {
            display:flex; align-items:center; gap:1rem;
            padding:1.2rem 1.5rem;
            position:relative;
        }
        .user-card-header::before {
            content:''; position:absolute; top:0; left:0;
            width:4px; height:100%;
            background: linear-gradient(180deg, var(--primary), var(--accent));
        }

        .user-avatar {
            width:46px; height:46px; border-radius:50%;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display:flex; align-items:center; justify-content:center;
            font-family:'Syne',sans-serif; font-size:1.1rem; font-weight:700;
            color:white; flex-shrink:0;
        }
        .user-meta { flex:1; min-width:0; }
        .user-name {
            font-family:'Syne',sans-serif; font-size:1rem; font-weight:700;
            color:var(--text); margin-bottom:0.2rem;
            white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
        }
        .user-email { color:var(--text-dim); font-size:0.78rem; }

        .user-card-right {
            display:flex; flex-direction:column; align-items:flex-end; gap:0.3rem; flex-shrink:0;
        }
        .login-count-pill {
            background:var(--dark-lighter); border-radius:99px;
            padding:0.25rem 0.7rem; font-size:0.72rem; color:var(--text-dim);
            white-space:nowrap;
        }
        .login-count-pill span { color:var(--secondary); font-weight:600; }
        .last-seen { font-size:0.72rem; color:var(--text-dim); }
        .expand-arrow { color:var(--text-dim); font-size:0.8rem; transition:transform 0.3s ease; margin-top:0.2rem; }
        .user-card.expanded .expand-arrow { transform:rotate(180deg); }

        /* Expandable history */
        .user-history {
            max-height:0; overflow:hidden;
            transition:max-height 0.45s ease;
            border-top:0px solid transparent;
        }
        .user-card.expanded .user-history {
            max-height:600px;
            border-top:1px solid var(--dark-lighter);
        }

        .history-inner { padding:1.2rem 1.5rem; }
        .history-list-title {
            font-size:0.75rem; text-transform:uppercase; letter-spacing:0.12em;
            color:var(--text-dim); margin-bottom:0.9rem;
            display:flex; align-items:center; gap:0.5rem;
        }
        .history-list-title::after { content:''; flex:1; height:1px; background:var(--dark-lighter); }

        .history-entries {
            display:flex; flex-direction:column; gap:0.6rem;
            max-height:380px; overflow-y:auto;
        }
        .history-entries::-webkit-scrollbar { width:4px; }
        .history-entries::-webkit-scrollbar-track { background:var(--dark-lighter); border-radius:4px; }
        .history-entries::-webkit-scrollbar-thumb { background:var(--primary); border-radius:4px; }

        .history-entry {
            display:flex; align-items:center; gap:1rem;
            padding:0.8rem 1rem; background:var(--dark-lighter);
            border-radius:8px; font-size:0.8rem;
        }
        .entry-num { color:var(--text-dim); font-size:0.7rem; width:20px; text-align:right; flex-shrink:0; }
        .entry-ip { color:var(--accent); font-weight:500; flex:1; min-width:0; }
        .entry-date { color:var(--text-dim); font-size:0.75rem; white-space:nowrap; }
        .entry-new-badge {
            background:var(--success); color:var(--dark);
            font-size:0.65rem; padding:0.15rem 0.45rem;
            border-radius:4px; font-weight:700; flex-shrink:0;
        }

        /* Back link */
        .back-link {
            display:block; text-align:center; margin-top:2rem;
            color:var(--text-dim); font-size:0.82rem;
            text-decoration:none; transition:color 0.3s;
        }
        .back-link:hover { color:var(--primary); }

        /* Toast */
        .status-message {
            position:fixed; top:2rem; right:2rem;
            padding:1rem 1.5rem; border-radius:10px;
            font-size:0.88rem; z-index:9999; display:none;
            animation:slideInRight 0.4s ease; max-width:320px;
        }
        @keyframes slideInRight { from{opacity:0;transform:translateX(100px);} to{opacity:1;transform:translateX(0);} }
        .status-message.show { display:block; }
        .status-message.success { background:var(--success); color:var(--dark); font-weight:600; }
        .status-message.error { background:var(--error); color:white; font-weight:600; }
        .status-message.info { background:var(--secondary); color:var(--dark); font-weight:600; }

        @keyframes fadeInUp { from{opacity:0;transform:translateY(30px);} to{opacity:1;transform:translateY(0);} }

        @media(max-width:520px) {
            .login-card { padding:1.8rem 1.2rem; }
            .user-card-header { padding:1rem 1.2rem; }
            .history-inner { padding:1rem 1.2rem; }
            .entry-date { display:none; }
        }
    </style>
</head>
<body>
    <div class="grid-bg"></div>

    <div class="page">

        <div class="logo-area">
            <a href="index.html" class="logo">Pingu - Solar</a>
            <div class="login-label">Admin Access</div>
        </div>

        <!-- Session Banner -->
        <div class="session-banner hidden" id="session-banner">
            <div class="session-icon" id="session-icon">✅</div>
            <div class="session-info">
                <div class="session-title" id="session-title">Session Active</div>
                <div class="session-sub" id="session-sub">You are logged in</div>
            </div>
            <div class="countdown-ring" id="countdown-ring"></div>
        </div>

        <!-- Login Card -->
        <div class="login-card" id="login-card">
            <div class="card-title" id="card-title">Sign In</div>
            <div class="card-subtitle" id="card-subtitle">Enter your credentials to access the admin panel</div>

            <form id="login-form" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="admin-name">Full Name</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="admin-name" class="form-input" placeholder="e.g. John Smith" required autocomplete="name"/>
                    </div>
                </div>
                <div class="form-group">
                    <label for="admin-email">Email Address</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="email" id="admin-email" class="form-input" placeholder="e.g. admin@pingu-solar.com" required autocomplete="email"/>
                    </div>
                </div>
                <div class="form-group">
                    <label for="admin-password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔑</span>
                        <input type="password" id="admin-password" class="form-input" placeholder="Enter your password" required autocomplete="current-password"/>
                    </div>
                </div>
                <button type="submit" class="submit-btn" id="submit-btn">Sign In to Admin Panel</button>
            </form>

            <div class="ip-strip">
                <div class="dot"></div>
                <span>Your IP address</span>
                <span class="ip-value" id="live-ip">Fetching...</span>
            </div>
        </div>

        <!-- History Panel -->
        <div class="history-panel hidden" id="history-panel">
            <div class="history-header">
                <div class="history-title">
                    🔐 Login History
                    <span class="user-count-badge" id="user-count-badge">0 users</span>
                </div>
                <button class="clear-all-btn" onclick="clearAllData()">Clear All</button>
            </div>
            <div class="users-grid" id="users-grid"></div>
        </div>

        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <div class="status-message" id="status-message"></div>

    <!-- Firebase SDK -->
    <script type="module">

        import { getFirestore, collection, addDoc, getDocs, query, orderBy, writeBatch, doc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyAc_yJQ_rkzuOBh-Yxg0Q4eooXtB-tQjm0",
            authDomain: "pingu-solar.firebaseapp.com",
            projectId: "pingu-solar",
            storageBucket: "pingu-solar.appspot.com",
            messagingSenderId: "232764952866",
            appId: "1:232764952866:web:5923b7f419de6355d6157b",
            measurementId: "G-PFH059DZ64"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const db  = getFirestore(app);
            window.db = db;
            window.firebaseModules = { collection, addDoc, getDocs, query, orderBy, writeBatch, doc };

    <script>
        const SESSION_KEY = 'adminSession';
        const LOG_KEY     = 'adminLoginLog';
        const COOLDOWN_MS = 12 * 60 * 60 * 1000; // 12 hours in ms

        let visitorIP    = 'Unknown';
        let countdownTimer = null;
        let expandedUser = null;

        // ── INIT ──
        function init() {
            fetchIP();
            checkSession();
            renderHistory();
        }

        // ── IP ──
        async function fetchIP() {
            try {
                const r = await fetch('https://api.ipify.org?format=json');
                visitorIP = (await r.json()).ip;
            } catch {
                try {
                    const r = await fetch('https://api64.ipify.org?format=json');
                    visitorIP = (await r.json()).ip;
                } catch { visitorIP = 'Unavailable'; }
            }
            document.getElementById('live-ip').textContent = visitorIP;
        }

        // ── SESSION ──
        function getSession() {
            try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch { return null; }
        }
        function saveSession(name, email) {
            const s = { name, email, loginTime: Date.now() };
            localStorage.setItem(SESSION_KEY, JSON.stringify(s));
            return s;
        }
        function clearSession() { localStorage.removeItem(SESSION_KEY); }
        function isSessionValid(s) { return s && s.loginTime && (Date.now() - s.loginTime) < COOLDOWN_MS; }

        function checkSession() {
            const s = getSession();
            if (s && isSessionValid(s)) {
                applyActiveState(s);
            } else if (s) {
                clearSession();
                applyExpiredState();
            }
        }

        function applyActiveState(session) {
            const form = document.getElementById('login-form');
            form.style.opacity = '0.4';
            form.style.pointerEvents = 'none';
            document.getElementById('card-title').textContent = '✅ Already Signed In';
            document.getElementById('card-subtitle').textContent = `Signed in as ${session.name}`;

            const banner = document.getElementById('session-banner');
            banner.className = 'session-banner active';
            document.getElementById('session-icon').textContent = '✅';
            document.getElementById('session-title').textContent = `Welcome back, ${session.name}`;
            document.getElementById('session-sub').textContent = `${session.email}  ·  Session expires in 12 hours`;

            startCountdown(session.loginTime);
        }

        function applyExpiredState() {
            const banner = document.getElementById('session-banner');
            banner.className = 'session-banner expired';
            document.getElementById('session-icon').textContent = '⏰';
            document.getElementById('session-title').textContent = 'Session Expired';
            document.getElementById('session-sub').textContent = 'Your 12-hour session ended. Please sign in again.';
            document.getElementById('countdown-ring').textContent = '';
            document.getElementById('card-title').textContent = 'Sign In Again';
            document.getElementById('card-subtitle').textContent = 'Your session expired. Please re-authenticate.';
        }

        function startCountdown(loginTime) {
            if (countdownTimer) clearInterval(countdownTimer);
            function tick() {
                const remaining = COOLDOWN_MS - (Date.now() - loginTime);
                if (remaining <= 0) {
                    clearInterval(countdownTimer);
                    clearSession();
                    applyExpiredState();
                    const form = document.getElementById('login-form');
                    form.style.opacity = '1';
                    form.style.pointerEvents = 'auto';
                    return;
                }
                const h = String(Math.floor(remaining / 3600000)).padStart(2,'0');
                const m = String(Math.floor((remaining % 3600000) / 60000)).padStart(2,'0');
                const s = String(Math.floor((remaining % 60000) / 1000)).padStart(2,'0');
                const str = `${h}:${m}:${s}`;
                document.getElementById('countdown-ring').textContent = str;
                document.getElementById('card-subtitle').textContent = `Session expires in ${str}`;
            }
            tick();
            countdownTimer = setInterval(tick, 1000);
        }

        // ── LOGIN ──
        async function handleLogin(event) {
            event.preventDefault();
            const name  = document.getElementById('admin-name').value.trim();
            const email = document.getElementById('admin-email').value.trim();
            const btn   = document.getElementById('submit-btn');
            btn.disabled = true; btn.textContent = 'Signing in...';

            const entry = {
                name, email,
                ip: visitorIP,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent
            };

            // Firestore
            try {
                if (window.db && window.firebaseModules) {
                    const { collection, addDoc } = window.firebaseModules;
                    await addDoc(collection(window.db, 'admin-login-log'), entry);
                }
            } catch(e) { console.warn('Firestore write failed:', e); }

            // localStorage
            const log = getLog();
            log.unshift(entry);
            localStorage.setItem(LOG_KEY, JSON.stringify(log.slice(0, 500)));

            const session = saveSession(name, email);
            showStatus(`Welcome, ${name}! Session active for 12 hours.`, 'success');
            document.getElementById('login-form').reset();
            renderHistory();
            applyActiveState(session);

            btn.disabled = false; btn.textContent = 'Sign In to Admin Panel';
        }

        // ── DATA ──
        function getLog() {
            try { return JSON.parse(localStorage.getItem(LOG_KEY)) || []; } catch { return []; }
        }

        function groupByUser(log) {
            const map = {};
            log.forEach(e => {
                const key = (e.email || 'unknown').toLowerCase();
                if (!map[key]) map[key] = { name: e.name, email: e.email, entries: [] };
                map[key].entries.push(e);
            });
            Object.values(map).forEach(u =>
                u.entries.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp))
            );
            return Object.values(map).sort((a,b) =>
                new Date(b.entries[0].timestamp) - new Date(a.entries[0].timestamp)
            );
        }

        // ── RENDER ──
        function renderHistory() {
            const log   = getLog();
            const panel = document.getElementById('history-panel');
            const grid  = document.getElementById('users-grid');

            if (log.length === 0) { panel.classList.add('hidden'); return; }
            panel.classList.remove('hidden');

            const users = groupByUser(log);
            document.getElementById('user-count-badge').textContent =
                `${users.length} user${users.length !== 1 ? 's' : ''}`;

            grid.innerHTML = users.map((user, idx) => {
                const isExpanded = expandedUser === user.email.toLowerCase();
                const rows = user.entries.map((e, i) => {
                    const isNew = i === 0 && (Date.now() - new Date(e.timestamp).getTime()) < 120000;
                    return `
                        <div class="history-entry">
                            <span class="entry-num">#${user.entries.length - i}</span>
                            <span class="entry-ip">${escapeHtml(e.ip || 'Unknown')}</span>
                            <span class="entry-date">${formatDate(e.timestamp)}</span>
                            ${isNew ? '<span class="entry-new-badge">NEW</span>' : ''}
                        </div>`;
                }).join('');

                return `
                    <div class="user-card${isExpanded ? ' expanded' : ''}" id="ucard-${idx}"
                         onclick="toggleUser('${escapeAttr(user.email)}', ${idx})">
                        <div class="user-card-header">
                            <div class="user-avatar">${getInitials(user.name)}</div>
                            <div class="user-meta">
                                <div class="user-name">${escapeHtml(user.name)}</div>
                                <div class="user-email">${escapeHtml(user.email)}</div>
                            </div>
                            <div class="user-card-right">
                                <div class="login-count-pill"><span>${user.entries.length}</span> login${user.entries.length !== 1 ? 's' : ''}</div>
                                <div class="last-seen">Last: ${formatDate(user.entries[0].timestamp)}</div>
                                <div class="expand-arrow">▼</div>
                            </div>
                        </div>
                        <div class="user-history">
                            <div class="history-inner">
                                <div class="history-list-title">Full Login History — IP · Date &amp; Time</div>
                                <div class="history-entries">${rows}</div>
                            </div>
                        </div>
                    </div>`;
            }).join('');
        }

        function toggleUser(email, idx) {
            expandedUser = expandedUser === email.toLowerCase() ? null : email.toLowerCase();
            renderHistory();
            if (expandedUser) {
                setTimeout(() => {
                    const c = document.getElementById(`ucard-${idx}`);
                    if (c) c.scrollIntoView({ behavior:'smooth', block:'nearest' });
                }, 80);
            }
        }

        async function clearAllData() {
            if (!confirm('Delete ALL login history? This cannot be undone.')) return;
            localStorage.removeItem(LOG_KEY);
            try {
                if (window.db && window.firebaseModules) {
                    const { collection, getDocs, writeBatch, doc } = window.firebaseModules;
                    const snap  = await getDocs(collection(window.db, 'admin-login-log'));
                    const batch = writeBatch(window.db);
                    snap.docs.forEach(d => batch.delete(doc(window.db, 'admin-login-log', d.id)));
                    await batch.commit();
                }
            } catch(e) { console.warn('Firestore clear failed:', e); }
            expandedUser = null;
            renderHistory();
            showStatus('All login history cleared.', 'info');
        }

        // ── UTILS ──
        function getInitials(n) {
            return (n || '?').split(' ').map(w => w[0]).join('').toUpperCase().substring(0,2);
        }
        function formatDate(ts) {
            const d = new Date(ts);
            return d.toLocaleDateString('en-GB', { day:'2-digit', month:'short', year:'numeric' })
                 + ' ' + d.toLocaleTimeString('en-GB', { hour:'2-digit', minute:'2-digit' });
        }
        function escapeHtml(t) {
            const d = document.createElement('div'); d.textContent = t; return d.innerHTML;
        }
        function escapeAttr(t) { return (t||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }
        function showStatus(msg, type) {
            const el = document.getElementById('status-message');
            el.textContent = msg; el.className = `status-message ${type} show`;
            setTimeout(() => el.classList.remove('show'), 4000);
        }
    </script>
</body>
</html>
